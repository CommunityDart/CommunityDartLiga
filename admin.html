<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kommandozentrale - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/quill@2/dist/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #010a0f; color: #fff; margin: 0; padding: 20px; }
        .admin-container { max-width: 1500px; margin: 0 auto; background: #021622; border: 1px solid rgba(75, 135, 165, 0.2); border-radius: 12px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1, h2, h3 { color: #3ddc97; margin: 0; }
        .tabs { display: flex; gap: 8px; border-bottom: 2px solid rgba(75, 135, 165, 0.2); padding-bottom: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { background: #021017; color: #90a9b7; border: 1px solid #4b87a5; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: #3ddc97; color: #000; border-color: #3ddc97; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .config-box { background: rgba(61, 220, 151, 0.05); border: 1px solid rgba(61, 220, 151, 0.2); padding: 12px; border-radius: 10px; margin-bottom: 15px; }
        .league-select, .comment-input, .news-headline-field { padding: 8px; border-radius: 6px; background: #021017; color: #fff; border: 1px solid #4b87a5; outline: none; }
        .news-headline-field { width: 100%; font-size: 16px; }
        .comment-input { width: 100%; }
        .save-banner-btn { background: #3ddc97; color: #000; font-weight: bold; padding: 12px; border-radius: 6px; width: 100%; border: none; cursor: pointer; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-row">
        <h1>🎯 CDL - Cockpit</h1>
        <div id="seasonIndicator" style="color:#20b7ff; font-weight:bold;">Saison: Lade...</div>
        <a href="index.html" style="color:#20b7ff; text-decoration:none; font-weight:bold;">🏠 Hauptseite</a>
    </div>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('tabZuteilung', this)">1. Liga Zuteilung</button>
        <button class="tab-btn" onclick="switchTab('tabNews', this)">2. News verfassen</button>
        <button class="tab-btn" onclick="switchTab('tabTurniere', this)" style="color:#ffd08a;">3. Turniere verwalten</button>
    </div>

    <div id="tabZuteilung" class="tab-content active">
        <div class="config-box">
            <h3>Spieler-Zuteilung</h3>
            <p>Hier werden die Spieler für die Ligen gelistet, sobald die Verbindung steht.</p>
        </div>
    </div>

    <div id="tabNews" class="tab-content">
        <h2>Neuigkeiten veröffentlichen</h2>
        <input type="text" id="newsTitleInput" class="news-headline-field" placeholder="Überschrift...">
        <textarea id="newsTextInput" class="comment-input" style="height:120px; margin-top:10px;" placeholder="Inhalt der News..."></textarea>
        <button class="save-banner-btn" onclick="publishNews()">📢 News senden</button>
    </div>

    <div id="tabTurniere" class="tab-content">
        <h2>🏆 Turnier-Management</h2>
        <div class="config-box" style="border-color: #20b7ff;">
            <h3>Systemeinstellung: Turnier-Feature anzeigen</h3>
            <label style="cursor:pointer;"><input type="checkbox" id="tournamentToggleCb"> Turnier-Reiter auf Startseite anzeigen</label>
            <button class="save-banner-btn" style="width:auto; padding:6px 12px; margin-top:5px; display:block;" onclick="saveTournamentToggle()">💾 Speichern</button>
        </div>
        <div class="config-box">
            <h3>➕ Neues Turnier erstellen</h3>
            <input type="text" id="newTourneyTitle" class="news-headline-field" placeholder="Turniertitel...">
            <textarea id="newTourneyRules" class="comment-input" style="height:60px; margin-top:10px;" placeholder="Regeln..."></textarea>
            <button class="save-banner-btn" onclick="createNewTournament()">🚀 Turnier anlegen</button>
        </div>
        <div id="adminTournamentsList"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q"; 
    let supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function switchTab(tabId, btnElement) {
        try {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            const content = document.getElementById(tabId);
            if(content) content.classList.add('active');
            if(btnElement) btnElement.classList.add('active');
        } catch(e) { console.error(e); }
    }

    async function saveTournamentToggle() {
        const val = document.getElementById('tournamentToggleCb').checked;
        await supabaseClient.from('system_settings').update({ tournament_feature_active: val }).eq('id', 1);
        alert("Einstellung gespeichert!");
    }

    async function createNewTournament() {
        const title = document.getElementById("newTourneyTitle").value.trim();
        const rules = document.getElementById("newTourneyRules").value.trim();
        if(!title) return alert("Titel fehlt!");
        await supabaseClient.from('tournaments').insert([{ title, rules, status: 'open' }]);
        alert("Turnier angelegt!");
        loadTournaments();
    }

    async function publishNews() {
        const title = document.getElementById("newsTitleInput").value.trim();
        const content = document.getElementById("newsTextInput").value.trim();
        if(!title || !content) return alert("Felder ausfüllen!");
        await supabaseClient.from('news').insert([{ title, content }]);
        alert("News veröffentlicht!");
    }

    async function loadTournaments() {
        try {
            const { data: ts } = await supabaseClient.from('tournaments').select('*').order('created_at',{ascending:false});
            const list = document.getElementById("adminTournamentsList");
            if(!list) return;
            if(!ts || ts.length===0) { list.innerHTML = "Keine Turniere."; return; }
            list.innerHTML = ts.map(t => `<div class="config-box"><h4>${t.title} [Status: ${t.status}]</h4></div>`).join("");
        } catch(e){}
    }

    async function initAdmin() {
        try {
            const { data } = await supabaseClient.from('system_settings').select('*').eq('id', 1).single();
            if(data) {
                document.getElementById("seasonIndicator").innerText = "Saison: " + (data.current_season || 'Saison 1');
                document.getElementById('tournamentToggleCb').checked = (data.tournament_feature_active === true || data.tournament_feature_active === "true");
            }
            loadTournaments();
        } catch(e){ console.error(e); }
    }
    initAdmin();
</script>
</body>
</html>
