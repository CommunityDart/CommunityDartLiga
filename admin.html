<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Dashboard - CDL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #03131b; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
    .shell { background: #041924; border: 1px solid rgba(231,76,60,0.4); padding: 30px; border-radius: 15px; max-width: 1400px; margin: 20px auto; }
    
    h1 { color: #e74c3c; margin-top: 0; display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 10px;}
    .back-btn { background: transparent; color: #20b7ff; border: 1px solid #20b7ff; padding: 10px 15px; cursor: pointer; border-radius: 8px; font-weight:bold; }
    
    .control-panel { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 12px; margin-bottom: 30px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px;}
    .status-badge { padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
    .status-closed { background: rgba(231,76,60,0.2); color: #e74c3c; border: 1px solid #e74c3c; }
    .status-open { background: rgba(61,220,151,0.2); color: #3ddc97; border: 1px solid #3ddc97; }
    .status-error { background: rgba(243,156,18,0.2); color: #f39c12; border: 1px solid #f39c12; }
    
    .toggle-btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .toggle-btn:hover { opacity: 0.8; }

    table { width: 100%; border-collapse: collapse; min-width: 1000px; }
    th, td { padding: 15px 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: top; }
    th { background: rgba(0,0,0,0.2); color: #90a9b7; font-size: 13px; text-transform: uppercase; }
    
    .league-select { padding: 8px; border-radius: 6px; background: #021017; color: #fff; border: 1px solid #4b87a5; outline: none; width: 100%; margin-bottom: 5px; font-size: 13px;}
    .assign-btn { background: #3ddc97; color: #000; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; width: 100%; }
    .assign-btn:hover { opacity: 0.8; }
    
    .empty-msg { text-align: center; color: #90a9b7; padding: 40px; font-style: italic; }
    .platform-tag { font-size: 11px; font-weight:bold; padding: 2px 6px; border-radius: 4px; display:inline-block; margin-bottom:4px; }
    .tag-ad { background: rgba(32,183,255,0.2); color: #20b7ff; }
    .tag-dc { background: rgba(255,159,28,0.2); color: #ff9f1c; }
    .tag-sc { background: rgba(61,220,151,0.2); color: #3ddc97; }
    
    .old-league-info { font-size: 11px; color: #90a9b7; margin-bottom: 6px; display: block; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 4px;}

    .error-box { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; font-weight: bold; }

    @media (max-width: 760px) {
      body { padding: 10px; }
      .shell { padding: 15px; }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>⚙️ Liga-Zuteilung <button class="back-btn" onclick="window.location.href='profil.html'">← Zurück</button></h1>
    
    <div id="globalErrorBox" class="error-box"></div>

    <div class="control-panel">
        <div>
            <h3 style="margin:0 0 5px 0;">Hauptschalter Anmeldung</h3>
            <span id="globalStatusBadge" class="status-badge status-closed">Lade Status...</span>
        </div>
        <button id="toggleRegistrationBtn" class="toggle-btn" style="display:none;"></button>
    </div>

    <p style="color:#90a9b7; font-size:14px; margin-bottom: 20px;">Wähle die passende Liga aus (beachte die "Bisherige Liga" für Auf-/Abstieg) und klicke auf Speichern.</p>
    
    <div style="overflow-x: auto; background: rgba(0,0,0,0.1); border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);">
      <table>
        <thead>
          <tr>
            <th width="20%">Spieler</th>
            <th width="25%">Wunsch: Autodarts</th>
            <th width="25%">Wunsch: DartCounter</th>
            <th width="25%">Wunsch: Scolia</th>
            <th width="5%">Aktion</th>
          </tr>
        </thead>
        <tbody id="waitingListBody">
          <tr><td colspan="5" class="empty-msg">Lade Daten...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const AD_LEAGUES = ["Autodarts Liga 1", "Autodarts Liga 2", "Autodarts Liga 3", "Autodarts Liga 4", "Autodarts Liga 5", "Autodarts Liga 6"];
    const DC_LEAGUES = ["DartCounter Liga 1", "DartCounter Liga 2", "DartCounter Liga 3", "DartCounter Liga 4", "DartCounter Liga 5", "DartCounter Liga 6"];
    const SC_LEAGUES = ["Scolia Liga 1", "Scolia Liga 2", "Scolia Liga 3"];

    let isRegistrationOpen = false;

    function showGlobalError(msg) {
        const box = document.getElementById("globalErrorBox");
        box.innerText = msg; box.style.display = "block";
    }

    async function initAdmin() {
        try {
            const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
            if (sessionError || !session) return window.location.href = "index.html";

            const { data: profile, error: pError } = await supabaseClient.from('profiles').select('is_admin').eq('id', session.user.id).single();
            if (pError || !profile || profile.is_admin !== true) {
                alert("Zugriff verweigert! Du bist kein Admin.");
                return window.location.href = "index.html";
            }

            await loadGlobalSettings();
            await loadWaitingList();
        } catch (x) {
            showGlobalError("Kritischer Fehler: " + x.message);
        }
    }

    async function loadGlobalSettings() {
        const badge = document.getElementById("globalStatusBadge");
        const btn = document.getElementById("toggleRegistrationBtn");

        try {
            const { data, error } = await supabaseClient.from('system_settings').select('registration_open').eq('id', 1).maybeSingle();
            if (error) throw error;
            
            isRegistrationOpen = data ? data.registration_open : false;
            btn.style.display = "block";

            if (isRegistrationOpen) {
                badge.className = "status-badge status-open"; badge.innerText = "GEÖFFNET 🟢";
                btn.style.background = "#e74c3c"; btn.style.color = "#fff";
                btn.innerText = "Anmeldung SCHLIESSEN";
                btn.onclick = () => toggleRegistration(false);
            } else {
                badge.className = "status-badge status-closed"; badge.innerText = "GESCHLOSSEN 🔴";
                btn.style.background = "#3ddc97"; btn.style.color = "#000";
                btn.innerText = "Anmeldung ÖFFNEN";
                btn.onclick = () => toggleRegistration(true);
            }
        } catch (err) {
            showGlobalError("Fehler beim Laden des Hauptschalters: " + err.message);
        }
    }

    async function toggleRegistration(newState) {
        if(!confirm(`Willst du die Anmeldung wirklich ${newState ? 'ÖFFNEN' : 'SCHLIESSEN'}?`)) return;
        
        try {
            await supabaseClient.from('system_settings').update({ registration_open: newState }).eq('id', 1);
            
            if (newState === true) {
                 // WICHTIG: Wir setzen NUR den "status_neue_saison" zurück und entfernen die Checkboxen.
                 // Die "assigned_ad_league" (etc.) bleiben erhalten, damit wir die bisherige Liga sehen!
                 await supabaseClient.from('profiles').update({ 
                     want_autodarts: false, want_dartcounter: false, want_scolia: false,
                     status_neue_saison: 'none'
                 }).neq('id', '00000000-0000-0000-0000-000000000000');
            }
            window.location.reload();
        } catch (err) { alert("Fehler beim Umschalten: " + err.message); }
    }

    function buildSelect(idPrefix, playerId, optionsArr, isWanted, currentVal) {
        if (!isWanted) return `<span style="color:#90a9b7; font-size:12px;">Nicht angemeldet</span>`;
        let html = `<span class="old-league-info">Bisher: <b style="color:#fff">${currentVal || 'Keine'}</b></span>`;
        html += `<select id="${idPrefix}_${playerId}" class="league-select">
                      <option value="" disabled ${!currentVal ? 'selected' : ''}>-- Neue Liga wählen --</option>`;
        optionsArr.forEach(l => { html += `<option value="${l}" ${currentVal === l ? 'selected' : ''}>${l}</option>`; });
        html += `</select>`;
        return html;
    }

    async function loadWaitingList() {
        const tbody = document.getElementById("waitingListBody");
        try {
            // Lade nur Spieler, die sich angemeldet oder die schon zugeteilt wurden
            const { data: players, error } = await supabaseClient.from('profiles').select('*')
                .in('status_neue_saison', ['waiting', 'assigned']);

            if (error) throw error;

            if (!players || players.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">Noch keine Anmeldungen für die neue Saison vorhanden.</td></tr>';
                return;
            }

            tbody.innerHTML = players.map(p => {
                const isEingeteilt = p.status_neue_saison === 'assigned';
                return `
                <tr style="${isEingeteilt ? 'background:rgba(61,220,151,0.05);' : ''}">
                  <td>
                    <strong style="color: #fff; font-size:16px;">${htmlEscape(p.discord_name || 'Unbekannt')}</strong><br>
                    <span style="font-size:12px; color:#90a9b7;">Echt: ${htmlEscape(p.real_name || '-')}</span>
                  </td>
                  <td>
                    ${p.want_autodarts ? `<span class="platform-tag tag-ad">Autodarts</span><br><span style="font-size:12px;color:#90a9b7;">AVG: ${htmlEscape(p.autodarts_avg || '-')}</span><br>` : ''}
                    ${buildSelect('ad', p.id, AD_LEAGUES, p.want_autodarts, p.assigned_ad_league)}
                  </td>
                  <td>
                    ${p.want_dartcounter ? `<span class="platform-tag tag-dc">DartCounter</span><br><span style="font-size:12px;color:#90a9b7;">AVG: ${htmlEscape(p.dartcounter_avg || '-')}</span><br>` : ''}
                    ${buildSelect('dc', p.id, DC_LEAGUES, p.want_dartcounter, p.assigned_dc_league)}
                  </td>
                  <td>
                    ${p.want_scolia ? `<span class="platform-tag tag-sc">Scolia</span><br><span style="font-size:12px;color:#90a9b7;">AVG: ${htmlEscape(p.scolia_avg || '-')}</span><br>` : ''}
                    ${buildSelect('sc', p.id, SC_LEAGUES, p.want_scolia, p.assigned_sc_league)}
                  </td>
                  <td style="text-align:center;">
                    <button class="assign-btn" onclick="saveAssignments('${p.id}', ${p.want_autodarts}, ${p.want_dartcounter}, ${p.want_scolia})">Speichern</button>
                    ${isEingeteilt ? '<div style="color:#3ddc97; font-size:11px; margin-top:5px;">✓ Eingeteilt</div>' : ''}
                  </td>
                </tr>
            `}).join("");
        } catch (err) { showGlobalError("Fehler beim Laden der Warteliste: " + err.message); }
    }

    window.saveAssignments = async function(playerId, wantAD, wantDC, wantSC) {
        const updates = { status_neue_saison: 'assigned' };
        if(wantAD) updates.assigned_ad_league = document.getElementById(`ad_${playerId}`)?.value || null;
        if(wantDC) updates.assigned_dc_league = document.getElementById(`dc_${playerId}`)?.value || null;
        if(wantSC) updates.assigned_sc_league = document.getElementById(`sc_${playerId}`)?.value || null;

        try {
            const { error } = await supabaseClient.from('profiles').update(updates).eq('id', playerId);
            if (error) throw error;
            await loadWaitingList();
        } catch (err) { alert("Fehler beim Speichern: " + err.message); }
    };

    function htmlEscape(value) { return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }

    initAdmin();
  </script>
</body>
</html>
