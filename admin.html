<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #03131b; color: #fff; font-family: sans-serif; padding: 20px; }
    .shell { background: #041924; padding: 30px; border-radius: 15px; max-width: 1200px; margin: auto; }
    .tab-btn { background: #021017; color: #90a9b7; border: 1px solid #4b87a5; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    .tab-btn.active { background: #e74c3c; color: #fff; }
    .tab-content { display: none; } .tab-content.active { display: block; }
    .league-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #444; }
    .assign-btn { background: #3ddc97; border: none; padding: 8px; cursor: pointer; border-radius: 4px; }
  </style>
</head>
<body>
<div class="shell">
  <h1>⚙️ Kommandozentrale</h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('zuteilung')">1. Spieler & Testspieler</button>
    <button class="tab-btn" onclick="switchTab('saison')">2. Ligen & Saison</button>
  </div>

  <div id="zuteilung" class="tab-content active">
     <div class="dummy-box" style="background:#052130; padding:15px; border-radius:8px; margin-bottom:20px;">
         <input type="text" id="dummyNameInput" placeholder="Name für Testspieler">
         <button onclick="createDummyPlayer()" class="assign-btn">➕ Testspieler anlegen</button>
     </div>
     <table id="playerTable"><thead><tr><th>Name</th><th>Aktion</th></tr></thead><tbody id="playerBody"></tbody></table>
  </div>

  <div id="saison" class="tab-content">
      <div id="leagueStatusList">Lade Ligen...</div>
      <hr>
      <button class="assign-btn" style="background:#e74c3c;" onclick="openNewSeason()">Saisonwechsel erzwingen</button>
  </div>
</div>

<script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.switchTab = (id) => {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // SICHERES ANLEGEN OHNE CRYPTO.RANDOMUUID
    window.createDummyPlayer = async function() {
        const name = document.getElementById("dummyNameInput").value.trim();
        if(!name) return;
        
        // Supabase generiert die ID automatisch, wenn wir sie weglassen (oder wir nutzen einen Timestamp)
        const { error } = await supabaseClient.from('profiles').insert([{
            discord_name: name,
            real_name: name + " (Dummy)",
            status_neue_saison: 'waiting'
        }]);
        if(error) alert(error.message); else { alert("Spieler angelegt!"); location.reload(); }
    }

    async function loadSaisonSettings() {
        const container = document.getElementById("leagueStatusList");
        const { data: leagues } = await supabaseClient.from('league_status').select('*');
        container.innerHTML = leagues.map(l => `
            <div class="league-row">
                <span>${l.league_name} ${l.is_finished ? '✅ (Beendet)' : '⏳ (Läuft)'}</span>
                ${!l.is_finished ? `<button class="assign-btn" onclick="finishLeague('${l.league_name}')">Liga beenden</button>` : ''}
            </div>
        `).join("");
    }

    window.finishLeague = async (name) => {
        // 1. Markiere Liga als fertig
        await supabaseClient.from('league_status').update({is_finished: true}).eq('league_name', name);
        // 2. Berechne Auf/Abstieg (Logik wie vorher)
        alert("Liga " + name + " beendet!");
        loadSaisonSettings();
    }

    initAdmin();
</script>
</body>
</html>
