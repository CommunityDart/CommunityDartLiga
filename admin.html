<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Admin Dashboard - CDL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0f1c24; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
    .shell { background: #162a35; border: 1px solid rgba(231,76,60,0.4); padding: 30px; border-radius: 15px; max-width: 1400px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
    
    h1 { color: #e74c3c; margin-top: 0; display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; gap: 10px;}
    .back-btn { background: transparent; color: #20b7ff; border: 1px solid #20b7ff; padding: 10px 15px; cursor: pointer; border-radius: 8px; font-weight:bold; transition: 0.2s; }
    .back-btn:hover { background: rgba(32,183,255,0.1); }
    
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; overflow-x: auto; }
    .tab-btn { background: rgba(0,0,0,0.2); color: #a3b8c5; border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.2s; }
    .tab-btn:hover { background: rgba(255,255,255,0.05); }
    .tab-btn.active { background: rgba(231,76,60,0.2); color: #e74c3c; border-color: #e74c3c; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th, td { padding: 15px 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
    th { background: rgba(0,0,0,0.15); color: #a3b8c5; font-size: 13px; text-transform: uppercase; }
    
    .league-select, .leg-input { padding: 8px; border-radius: 6px; background: #0f1c24; color: #fff; border: 1px solid #4b87a5; outline: none; font-size: 13px;}
    .leg-input { width: 50px; text-align: center; font-weight: bold; font-size: 16px; }
    
    .assign-btn { background: #2ecc71; color: #fff; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
    .remove-btn { background: #e74c3c; color: #fff; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; margin-top: 5px; width: 100%;}
    
    .card-btn { background: #0f1c24; color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .empty-msg { text-align: center; color: #a3b8c5; padding: 40px; font-style: italic; }
    .status-badge { padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; display: inline-block; margin-bottom: 10px;}
    
    .dummy-box { background: rgba(32,183,255,0.04); border: 1px dashed rgba(32,183,255,0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .single-league-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="shell">
    <h1>⚙️ Kommandozentrale <button class="back-btn" onclick="window.location.href='profil.html'">← Zurück</button></h1>
    
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('zuteilung')">1. Liga Zuteilung</button>
      <button class="tab-btn" onclick="switchTab('spielplan'); loadMatchSettings();">2. Spielpläne & Ergebnisse</button>
      <button class="tab-btn" onclick="switchTab('strafen'); loadCards();">3. Strafenkatalog</button>
      <button class="tab-btn" onclick="switchTab('saison'); loadSaisonSettings();">4. Saison Beenden</button>
    </div>

    <div id="zuteilung" class="tab-content active">
      <div class="dummy-box">
         <span style="font-weight: bold; color: #20b7ff; font-size: 14px;">🎲 Testspieler-Tool:</span>
         <input type="text" id="dummyNameInput" class="league-select" style="width: 200px; margin: 0;" placeholder="Spielername eingeben">
         <button onclick="createDummyPlayer()" class="assign-btn" style="width: auto; background: #20b7ff; color: #000; padding: 8px 15px;">➕ Spieler anlegen</button>
      </div>
      <table>
        <thead><tr><th>Spieler</th><th>Autodarts</th><th>DartCounter</th><th>Scolia</th><th>Aktion</th></tr></thead>
        <tbody id="waitingListBody"><tr><td colspan="5" class="empty-msg">Lade Daten...</td></tr></tbody>
      </table>
    </div>

    <div id="spielplan" class="tab-content">
      <select id="leagueSelector" class="league-select" onchange="loadMatchesForLeague()"><option value="">-- Liga auswählen --</option></select>
      <button id="generateScheduleBtn" class="assign-btn" style="background:#20b7ff; display:none; width:auto;" onclick="generateSchedule()">🎲 Spielplan generieren</button>
      <div id="matchesArea" style="margin-top:20px;"></div>
    </div>

    <div id="strafen" class="tab-content">
      <table>
        <thead><tr><th>Spieler</th><th>Gelbe Karten</th><th>Rote Karten</th><th>Aktion</th></tr></thead>
        <tbody id="cardsListBody"></tbody>
      </table>
    </div>

    <div id="saison" class="tab-content">
       <h3>Aktuelle Saison: <span id="currentSeasonNameDisplay" style="color:#20b7ff;">Saison 1</span></h3>
       <div id="singleLeaguesControlArea">Lade Ligen...</div>
       <hr style="border:none; border-top:1px solid rgba(255,255,255,0.08); margin:20px 0;">
       <input type="text" id="newSeasonNameInput" class="league-select" placeholder="Name der NEUEN Saison">
       <button class="assign-btn" style="background:#e74c3c; width:auto;" onclick="openNewSeason()">Anmeldung für neue Saison öffnen</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const ALL_LEAGUES = ["Autodarts Liga 1", "Autodarts Liga 2", "DartCounter Liga 1", "DartCounter Liga 2", "Scolia Liga 1"];
    let currentSeasonGlobal = "Saison 1";

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function initAdmin() {
        const { data: sysData } = await supabaseClient.from('system_settings').select('*').eq('id', 1).single();
        if(sysData) currentSeasonGlobal = sysData.current_season;
        loadWaitingList();
    }

    window.createDummyPlayer = async function() {
        const name = document.getElementById("dummyNameInput").value.trim();
        if(!name) return;
        await supabaseClient.from('profiles').insert([{ discord_name: name, real_name: name + " (Dummy)", status_neue_saison: 'waiting', want_autodarts:true, want_dartcounter:true, want_scolia:true }]);
        location.reload();
    }

    window.loadWaitingList = async function() {
        const { data: players } = await supabaseClient.from('profiles').select('*').in('status_neue_saison', ['waiting', 'assigned']);
        document.getElementById("waitingListBody").innerHTML = (players || []).map(p => `<tr>
            <td><b>${htmlEscape(p.discord_name)}</b></td>
            <td><select id="ad_${p.id}" class="league-select"><option value="REMOVE">❌</option>${getOptions(p.assigned_ad_league)}</select></td>
            <td><select id="dc_${p.id}"><option value="REMOVE">❌</option>${getOptions(p.assigned_dc_league)}</select></td>
            <td><select id="sc_${p.id}"><option value="REMOVE">❌</option>${getOptions(p.assigned_sc_league)}</select></td>
            <td><button class="assign-btn" style="padding:6px 12px;" onclick="saveAssignments('${p.id}')">💾</button></td>
        </tr>`).join("");
    }

    function getOptions(val) { return ALL_LEAGUES.map(l => `<option value="${l}" ${val===l?'selected':''}>${l}</option>`).join(""); }

    window.saveAssignments = async function(id) {
        const up = { status_neue_saison:'assigned', assigned_ad_league: document.getElementById('ad_'+id).value==='REMOVE'?null:document.getElementById('ad_'+id).value, assigned_dc_league: document.getElementById('dc_'+id).value==='REMOVE'?null:document.getElementById('dc_'+id).value, assigned_sc_league: document.getElementById('sc_'+id).value==='REMOVE'?null:document.getElementById('sc_'+id).value };
        await supabaseClient.from('profiles').update(up).eq('id', id); loadWaitingList();
    }

    function htmlEscape(v) { return String(v).replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
    initAdmin();
  </script>
</body>
</html>
