<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Community Dart Liga</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8141059951423155" crossorigin="anonymous"></script>

  <style>
    /* ... dein CSS-Code bleibt hier unverändert ... */
    :root{ --bg:#03131b; --panel:#041924; --line:rgba(120,170,195,.12); --text:#f5fbff; --muted:#90a9b7; --green:#3ddc97; --red:#e74c3c; --yellow:#f7c948; --accent:#20b7ff; --accent-border:rgba(32,183,255,.42); --row-a:#052130; --row-b:#041924; }
    /* ... (restliches CSS) ... */
  </style>

<body data-mode="Home">
  <div class="wrap">
    <section class="hero-banner image-banner"></section>

    <div id="auth-container" style="margin-bottom: 15px; text-align: center;">
        <div id="login-section">
            <button id="discord-login-btn" class="hero-action-btn hero-btn-discord">Login mit Discord</button>
        </div>
        <div id="profile-section" style="display: none;">
            <strong id="user-name"></strong>
            <button id="logout-btn" class="button">Abmelden</button>
        </div>
    </div>

  </div>

  <script>
    // --- Supabase Initialisierung ---
    const supabaseUrl = 'https://ppxwnqbovrnvzkcpyrcj.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // --- Login-Logik ---
    document.addEventListener("DOMContentLoaded", () => {
        const loginBtn = document.getElementById('discord-login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const loginSection = document.getElementById('login-section');
        const profileSection = document.getElementById('profile-section');
        const userNameSpan = document.getElementById('user-name');

        if (loginBtn) {
            loginBtn.addEventListener('click', async () => {
                const { error } = await supabase.auth.signInWithOAuth({ provider: 'discord' });
                if (error) console.error("Login Fehler:", error.message);
            });
        }

        if (logoutBtn) {
            logoutBtn.addEventListener('click', async () => {
                await supabase.auth.signOut();
                location.reload(); // Seite neu laden nach Logout
            });
        }

        // Status prüfen
        async function checkUserStatus() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session && session.user) {
                if (loginSection) loginSection.style.display = 'none';
                if (profileSection) profileSection.style.display = 'block';
                userNameSpan.textContent = "Eingeloggt als: " + (session.user.user_metadata.full_name || "Spieler");
            }
        }
        checkUserStatus();
    });

    // --- Dein restlicher JS Code für Tabellen etc. ... ---
    // (loadAll, setMode, renderLeague etc. einfach hier weiterführen)
    loadAll();
  </script>
</body>
</html>
