<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CDL Testversion</title>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8141059951423155" crossorigin="anonymous"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#03131b;
      --panel:#041924;
      --line:rgba(120,170,195,.12);
      --text:#f5fbff;
      --muted:#90a9b7;
      --green:#3ddc97;
      --red:#e74c3c;
      --yellow:#f7c948;
      --accent:#20b7ff;
      --accent-border:rgba(32,183,255,.42);
      --row-a:#052130;
      --row-b:#041924;
    }

    body[data-mode="DartCounter"]{
      --accent:#ff9f1c;
      --accent-border:rgba(255,159,28,.42);
    }

    body[data-mode="Home"]{
      --accent:#20b7ff;
      --accent-border:rgba(32,183,255,.42);
    }

    body[data-mode="Profil"]{
      --accent:#3ddc97;
      --accent-border:rgba(61,220,151,.42);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}

    body{
      font-family:Arial,Helvetica,sans-serif;
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 14%, transparent), transparent 22%),
        linear-gradient(180deg, var(--bg) 0%, #021017 100%);
      color:var(--text);
      min-height:100vh;
      transition:background .2s ease;
    }

    .wrap{
      width:min(1400px, calc(100% - 28px));
      margin:0 auto;
      padding:8px 0 42px;
    }

    .button,
    .mode-btn,
    .footer-btn,
    .footer-link,
    .info-btn{
      border:1px solid rgba(75,135,165,.28);
      background:rgba(4,25,36,.96);
      color:var(--text);
      border-radius:12px;
      min-height:46px;
      padding:0 16px;
      font-size:14px;
      outline:none;
      cursor:pointer;
      font-weight:800;
      transition:.16s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }

    .button:hover,
    .mode-btn:hover,
    .footer-btn:hover,
    .footer-link:hover,
    .info-btn:hover{
      border-color:var(--accent-border);
      background:#082738;
      transform:translateY(-1px);
    }

    .hero-banner.image-banner{
      position:relative;
      margin:0 0 14px;
      min-height:420px;
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        0 18px 44px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.06);
      background:
        linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.14)),
        url("banner.png") center center / cover no-repeat;
      transition: box-shadow .2s ease;
    }

    .hero-banner.image-banner::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.03) 0%, rgba(0,0,0,.08) 55%, rgba(0,0,0,.16) 100%);
      pointer-events:none;
    }

    body[data-mode="Home"] .hero-banner.image-banner,
    body[data-mode="Autodarts"] .hero-banner.image-banner{
      box-shadow:
        0 18px 44px rgba(0,0,0,.34),
        0 0 0 1px rgba(32,183,255,.20),
        0 0 28px rgba(32,183,255,.14);
    }

    body[data-mode="DartCounter"] .hero-banner.image-banner{
      box-shadow:
        0 18px 44px rgba(0,0,0,.34),
        0 0 0 1px rgba(255,159,28,.20),
        0 0 28px rgba(255,159,28,.14);
    }

    .top-nav-wrap{
      width:min(1200px, 100%);
      margin:0 auto 12px;
    }

    .banner-nav-shell{
      display:flex;
      justify-content:center;
      align-items:center;
      margin-bottom:10px;
    }

    .banner-nav{
      width:100%;
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:12px;
      padding:12px;
      border-radius:22px;
      background:rgba(4,12,14,.22);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        0 10px 24px rgba(0,0,0,.20),
        inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .discord-button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      grid-column: span 1;
    }

    .hero-action-btn{
      position:relative;
      width:100%;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(6,20,30,.38);
      color:#f5fbff;
      border-radius:16px;
      min-height:50px;
      padding:0 14px;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:10px;
      transition:.22s ease;
      white-space:nowrap;
      overflow:hidden;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      box-shadow:
        0 10px 22px rgba(0,0,0,.22),
        inset 0 1px 0 rgba(255,255,255,.10),
        inset 0 -1px 0 rgba(255,255,255,.03);
    }

    .discord-button-group .hero-action-btn {
      min-height: 44px;
      font-size: 13px;
    }

    .hero-action-btn::before{
      content:"";
      position:absolute;
      inset:1px;
      border-radius:15px;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,0));
      pointer-events:none;
    }

    .hero-action-btn::after{
      content:"";
      position:absolute;
      top:-120%;
      left:-35%;
      width:38%;
      height:300%;
      transform:rotate(18deg);
      background:linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,.18), rgba(255,255,255,0));
      opacity:0;
      transition:opacity .2s ease, transform .45s ease;
      pointer-events:none;
    }

    .hero-action-btn:hover{
      transform:translateY(-2px);
      background:rgba(10,28,40,.48);
      border-color:rgba(255,255,255,.24);
      box-shadow:
        0 14px 28px rgba(0,0,0,.24),
        0 0 22px rgba(255,255,255,.06),
        inset 0 1px 0 rgba(255,255,255,.14);
    }

    .hero-action-btn:hover::after{
      opacity:1;
      transform:translateX(230%) rotate(18deg);
    }

    .hero-btn-autodarts{
      background:rgba(36,141,255,.20);
      border-color:rgba(90,180,255,.45);
      box-shadow:
        0 10px 22px rgba(0,0,0,.22),
        0 0 0 1px rgba(36,141,255,.14),
        0 0 20px rgba(36,141,255,.14),
        inset 0 1px 0 rgba(255,255,255,.12);
    }

    .hero-btn-dartcounter{
      background:rgba(255,154,31,.18);
      border-color:rgba(255,186,90,.42);
      box-shadow:
        0 10px 22px rgba(0,0,0,.22),
        0 0 0 1px rgba(255,154,31,.12),
        0 0 20px rgba(255,154,31,.12),
        inset 0 1px 0 rgba(255,255,255,.12);
    }

    .hero-btn-discord{
      background:rgba(88,101,242,.28);
      border-color:rgba(162,170,255,.42);
      box-shadow:
        0 10px 22px rgba(0,0,0,.22),
        0 0 0 1px rgba(88,101,242,.14),
        0 0 20px rgba(88,101,242,.16),
        inset 0 1px 0 rgba(255,255,255,.12);
    }

    .hero-btn-profil{
      background:rgba(61,220,151,.20);
      border-color:rgba(61,220,151,.45);
    }

    .hero-btn-dark{
      background:rgba(3,19,27,.42);
      border-color:rgba(120,170,195,.18);
      box-shadow:
        0 10px 22px rgba(0,0,0,.22),
        inset 0 1px 0 rgba(255,255,255,.08);
    }

    #modeHome.active{
      background:rgba(32,183,255,.25);
      border-color:rgba(130,205,255,.72);
      box-shadow: 0 14px 28px rgba(0,0,0,.24), 0 0 28px rgba(32,183,255,.28);
    }

    #modeAutodarts.active{
      background:rgba(36,141,255,.30);
      border-color:rgba(130,205,255,.72);
      box-shadow: 0 14px 28px rgba(0,0,0,.24), 0 0 28px rgba(36,141,255,.28);
    }

    #modeDartCounter.active{
      background:rgba(255,154,31,.28);
      border-color:rgba(255,206,130,.72);
      box-shadow: 0 14px 28px rgba(0,0,0,.24), 0 0 28px rgba(255,154,31,.24);
    }

    #modeProfil.active{
      background:rgba(61,220,151,.28);
      border-color:rgba(130,255,180,.72);
      box-shadow:0 14px 28px rgba(0,0,0,.24), 0 0 28px rgba(61,220,151,.24);
    }

    .discord-icon{
      width:18px;
      height:18px;
      fill:currentColor;
      flex:0 0 18px;
      display:block;
      filter:drop-shadow(0 0 6px rgba(255,255,255,.18));
    }

    .submenu-row{
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:12px;
      margin-top:10px;
      align-items:start;
    }

    .submenu-slot{
      min-height:52px;
      display:none;
      flex-wrap:wrap;
      gap:10px;
      align-items:flex-start;
      overflow:visible;
      padding-bottom:0;
    }

    .submenu-slot.active{ display:flex; }
    .submenu-slot.left{ grid-column:1 / span 3; }
    .submenu-slot.middle{ grid-column:2 / span 3; }

    .submenu-btn{
      border:1px solid rgba(75,135,165,.24);
      background:rgba(5,26,37,.92);
      color:#dff3ff;
      padding:11px 14px;
      min-height:42px;
      border-radius:12px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      transition:.16s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 6px 14px rgba(0,0,0,.18);
      white-space:nowrap;
      flex:0 0 auto;
    }

    .submenu-btn:hover{
      transform:translateY(-1px);
      border-color:var(--accent-border);
      background:#082738;
    }

    .submenu-btn.active{
      color:#fff;
      border-color:var(--accent-border);
      background:#082738;
      box-shadow:
        inset 3px 0 0 var(--accent),
        0 0 18px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .ad-banner-slot {
      width: 100%;
      min-height: 90px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(32, 183, 255, 0.15);
      border-radius: 16px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 0 15px rgba(32, 183, 255, 0.05);
    }

    .ad-banner-slot ins {
      width: 100%;
      height: 100%;
    }

    .main{
      display:grid;
      grid-template-columns:minmax(0,1.7fr) minmax(320px,.8fr);
      gap:18px;
      align-items:start;
    }

    body[data-mode="Home"] .main,
    body[data-mode="Profil"] .main {
      grid-template-columns: 1fr;
    }
    body[data-mode="Home"] .sidebar,
    body[data-mode="Profil"] .sidebar {
      display: none;
    }

    .table-shell,
    .matchday{
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(6,27,37,.96), rgba(4,20,28,.98));
      box-shadow:0 18px 50px rgba(0,0,0,.35);
      border-radius:18px;
    }

    body[data-mode="DartCounter"] .table-shell,
    body[data-mode="DartCounter"] .matchday{
      background:linear-gradient(180deg, rgba(48,24,8,.96), rgba(30,14,4,.98));
      border-color:rgba(255,159,28,.22);
      box-shadow: 0 18px 50px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04);
    }

    .table-shell{ overflow:hidden; }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      padding:18px 18px 12px;
      flex-wrap:wrap;
    }

    .section-title{
      margin:0;
      font-size:18px;
      font-weight:900;
      letter-spacing:.01em;
    }

    .section-sub{
      color:var(--muted);
      font-size:13px;
    }

    body[data-mode="DartCounter"] .section-sub{ color:#f3c98f; }

    /* Profil-Formular Layout */
    .profile-container { padding: 20px; }
    .profile-header-ui {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      background: rgba(255,255,255,0.02);
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
    }
    .profile-header-ui img {
      border-radius: 50%;
      border: 2px solid var(--accent);
      width: 64px;
      height: 64px;
    }
    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
    @media (max-width: 760px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; font-weight: 700; color: var(--muted); }
    .form-group input {
      background: #03131b;
      border: 1px solid rgba(75,135,165,.28);
      border-radius: 8px;
      min-height: 42px;
      padding: 0 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    .form-group input:focus { border-color: var(--accent); }
    .form-actions { margin-top: 24px; display: flex; gap: 12px; }

    .table-wrap{ overflow-x:auto; padding:0 0 6px; }
    table{ width:100%; border-collapse:collapse; min-width:760px; table-layout:fixed; }

    thead th{
      padding:14px 16px;
      color:#c8dce6;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.04em;
      border-bottom:1px solid var(--line);
      background:#041722;
      white-space:nowrap;
      text-align:left;
      min-width:90px;
    }

    thead th:nth-child(3), thead th:nth-child(4), thead th:nth-child(5), thead th:nth-child(6), thead th:nth-child(7){ text-align:center; }
    body[data-mode="DartCounter"] thead th{ background:#3a1d08; color:#ffe2b8; border-bottom:1px solid rgba(255,159,28,.20); }
    tbody tr:nth-child(odd) td{background:var(--row-a)}
    tbody tr:nth-child(even) td{background:var(--row-b)}
    body[data-mode="DartCounter"] tbody tr:nth-child(odd) td{ background:#402008; }
    body[data-mode="DartCounter"] tbody tr:nth-child(even) td{ background:#2f1706; }

    tbody td{ padding:14px 16px; border-bottom:1px solid rgba(120,170,195,.08); font-size:15px; color:#f1f8fb; white-space:nowrap; vertical-align:top; }
    body[data-mode="DartCounter"] tbody td{ border-bottom:1px solid rgba(255,159,28,.08); }
    tbody tr:hover td{background:#0a2b3b}
    body[data-mode="DartCounter"] tbody tr:hover td{background:#5a2b08}

    .rank-col{ width:84px; font-weight:900; position:relative; }
    .rank-col.first::before, .rank-col.last::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:10px; }
    .rank-col.first::before{ background:var(--green); }
    .rank-col.last::before{ background:var(--red); }

    .player-cell{ width:140px; min-width:140px; font-weight:800; }
    .player-name{ display:block; font-weight:600; color:#fff; white-space:normal; line-height:1.25; }
    .player-meta-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:4px; }
    .discord-cell { color:#8ec9ee; font-weight:700; font-size:14px; }
    body[data-mode="DartCounter"] .discord-cell { color:#ffd08a; }
    .player-discord{ display:block; font-size:12px; line-height:1.25; color:#8ec9ee; font-weight:700; white-space:normal; }
    body[data-mode="DartCounter"] .player-discord{ color:#ffd08a; }

    .player-cards{ display:inline-flex; align-items:center; gap:5px; flex-wrap:wrap; }
    .card-badge{ display:inline-block; width:14px; height:18px; border-radius:3px; border:1px solid rgba(255,255,255,.20); box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 2px 6px rgba(0,0,0,.18); }
    .card-badge.yellow{ background:#f7c948; border-color:rgba(0,0,0,.22); }
    .card-badge.red{ background:#e74c3c; border-color:rgba(255,255,255,.14); }
    .points-cell{ font-weight:900; color:#fff; }
    body[data-mode="DartCounter"] .points-cell{ color:#fff4e3; }

    thead th:nth-child(3), thead th:nth-child(4), thead th:nth-child(5), thead th:nth-child(6), thead th:nth-child(7),
    tbody td:nth-child(3), tbody td:nth-child(4), tbody td:nth-child(5), tbody td:nth-child(6), tbody td:nth-child(7){ width:110px; text-align:center; }

    .sidebar{ display:flex; flex-direction:column; gap:14px; }
    .matchday-list{ display:flex; flex-direction:column; gap:12px; }
    .matchday{ overflow:hidden; }
    .matchday-head{ width:100%; border:none; background:transparent; color:var(--text); padding:16px 16px; display:flex; justify-content:space-between; align-items:center; gap:10px; cursor:pointer; text-align:left; }
    .matchday-title{ font-size:16px; font-weight:900; flex:1; min-width:0; }
    .matchday-head-right{ display:flex; align-items:center; justify-content:flex-end; gap:10px; width:96px; min-width:96px; flex:0 0 96px; }
    .matchday-progress{ width:46px; text-align:right; font-size:12px; font-weight:900; color:#cfe5ef; letter-spacing:.02em; white-space:nowrap; }
    .status-dot{ width:11px; height:11px; border-radius:50%; display:inline-block; flex:0 0 11px; }
    .status-dot.done{ background:var(--green); box-shadow:0 0 10px rgba(61,220,151,.65); }
    .status-dot.open{ background:var(--red); box-shadow:0 0 10px rgba(231,76,60,.65); }
    .status-badge{ display:inline-flex; align-items:center; justify-content:center; width:38px; min-width:38px; height:28px; padding:0; border-radius:999px; font-size:12px; font-weight:800; border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); white-space:nowrap; flex-shrink:0; }
    .status-badge.done{ color:var(--green); border-color:rgba(61,220,151,.28); }
    .status-badge.open{ color:var(--red); border-color:rgba(231,76,60,.28); }
    .matchday-body{ display:none; padding:0 14px 14px; }
    .matchday.open .matchday-body{ display:block; }
    .match-table{ width:100%; min-width:100%; border-collapse:collapse; border-radius:12px; overflow:hidden; table-layout:auto; }
    .match-table td{ padding:12px 10px; font-size:13px; border-bottom:1px solid rgba(120,170,195,.08); white-space:normal; background:rgba(255,255,255,.02); color:#edf7fb; vertical-align:middle; }
    body[data-mode="DartCounter"] .match-table td{ background:rgba(255,255,255,.015); border-bottom:1px solid rgba(255,159,28,.08); }
    .match-table tbody tr:first-child td{ border-top:none; }
    .match-player{ display:block; min-height:22px; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .match-table td.col-player{ min-width:120px; }
    .col-player{ width:auto; }
    .col-legs{ width:64px; text-align:center; }
    .col-status{ width:96px; text-align:right; }
    .status-cell{ width:96px; min-width:96px; text-align:right !important; vertical-align:middle; white-space:nowrap !important; overflow:visible; padding-right:10px !important; }

    .empty{ border:1px dashed rgba(120,170,195,.18); border-radius:14px; padding:14px; color:var(--muted); font-size:14px; }
    body[data-mode="DartCounter"] .empty{ border-color:rgba(255,159,28,.24); color:#f3c98f; }

    .footer{ margin-top:20px; display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }
    .footer-note{ width:100%; text-align:center; color:#7c95a3; font-size:12px; margin-top:4px; }

    .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.62); display:none; align-items:center; justify-content:center; padding:20px; z-index:1000; }
    .modal-backdrop.open{ display:flex; }
    .modal{ width:min(840px, 100%); max-height:min(88vh, 920px); background:linear-gradient(180deg, rgba(6,27,37,.98), rgba(4,20,28,.99)); border:1px solid var(--line); border-radius:20px; box-shadow:0 24px 60px rgba(0,0,0,.45); overflow:hidden; display:flex; flex-direction:column; }
    .modal-head{ display:flex; justify-content:space-between; align-items:center; gap:12px; padding:18px 18px 14px; border-bottom:1px solid rgba(120,170,195,.10); }
    .modal-title{ margin:0; font-size:18px; font-weight:900; }
    .modal-close{ width:40px; height:40px; min-height:40px; padding:0; border-radius:12px; }
    .modal-body{ padding:18px; color:#d7e8ef; line-height:1.6; font-size:14px; overflow:auto; }
    .modal-body p{ margin:0 0 12px; }
    .content-block{ margin-bottom:18px; padding:14px; border:1px solid rgba(120,170,195,.10); border-radius:14px; background:rgba(255,255,255,.02); }
    .content-block h4{ margin:0 0 8px; font-size:15px; color:#fff; }
    .content-block:last-child{ margin-bottom:0; }

    @media (max-width:1180px){
      .banner-nav{ grid-template-columns:repeat(3, minmax(0, 1fr)); }
      .submenu-row{ grid-template-columns:repeat(3, minmax(0, 1fr)); }
      .submenu-slot.left, .submenu-slot.middle{ grid-column:auto; }
    }
    @media (max-width:1100px){
      .hero-banner.image-banner{ min-height:260px; background-position:center center; }
      .main{grid-template-columns:1fr}
      .sidebar{order:2}
    }
    @media (max-width:760px){
      .wrap{width:min(100% - 16px, 1400px)}
      .button,.footer-btn,.footer-link{width:100%}

    function normalize(value) { return String(value ?? "").trim().toLowerCase().replace(/\s+/g, " "); }
    function htmlEscape(value) { return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }

    function makeClickable(text) {
      if (!text) return "";
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      return text.replace(urlRegex, function(url) {
        return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="color:var(--accent); text-decoration:underline; word-break:break-all;">${url}</a>`;
      });
    }

    function csvUrl(sheetName) {
      if (sheetName === PLAYER_SHEET) { return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=2009950588`; }
      return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
    }

    function ergName(leagueName) { return `Erg ${leagueName}`; }

    function parseCsv(text) {
      const rows = []; let row = []; let cell = ""; let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i]; const next = text[i + 1];
        if (inQuotes) {
          if (char === '"' && next === '"') { cell += '"'; i++; }
          else if (char === '"') { inQuotes = false; }
          else { cell += char; }
        } else {
          if (char === '"') { inQuotes = true; }
          else if (char === ',') { row.push(cell); cell = ""; }
          else if (char === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; }
          else if (char !== '\r') { cell += char; }
        }
      }
      row.push(cell); rows.push(row); return rows;
    }

    async function loadCsv(sheetName) {
      const response = await fetch(csvUrl(sheetName));
      if (!response.ok) throw new Error(`${sheetName}: HTTP ${response.status}`);
      return parseCsv(await response.text());
    }

    function safeCell(row, index) { return row && row[index] !== undefined ? String(row[index]).trim() : ""; }
    function rowHasAnyContent(row) { return row && row.some(cell => normalize(cell) !== ""); }
    function isFinishedMatch(statusValue, legs1, legs2) {
      const statusText = String(statusValue || "").trim().toLowerCase();
      return /fertig|abgeschlossen|done|closed/i.test(statusText) || (String(legs1 || "").trim() !== "" && String(legs2 || "").trim() !== "" && legs1 !== "-" && legs2 !== "-");
    }

    function parseCardInfo(rawValue) {
      const value = normalize(rawValue).replace(/,/g, " ").replace(/;/g, " ").replace(/\s+/g, " ").trim();
      if (!value) return { yellow: 0, red: 0, hasRed: false };
      if (value.includes("rot")) return { yellow: 0, red: 1, hasRed: true };
      const gelbCount = (value.match(/gelb/g) || []).length;
      if (gelbCount >= 2 || value.includes("2x gelb") || value.includes("2xgelb") || value.includes("gelb gelb")) { return { yellow: 2, red: 0, hasRed: false }; }
      if (gelbCount >= 1) return { yellow: 1, red: 0, hasRed: false };
      return { yellow: 0, red: 0, hasRed: false };
    }

    function parsePlayerDiscordSheet(rows) {
      if (!rows || !rows.length) return {};
      const map = {};
      for (let i = 0; i < rows.length; i++) {
        const spieler = safeCell(rows[i], 0); const discord = safeCell(rows[i], 1); const karte = safeCell(rows[i], 6);
        if (!spieler) continue;
        const nSpieler = normalize(spieler);
        if (!nSpieler || ["spieler", "name", "spielername"].includes(nSpieler)) continue;
        map[nSpieler] = { discord: discord || "", ...parseCardInfo(karte) };
      }
      return map;
    }

    function parseStandingsFromLeagueSheet(rows) {
      if (!rows || !rows.length) return { headers: [], rows: [] };
      let tabelleMarker = -1; let spieltageMarker = -1;
      for (let i = 0; i < rows.length; i++) {
        const text = rows[i].map(c => normalize(c)).join(" | ");
        if (tabelleMarker === -1 && text.includes("tabelle")) tabelleMarker = i;
        if (spieltageMarker === -1 && (text.includes("spieltage") || text.includes("spieltag"))) spieltageMarker = i;
      }
      if (tabelleMarker === -1) return { headers: [], rows: [] };
      const start = tabelleMarker + 1; const end = spieltageMarker > start ? spieltageMarker : rows.length;
      const headers = ["Platz", "Spieler", "Siege", "Niederlagen", "Leg-Diff", "Punkte"]; const body = [];
      for (let i = start; i < end; i++) {
        const row = rows[i]; if (!rowHasAnyContent(row)) continue;
        const platz = safeCell(row, 0); const spieler = safeCell(row, 1);
        if (!platz || isNaN(parseInt(platz, 10))) continue;
        const nSpieler = normalize(spieler);
        if (!spieler || nSpieler === "" || nSpieler === "-" || ["spieler","name","freilos","tba"].includes(nSpieler) || nSpieler.startsWith("spieler ")) continue;
        body.push([platz, spieler, safeCell(row, 2), safeCell(row, 3), safeCell(row, 4), safeCell(row, 5)]);
      }
      return { headers, rows: body };
    }

    function parseMatchdaysFromErgSheet(rows) {
      if (!rows || !rows.length) return [];
      const grouped = new Map();
      for (let i = 0; i < rows.length; i++) {
        const row = rows[i]; if (!rowHasAnyContent(row)) continue;
        const spieltagNummer = safeCell(row, 0); const spieler1 = safeCell(row, 1); const spieler2 = safeCell(row, 3);
        if (!spieltagNummer || isNaN(parseInt(spieltagNummer, 10))) continue;
        if (!spieler1 || !spieler2 || normalize(spieler1).startsWith("spieler ") || normalize(spieler2).startsWith("spieler ")) continue;
        const title = `Spieltag ${spieltagNummer}`;
        if (!grouped.has(title)) grouped.set(title, []);
        grouped.get(title).push([title, spieler1, safeCell(row, 2), spieler2, safeCell(row, 4), safeCell(row, 5), safeCell(row, 6), safeCell(row, 7)]);
      }
      return Array.from(grouped.entries()).map(([title, rowsForDay]) => {
        const totalMatches = rowsForDay.length; const doneMatches = rowsForDay.filter(r => isFinishedMatch(r[7], r[5], r[6])).length;
        return { title, status: totalMatches > 0 && doneMatches === totalMatches ? "fertig" : "offen", doneMatches, totalMatches, headers: ["Spieler 1", "Spieler 2", "Legs 1", "Legs 2", "Status"], rows: rowsForDay };
      });
    }

    function renderSheetAsBlocks(rows) {
      const validRows = (rows || []).filter(row => rowHasAnyContent(row));
      if (!validRows.length) return `<p>Keine Inhalte gefunden.</p>`;
      return validRows.map((row) => {
        const filled = row.map(cell => String(cell || "").trim()).filter(cell => cell);
        if (!filled.length) return "";
        if (filled.length === 1) return `<div class="content-block"><p>${makeClickable(htmlEscape(filled[0]))}</p></div>`;
        return `<div class="content-block"><h4>${makeClickable(htmlEscape(filled[0]))}</h4>${filled.slice(1).map(text => `<p>${makeClickable(htmlEscape(text))}</p>`).join("")}</div>`;
      }).join("");
    }

    async function loadLeague(leagueName) {
      let leagueRows = []; let ergRows = [];
      try { leagueRows = await loadCsv(leagueName); } catch (e) { console.warn("Liga-Blatt nicht ladbar:", leagueName, e); }
      try { ergRows = await loadCsv(ergName(leagueName)); } catch (e) { console.warn("Erg-Blatt nicht ladbar:", leagueName, e); }
      return { standings: parseStandingsFromLeagueSheet(leagueRows), matchdays: parseMatchdaysFromErgSheet(ergRows) };
    }

    function leagueHasPlayers(data) { return data && data.standings && data.standings.rows && data.standings.rows.length > 0; }
    function rankClass(rankValue, totalRows) {
      const rank = parseInt(String(rankValue).replace(/\D/g, ""), 10);
      if (!Number.isFinite(rank)) return "";
      if (rank === 1) return "first";
      if (rank === totalRows) return "last";
      return "";
    }

    function sortStandingsWithCards(rows) {
      return [...rows].sort((a, b) => {
        const metaA = state.playerMetaMap[normalize(a[1])] || {}; const metaB = state.playerMetaMap[normalize(b[1])] || {};
        if (!!metaA.hasRed !== !!metaB.hasRed) return metaA.hasRed ? 1 : -1;
        const rankA = parseInt(String(a[0]).replace(/\D/g, ""), 10); const rankB = parseInt(String(b[0]).replace(/\D/g, ""), 10);
        return (Number.isFinite(rankA) ? rankA : 9999) - (Number.isFinite(rankB) ? rankB : 9999);
      });
    }

    function renderPlayerCards(meta) {
      if (!meta) return "";
      const cards = [];
      for (let i = 0; i < (meta.yellow || 0); i++) cards.push(`<span class="card-badge yellow" title="Gelbe Karte"></span>`);
      for (let i = 0; i < (meta.red || 0); i++) cards.push(`<span class="card-badge red" title="Rote Karte"></span>`);
      return cards.length ? `<span class="player-cards">${cards.join("")}</span>` : "";
    }

    function renderStandingsTable(headers, rows) {
      if (!headers.length || !rows.length) return `<div class="table-shell"><div class="section-head"><div class="section-title">Tabelle</div></div><div style="padding:18px"><div class="empty">Keine Daten.</div></div></div>`;
      const displayHeaders = ["Platz", "Spieler", "Discord", "Siege", "Niederlagen", "Leg-Diff", "Punkte"];
      const sortedRows = sortStandingsWithCards(rows).map((row, index, arr) => ({ displayRank: String(index + 1), originalRow: row, totalRows: arr.length }));
      const thead = `<tr>${displayHeaders.map((h, i) => `<th${i === 0 ? ' class="rank-col"' : ""}>${htmlEscape(h)}</th>`).join("")}</tr>`;
      const tbody = sortedRows.map(entry => {
        const row = entry.originalRow; const spielerName = row[1] || "-";
        const meta = state.playerMetaMap[normalize(spielerName)] || { discord: "" };
        return `<tr>
          <td class="rank-col ${rankClass(entry.displayRank, entry.totalRows)}">${htmlEscape(entry.displayRank)}</td>
          <td class="player-cell"><span class="player-name">${htmlEscape(spielerName)}</span><div class="player-meta-row">${renderPlayerCards(meta)}</div></td>
          <td class="discord-cell">${meta.discord ? htmlEscape(meta.discord) : "-"}</td>
          <td>${htmlEscape(row[2])}</td><td>${htmlEscape(row[3])}</td><td>${htmlEscape(row[4])}</td><td class="points-cell">${htmlEscape(row[5])}</td>
        </tr>`;
      }).join("");
      return `<div class="table-shell"><div class="section-head"><div><div class="section-title">Tabelle</div><div class="section-sub">Bo7 • 1 Spieltag pro Woche</div></div></div><div class="table-wrap"><table><thead>${thead}</thead><tbody>${tbody}</tbody></table></div></div>`;
    }

    function renderMatchStatusDot(statusValue, legs1, legs2) {
      const done = isFinishedMatch(statusValue, legs1, legs2);
      return `<span class="status-badge ${done ? "done" : "open"}"><span class="status-dot ${done ? "done" : "open"}"></span></span>`;
    }

    function renderMatchTable(headers, rows) {
      if (!headers.length || !rows.length) return `<div class="empty">Keine Spiele.</div>`;
      const tbody = rows.map(row => {
        return `<tr>
          <td class="col-player"><span class="match-player">${htmlEscape(row[1])}</span>${row[2] ? `<span class="player-discord">${htmlEscape(row[2])}</span>` : ""}</td>
          <td class="col-player"><span class="match-player">${htmlEscape(row[3])}</span>${row[4] ? `<span class="player-discord">${htmlEscape(row[4])}</span>` : ""}</td>
          <td class="col-legs">${htmlEscape(row[5])}</td><td class="col-legs">${htmlEscape(row[6])}</td>
          <td class="status-cell">${renderMatchStatusDot(row[7], row[5], row[6])}</td>
        </tr>`;
      }).join("");
      return `<table class="match-table"><tbody>${tbody}</tbody></table>`;
    }

    function renderMatchdays(matchdays) {
      if (!matchdays.length) return `<div class="empty">Keine Spieltage.</div>`;
      const defOpen = matchdays.findIndex(day => !/fertig|abgeschlossen/i.test(day.status));
      const defaultOpenIndex = defOpen !== -1 ? defOpen : 0;
      return matchdays.map((day, idx) => {
        const key = `${state.activeLeague}__${day.title}`;
        const isOpen = key in state.matchdayOpenState ? state.matchdayOpenState[key] : idx === defaultOpenIndex;
        return `<div class="matchday ${isOpen ? "open" : ""}" data-key="${htmlEscape(key)}">
          <button class="matchday-head" type="button">
            <span class="matchday-title">${htmlEscape(day.title)}</span>
            <span class="matchday-head-right"><span class="matchday-progress">${htmlEscape(day.doneMatches)}/${htmlEscape(day.totalMatches)}</span><span class="status-badge ${day.status === "fertig" ? "done" : "open"}"><span class="status-dot ${day.status === "fertig" ? "done" : "open"}"></span></span></span>
          </button>
          <div class="matchday-body">${renderMatchTable(day.headers, day.rows)}</div>
        </div>`;
      }).join("");
    }

    function getVisibleModeLeagues() { return state.leagues.filter(l => l.name.startsWith(state.activeMode) && leagueHasPlayers(state.leagueData[l.name])); }

    function renderSystemSubmenus() {
      const renderSub = (el, prefix) => {
        if (!el) return;
        const filtered = state.leagues.filter(l => l.name.startsWith(prefix) && leagueHasPlayers(state.leagueData[l.name]));
        el.innerHTML = filtered.map(l => `<button class="submenu-btn ${l.name === state.activeLeague ? "active" : ""}" data-name="${htmlEscape(l.name)}">${htmlEscape(l.name)}</button>`).join("");
        el.classList.toggle("active", state.activeMode === prefix);
        el.querySelectorAll(".submenu-btn").forEach(btn => btn.addEventListener("click", () => { state.activeLeague = btn.dataset.name; renderSystemSubmenus(); renderLeague(); }));
      };
      renderSub(autodartsSubmenuEl, "Autodarts");
      renderSub(dartcounterSubmenuEl, "DartCounter");
    }

    function attachMatchdayEvents() {
      if (!matchdayAreaEl) return;
      matchdayAreaEl.querySelectorAll(".matchday").forEach(card => {
        card.querySelector(".matchday-head").addEventListener("click", () => {
          const isOpen = !card.classList.contains("open"); card.classList.toggle("open", isOpen);
          state.matchdayOpenState[card.dataset.key] = isOpen;
        });
      });
    }

    function renderHome() {
      if (!tableAreaEl) return;
      tableAreaEl.innerHTML = `<div class="table-shell"><div class="section-head"><div><div class="section-title">Neuigkeiten & Ankündigungen</div><div class="section-sub">Aktuelle Infos unserer Community.</div></div></div><div style="padding:0 18px 18px">${renderSheetAsBlocks(state.newsRows)}</div></div>`;
      if (matchdayAreaEl) matchdayAreaEl.innerHTML = "";
    }

    function renderLeague() {
      const data = state.leagueData[state.activeLeague];
      if (!data) { tableAreaEl.innerHTML = `<div class="empty">Keine Liga gewählt.</div>`; matchdayAreaEl.innerHTML = ""; return; }
      tableAreaEl.innerHTML = renderStandingsTable(data.standings.headers, data.standings.rows);
      matchdayAreaEl.innerHTML = renderMatchdays(data.matchdays);
      attachMatchdayEvents();
    }

    function renderProfilePage() {
      if (!state.currentProfile) {
        tableAreaEl.innerHTML = `<div class="empty">Bitte logge dich zuerst ein, um dein Profil zu verwalten.</div>`;
        return;
      }
      const p = state.currentProfile;
      const isAdmin = p.role === 'admin';

      tableAreaEl.innerHTML = `
        <div class="table-shell">
          <div class="section-head">
            <div>
              <div class="section-title">Spielerprofil verwalten</div>
              <div class="section-sub">Hier kannst du deine Ligadaten pflegen. ${isAdmin ? '<strong style="color:var(--yellow)">[ADMINISTRATOR]</strong>' : ''}</div>
            </div>
          </div>
          <div class="profile-container">
            <div class="profile-header-ui">
              <img src="${p.avatar_url || 'https://cdn.discordapp.com/embed/avatars/0.png'}" alt="Avatar">
              <div>
                <h3 style="margin:0">${htmlEscape(p.username)}</h3>
                <p style="margin:4px 0 0; color:var(--muted); font-size:12px;">Discord ID: ${htmlEscape(p.discord_id)}</p>
              </div>
            </div>

            <form id="profileForm" onsubmit="saveProfile(event)">
              <div class="form-grid">
                <div class="form-group">
                  <label>Echter Name</label>
                  <input type="text" id="real_name" value="${htmlEscape(p.real_name || '')}">
                </div>
                <div class="form-group">
                  <label>Alter</label>
                  <input type="number" id="age" value="${p.age || ''}">
                </div>
                <div class="form-group">
                  <label>Postleitzahl (für die Deutschlandkarte)</label>
                  <input type="text" id="zip_code" maxlength="5" placeholder="z.B. 37520" value="${htmlEscape(p.zip_code || '')}">
                </div>
                <div class="form-group">
                  <label>Scolia Name</label>
                  <input type="text" id="scolia_name" value="${htmlEscape(p.scolia_name || '')}">
                </div>
                <div class="form-group">
                  <label>Autodarts Name</label>
                  <input type="text" id="autodarts_name" value="${htmlEscape(p.autodarts_name || '')}" placeholder="Muss ausgefüllt sein falls AVG eingetragen">
                </div>
                <div class="form-group">
                  <label>Autodarts AVG</label>
                  <input type="number" step="0.01" id="autodarts_avg" value="${p.autodarts_avg || ''}" placeholder="Zwingend wenn Name existiert">
                </div>
                <div class="form-group">
                  <label>DartCounter Name</label>
                  <input type="text" id="dartcounter_name" value="${htmlEscape(p.dartcounter_name || '')}">
                </div>
                <div class="form-group">
                  <label>DartCounter AVG</label>
                  <input type="number" step="0.01" id="dartcounter_avg" value="${p.dartcounter_avg || ''}">
                </div>
              </div>

              <div id="formError" style="color:var(--red); font-weight:800; margin-top:14px; display:none;"></div>
              <div id="formSuccess" style="color:var(--green); font-weight:800; margin-top:14px; display:none;">Profil erfolgreich gespeichert!</div>

              <div class="form-actions">
                <button type="submit" class="button" style="background:var(--green); color:#000;">Speichern</button>
                <button type="button" class="button" style="background:var(--red);" onclick="handleLogout()">Ausloggen</button>
              </div>
            </form>
          </div>
        </div>
      `;
      if (matchdayAreaEl) matchdayAreaEl.innerHTML = "";
    }

    async function saveProfile(e) {
      e.preventDefault();
      const errEl = document.getElementById("formError");
      const succEl = document.getElementById("formSuccess");
      errEl.style.display = "none";
      succEl.style.display = "none";

      const adName = document.getElementById("autodarts_name").value.trim();
      const adAvg = document.getElementById("autodarts_avg").value.trim();
      const dcName = document.getElementById("dartcounter_name").value.trim();
      const dcAvg = document.getElementById("dartcounter_avg").value.trim();

      if (adName !== "" && adAvg === "") {
        errEl.innerText = "Fehler: Wenn ein Autodarts-Name eingetragen ist, MUSS zwingend ein Autodarts AVG eingetragen werden!";
        errEl.style.display = "block"; return;
      }
      if (adAvg !== "" && adName === "") {
        errEl.innerText = "Fehler: Du hast einen Autodarts AVG eingetragen aber keinen Namen hinterlegt!";
        errEl.style.display = "block"; return;
      }
      if (dcName !== "" && dcAvg === "") {
        errEl.innerText = "Fehler: Wenn ein DartCounter-Name eingetragen ist, MUSS zwingend ein DartCounter AVG eingetragen werden!";
        errEl.style.display = "block"; return;
      }

      const updates = {
        id: state.currentUser.id,
        real_name: document.getElementById("real_name").value.trim() || null,
        age: parseInt(document.getElementById("age").value) || null,
        zip_code: document.getElementById("zip_code").value.trim() || null,
        scolia_name: document.getElementById("scolia_name").value.trim() || null,
        autodarts_name: adName || null,
        autodarts_avg: adAvg ? parseFloat(adAvg) : null,
        dartcounter_name: dcName || null,
        dartcounter_avg: dcAvg ? parseFloat(dcAvg) : null,
        updated_at: new Date()
      };

      const { error } = await supabaseClient.from('profiles').upsert(updates);
      if (error) {
        errEl.innerText = "Datenbankfehler: " + error.message;
        errEl.style.display = "block";
      } else {
        succEl.style.display = "block";
        state.currentProfile = { ...state.currentProfile, ...updates };
      }
    }

    function setMode(mode) {
      state.activeMode = mode;
      document.body.setAttribute("data-mode", mode);
      if (modeHomeBtn) modeHomeBtn.classList.toggle("active", mode === "Home");
      if (modeAutodartsBtn) modeAutodartsBtn.classList.toggle("active", mode === "Autodarts");
      if (modeDartCounterBtn) modeDartCounterBtn.classList.toggle("active", mode === "DartCounter");
      const pBtn = document.getElementById("modeProfil");
      if(pBtn) pBtn.classList.toggle("active", mode === "Profil");

      if (mode === "Home") {
        if (autodartsSubmenuEl) autodartsSubmenuEl.classList.remove("active");
        if (dartcounterSubmenuEl) dartcounterSubmenuEl.classList.remove("active");
        renderHome();
      } else if (mode === "Profil") {
        if (autodartsSubmenuEl) autodartsSubmenuEl.classList.remove("active");
        if (dartcounterSubmenuEl) dartcounterSubmenuEl.classList.remove("active");
        renderProfilePage();
      } else {
        const visible = getVisibleModeLeagues();
        if (!visible.some(l => l.name === state.activeLeague)) { state.activeLeague = visible[0]?.name || null; }
        renderSystemSubmenus();
        renderLeague();
      }
    }

    async function initAuth() {
      supabaseClient.auth.onAuthStateChange(async (event, currentSession) => { 
        if (currentSession) {
          await handleSession(currentSession.user);
          if (event === 'SIGNED_IN') {
             setMode("Profil");
             window.history.replaceState(null, null, window.location.pathname);
          }
        } else {
          state.currentUser = null; 
          state.currentProfile = null;
          if (loginBtnText) loginBtnText.innerText = "Liga Login";
          const pBtn = document.getElementById("modeProfil"); if (pBtn) pBtn.remove();
          if (state.activeMode === "Profil") setMode("Home");
        }
      });

      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        await handleSession(session.user);
      }

      if (ligaLoginBtn) {
        ligaLoginBtn.addEventListener("click", async () => {
          if (!state.currentUser) {
            await supabaseClient.auth.signInWithOAuth({
              provider: 'discord',
              options: { 
                redirectTo: window.location.origin + window.location.pathname
              }
            });
          } else {
            setMode("Profil");
          }
        });
      }
    }

    async function handleSession(user) {
      state.currentUser = user;
      if (loginBtnText) loginBtnText.innerText = "Mein Profil";
      
      await fetchOrCreateProfile(user);
      
      if (!document.getElementById("modeProfil") && modeHomeBtn) {
        const profileBtn = document.createElement("button");
        profileBtn.id = "modeProfil";
        profileBtn.className = "hero-action-btn hero-btn-profil mode-btn";
        profileBtn.type = "button";
        profileBtn.innerText = "Mein Profil";
        profileBtn.addEventListener("click", () => setMode("Profil"));
        modeHomeBtn.parentNode.insertBefore(profileBtn, regelwerkBtn);
      }
    }

    async function fetchOrCreateProfile(user) {
      try {
        const { data, error } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
        
        if (error && error.code === 'PGRST116') {
          const newProfile = {
            id: user.id,
            discord_id: user.user_metadata.provider_id || user.id,
            username: user.user_metadata.full_name || user.user_metadata.name || user.user_metadata.custom_claims?.global_name,
            avatar_url: user.user_metadata.avatar_url,
            role: 'user'
          };
          
          const { error: insertError } = await supabaseClient.from('profiles').insert(newProfile);
          if (insertError) console.error("Profil-Insert Fehler:", insertError);
          state.currentProfile = newProfile;
        } else if (data) {
          if (data.avatar_url !== user.user_metadata.avatar_url) {
            await supabaseClient.from('profiles').update({ avatar_url: user.user_metadata.avatar_url }).eq('id', user.id);
            data.avatar_url = user.user_metadata.avatar_url;
          }
          state.currentProfile = data;
        }
      } catch (err) {
        console.error("Fehler in fetchOrCreateProfile:", err);
      }
    }

    async function handleLogout() { 
      await supabaseClient.auth.signOut(); 
      window.location.reload(); 
    }
    
    function openModal(modal) { if (modal) { modal.classList.add("open"); modal.setAttribute("aria-hidden", "false"); } }
    function closeModal(modal) { if (modal) { modal.classList.remove("open"); modal.setAttribute("aria-hidden", "true"); } }

    async function loadStaticSheetContent() {
      try {
        const [regelwerkRows, newsRows, linksRows] = await Promise.all([
          loadCsv(RULES_SHEET).catch(() => []),
          loadCsv(NEWS_SHEET).catch(() => []),
          loadCsv(LINKS_SHEET).catch(() => []),
        ]);
        state.regelwerkRows = regelwerkRows; state.newsRows = newsRows; state.linksRows = linksRows;
        if (regelwerkContent) regelwerkContent.innerHTML = renderSheetAsBlocks(regelwerkRows);
        if (linksContent) linksContent.innerHTML = renderSheetAsBlocks(linksRows);
      } catch (e) { console.warn("Statische Inhalte nicht ladbar", e); }
    }

    async function loadAll() {
      const hasToken = window.location.hash.includes("access_token");

      if (hasToken) {
        if (tableAreaEl) tableAreaEl.innerHTML = `<div class="empty" style="text-align:center;"><h2>Login wird verarbeitet...</h2><p>Bitte einen Moment Geduld.</p></div>`;
      } else {
        if (tableAreaEl) tableAreaEl.innerHTML = `<div class="empty">Lade Daten…</div>`;
      }

      await initAuth();

      try {
        state.leagues = LEAGUES.map(name => ({ name }));
        try {
          const playerRows = await loadCsv(PLAYER_SHEET);
          state.playerMetaMap = parsePlayerDiscordSheet(playerRows);
        } catch (e) { state.playerMetaMap = {}; }

        await loadStaticSheetContent();
        const entries = await Promise.all(state.leagues.map(async league => [league.name, await loadLeague(league.name)]));
        state.leagueData = Object.fromEntries(entries);

        const visible = getVisibleModeLeagues();
        state.activeLeague = visible[0]?.name || null;

        if (hasToken) {
          setTimeout(() => {
             if(state.activeMode !== "Profil") setMode("Profil");
             window.history.replaceState(null, null, window.location.pathname);
          }, 500);
        } else {
          if (state.activeMode !== "Profil") {
            setMode("Home");
          }
        }
        
      } catch (error) {
        if (tableAreaEl) tableAreaEl.innerHTML = `<div class="empty">Fehler beim Laden: ${htmlEscape(error?.message)}</div>`;
      }
    }

    if (modeHomeBtn) modeHomeBtn.addEventListener("click", () => setMode("Home"));
    if (modeAutodartsBtn) modeAutodartsBtn.addEventListener("click", () => setMode("Autodarts"));
    if (modeDartCounterBtn) modeDartCounterBtn.addEventListener("click", () => setMode("DartCounter"));
    if (openImpressumBtn) openImpressumBtn.addEventListener("click", () => openModal(impressumModal));
    if (closeImpressumBtn) closeImpressumBtn.addEventListener("click", () => closeModal(impressumModal));
    if (openLinksBtn) openLinksBtn.addEventListener("click", () => openModal(linksModal));
    if (regelwerkBtn) regelwerkBtn.addEventListener("click", () => openModal(regelwerkModal));

    document.querySelectorAll("[data-close-modal]").forEach(btn => {
      btn.addEventListener("click", () => { closeModal(document.getElementById(btn.getAttribute("data-close-modal"))); });
    });

    [impressumModal, regelwerkModal, linksModal].forEach(modal => {
      if (modal) modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(modal); });
    });

    document.addEventListener("keydown", (e) => { if (e.key === "Escape") [impressumModal, regelwerkModal, linksModal].forEach(closeModal); });

    loadAll();
  </script>
</body>
</html>
