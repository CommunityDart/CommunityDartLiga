<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CDL DART LIGA</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --ad-blue: #00f0ff;
      --ad-blue-dark: #0088ff;
      --dc-orange: #ff4500;
      --dc-orange-bright: #ff7700;
      --sc-green: #00ff88;
      --sc-green-bright: #00ffaa;
      --bg-primary: #0a0e1a;
      --bg-secondary: #151829;
      --bg-tertiary: #1a1f35;
      --surface: #0f1428;
      --border-active: var(--ad-blue);
      --text-primary: #ffffff;
      --text-secondary: #a0c8ff;
      --text-muted: #667a99;
      --neon-purple: #ff00ff;
      --neon-cyan: #00ffff;
      --neon-lime: #00ff00;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    
    body {
      font-family: 'Orbitron', 'Space Mono', monospace;
      background: linear-gradient(135deg, #0a0e1a 0%, #1a0a2e 50%, #0f1a3c 100%);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      letter-spacing: 0.5px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 240, 255, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255, 69, 0, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 40% 20%, rgba(0, 255, 136, 0.08) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
      animation: glitch 8s infinite;
    }

    @keyframes glitch {
      0%, 100% { filter: hue-rotate(0deg); }
      50% { filter: hue-rotate(1deg); }
    }

    .wrap {
      width: min(1320px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 16px;
      position: relative;
      z-index: 1;
    }

    /* ============ HEADER ============ */
    .header-branding {
      text-align: center;
      margin-bottom: 50px;
      padding: 60px 40px;
      background: linear-gradient(135deg, 
        rgba(0, 240, 255, 0.05) 0%, 
        rgba(255, 69, 0, 0.03) 50%, 
        rgba(0, 255, 136, 0.03) 100%);
      border: 2px solid;
      border-image: linear-gradient(135deg, var(--ad-blue), var(--dc-orange), var(--sc-green)) 1;
      border-radius: 0;
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 0 60px rgba(0, 240, 255, 0.3),
        inset 0 0 60px rgba(0, 240, 255, 0.05),
        0 0 120px rgba(255, 69, 0, 0.2);
    }

    .header-branding::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--ad-blue), var(--sc-green), transparent);
      animation: scanline 6s linear infinite;
    }

    @keyframes scanline {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .header-branding::after {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        repeating-linear-gradient(0deg, rgba(0, 240, 255, 0.02) 0px, rgba(0, 240, 255, 0.02) 1px, transparent 1px, transparent 2px),
        repeating-linear-gradient(90deg, rgba(255, 69, 0, 0.02) 0px, rgba(255, 69, 0, 0.02) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0% { opacity: 0.97; }
      50% { opacity: 1; }
      100% { opacity: 0.97; }
    }

    .header-branding h2 {
      margin: 0 0 0 0;
      font-size: 72px;
      font-weight: 900;
      letter-spacing: 12px;
      text-transform: uppercase;
      position: relative;
      z-index: 2;
      background: linear-gradient(90deg, 
        var(--ad-blue) 0%, 
        var(--neon-cyan) 25%,
        var(--dc-orange) 50%,
        var(--sc-green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(0, 240, 255, 0.5);
      filter: drop-shadow(0 0 30px rgba(0, 240, 255, 0.4)) drop-shadow(0 0 60px rgba(255, 69, 0, 0.2));
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 30px rgba(0, 240, 255, 0.4)); }
      50% { filter: drop-shadow(0 0 50px rgba(0, 240, 255, 0.7)) drop-shadow(0 0 80px rgba(255, 69, 0, 0.3)); }
    }

    .header-branding p {
      margin: 10px 0 0 0;
      font-size: 14px;
      color: var(--ad-blue);
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      position: relative;
      z-index: 2;
      text-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
    }

    /* ============ NAVIGATION ============ */
    .dashboard-nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 50px;
    }

    .nav-card {
      background: linear-gradient(135deg, 
        rgba(15, 20, 40, 0.8) 0%, 
        rgba(21, 24, 41, 0.5) 100%);
      border: 2px solid rgba(0, 240, 255, 0.2);
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 
        0 0 20px rgba(0, 240, 255, 0.1),
        inset 0 0 20px rgba(0, 240, 255, 0.05);
    }

    .nav-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--ad-blue), var(--dc-orange), var(--sc-green), transparent);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .nav-card:hover {
      border-color: var(--ad-blue);
      box-shadow: 
        0 0 40px rgba(0, 240, 255, 0.4),
        inset 0 0 40px rgba(0, 240, 255, 0.1),
        0 0 80px rgba(0, 240, 255, 0.2);
      transform: translateY(-8px) scale(1.02);
    }

    .nav-card-title {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--ad-blue);
      letter-spacing: 2px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(0, 240, 255, 0.3);
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
    }

    .nav-btn {
      width: 100%;
      padding: 16px 18px;
      margin-bottom: 10px;
      border: 2px solid rgba(0, 240, 255, 0.3);
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.05), rgba(0, 240, 255, 0.02));
      color: var(--text-primary);
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-decoration: none;
      position: relative;
      overflow: hidden;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.3), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .nav-btn:hover::before {
      transform: translateX(100%);
    }

    .nav-btn:last-child { margin-bottom: 0; }
    
    .nav-btn:hover {
      border-color: var(--ad-blue);
      background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(0, 240, 255, 0.08));
      box-shadow: 
        0 0 20px rgba(0, 240, 255, 0.5),
        inset 0 0 20px rgba(0, 240, 255, 0.1);
      transform: translateY(-3px);
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.8);
    }

    .nav-btn.active {
      background: linear-gradient(135deg, var(--ad-blue), var(--neon-cyan));
      border-color: var(--ad-blue);
      color: #000;
      box-shadow: 
        0 0 40px rgba(0, 240, 255, 0.8),
        inset 0 0 20px rgba(0, 240, 255, 0.4);
      text-shadow: none;
      font-weight: 900;
    }

    #modeDartCounter.active { 
      background: linear-gradient(135deg, var(--dc-orange), var(--dc-orange-bright));
      border-color: var(--dc-orange);
      box-shadow: 0 0 40px rgba(255, 69, 0, 0.8);
    }

    #modeScolia.active { 
      background: linear-gradient(135deg, var(--sc-green), var(--sc-green-bright));
      border-color: var(--sc-green);
      box-shadow: 0 0 40px rgba(0, 255, 136, 0.8);
    }

    .icon-svg {
      width: 20px;
      height: 20px;
      stroke-width: 3;
      flex-shrink: 0;
      filter: drop-shadow(0 0 10px currentColor);
    }

    /* ============ MAIN LAYOUT ============ */
    .main {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 28px;
      align-items: start;
    }

    body[data-mode="Home"] .main {
      grid-template-columns: 1fr;
    }

    body[data-mode="Home"] .sidebar {
      display: none;
    }

    /* ============ TABLES ============ */
    .table-shell {
      background: linear-gradient(135deg, 
        rgba(15, 20, 40, 0.7) 0%, 
        rgba(21, 24, 41, 0.4) 100%);
      border: 2px solid rgba(0, 240, 255, 0.25);
      overflow: hidden;
      box-shadow: 
        0 0 40px rgba(0, 240, 255, 0.2),
        inset 0 0 30px rgba(0, 240, 255, 0.05);
      position: relative;
      transition: all 0.3s ease;
    }

    .table-shell::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--ad-blue), var(--dc-orange), var(--sc-green), transparent);
    }

    .table-shell:hover {
      border-color: var(--ad-blue);
      box-shadow: 
        0 0 60px rgba(0, 240, 255, 0.4),
        inset 0 0 30px rgba(0, 240, 255, 0.08);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px;
      border-bottom: 2px solid rgba(0, 240, 255, 0.2);
      background: linear-gradient(90deg, 
        rgba(0, 240, 255, 0.1) 0%, 
        transparent 100%);
      position: relative;
    }

    .section-head::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--ad-blue), transparent);
    }

    .section-title {
      font-size: 24px;
      font-weight: 900;
      margin: 0;
      color: var(--ad-blue);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
    }

    .section-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* TABLE */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      padding: 16px 20px;
      background: rgba(0, 240, 255, 0.08);
      border-bottom: 2px solid rgba(0, 240, 255, 0.3);
      color: var(--ad-blue);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
    }

    tbody td {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(0, 240, 255, 0.1);
      font-size: 14px;
      color: var(--text-primary);
      font-weight: 600;
    }

    tbody tr:nth-child(odd) td { 
      background: rgba(0, 240, 255, 0.03);
    }
    tbody tr:nth-child(even) td { 
      background: rgba(0, 240, 255, 0.01);
    }
    tbody tr:hover td { 
      background: linear-gradient(90deg, 
        rgba(0, 240, 255, 0.2) 0%, 
        transparent 100%);
      box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.1);
    }

    .rank-col {
      font-weight: 900;
      text-align: center;
      width: 80px;
      font-size: 24px;
    }

    .rank-col.first { 
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
    }
    .rank-col.second { 
      color: #c0c0c0;
      text-shadow: 0 0 15px rgba(192, 192, 192, 0.4);
    }
    .rank-col.third { 
      color: #cd7f32;
      text-shadow: 0 0 15px rgba(205, 127, 50, 0.4);
    }

    .player-link {
      color: var(--ad-blue);
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s;
      position: relative;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
    }

    .player-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--ad-blue), transparent);
      transition: width 0.3s;
    }

    .player-link:hover {
      color: var(--neon-cyan);
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
    }

    .player-link:hover::after {
      width: 100%;
    }

    /* ============ SIDEBAR ============ */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .matchday {
      background: linear-gradient(135deg, 
        rgba(15, 20, 40, 0.7) 0%, 
        rgba(21, 24, 41, 0.4) 100%);
      border: 2px solid rgba(0, 240, 255, 0.2);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .matchday::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--ad-blue), transparent);
    }

    .matchday:hover {
      border-color: var(--ad-blue);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
      transform: translateY(-3px);
    }

    .matchday-head {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text-primary);
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-weight: 800;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .matchday-head:hover {
      background: rgba(0, 240, 255, 0.1);
      color: var(--ad-blue);
      text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
    }

    .matchday-title {
      font-size: 14px;
      font-weight: 900;
    }

    .matchday-body {
      display: none;
      padding: 0;
      border-top: 2px solid rgba(0, 240, 255, 0.2);
      background: rgba(0, 0, 0, 0.3);
    }

    .matchday.open .matchday-body {
      display: block;
    }

    .match-table {
      width: 100%;
      border-collapse: collapse;
    }

    .match-table td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0, 240, 255, 0.1);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 0;
      font-size: 10px;
      font-weight: 900;
      background: rgba(255, 69, 0, 0.25);
      color: var(--dc-orange-bright);
      border: 2px solid rgba(255, 69, 0, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(255, 69, 0, 0.5);
    }

    .status-badge.done {
      background: rgba(0, 255, 136, 0.25);
      color: var(--sc-green-bright);
      border-color: rgba(0, 255, 136, 0.5);
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    }

    /* ============ CONTENT ============ */
    .content-block {
      margin-bottom: 20px;
      padding: 24px;
      border: 2px solid rgba(0, 240, 255, 0.2);
      background: linear-gradient(135deg, 
        rgba(0, 240, 255, 0.08) 0%, 
        rgba(0, 255, 136, 0.03) 100%);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .content-block::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--ad-blue), transparent);
    }

    .content-block:hover {
      border-color: var(--ad-blue);
      background: linear-gradient(135deg, 
        rgba(0, 240, 255, 0.12) 0%, 
        rgba(0, 255, 136, 0.06) 100%);
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
    }

    .news-header-wrapper {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 2px solid rgba(0, 240, 255, 0.15);
    }

    .news-title-text {
      font-size: 18px;
      font-weight: 900;
      color: var(--ad-blue);
      margin: 0 0 8px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
      text-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
    }

    .news-date-text {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ============ MODALS ============ */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(680px, 100%);
      max-height: 85vh;
      background: linear-gradient(135deg, 
        rgba(15, 20, 40, 0.95) 0%, 
        rgba(21, 24, 41, 0.95) 100%);
      border: 2px solid rgba(0, 240, 255, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 
        0 0 80px rgba(0, 240, 255, 0.4),
        inset 0 0 40px rgba(0, 240, 255, 0.08);
      animation: slideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, var(--ad-blue), var(--dc-orange), var(--sc-green));
      z-index: 2;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px;
      border-bottom: 2px solid rgba(0, 240, 255, 0.2);
      background: linear-gradient(90deg, 
        rgba(0, 240, 255, 0.12) 0%, 
        transparent 100%);
      position: relative;
      z-index: 1;
    }

    .modal-head h3 {
      margin: 0;
      font-size: 20px;
      font-weight: 900;
      color: var(--ad-blue);
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
    }

    .modal-close {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(0, 240, 255, 0.3);
      background: rgba(0, 240, 255, 0.08);
      color: var(--ad-blue);
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-weight: 900;
    }

    .modal-close:hover {
      background: rgba(0, 240, 255, 0.2);
      border-color: var(--ad-blue);
      transform: scale(1.15) rotate(90deg);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
    }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }

    /* ============ DROPDOWNS ============ */
    .dropdown-submenu {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
    }

    .dropdown-btn {
      padding: 14px;
      background: rgba(0, 240, 255, 0.08);
      border: 2px solid rgba(0, 240, 255, 0.2);
      color: var(--text-primary);
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
    }

    .dropdown-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.4), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .dropdown-btn:hover::before {
      transform: translateX(100%);
    }

    .dropdown-btn:hover {
      background: rgba(0, 240, 255, 0.15);
      border-color: var(--ad-blue);
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
    }

    .dropdown-btn.active {
      background: linear-gradient(135deg, var(--ad-blue), var(--neon-cyan));
      border-color: var(--ad-blue);
      color: #000;
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.7);
      font-weight: 900;
    }

    /* ============ FOOTER ============ */
    .footer {
      margin-top: 50px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;

  <script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";

    let supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const AD_LEAGUES = ["Autodarts Liga 1", "Autodarts Liga 2", "Autodarts Liga 3", "Autodarts Liga 4", "Autodarts Liga 5", "Autodarts Liga 6"];
    const DC_LEAGUES = ["DartCounter Liga 1", "DartCounter Liga 2", "DartCounter Liga 3", "DartCounter Liga 4", "DartCounter Liga 5", "DartCounter Liga 6"];
    const SC_LEAGUES = ["Scolia Liga 1", "Scolia Liga 2", "Scolia Liga 3"];
    const ALL_LEAGUES = [...AD_LEAGUES, ...DC_LEAGUES, ...SC_LEAGUES];

    const state = { 
        leagueData: {}, activeLeague: null, activeMode: "Home", 
        currentSeason: "Saison 1", newsHtml: "", rulewerkHtml: "", currentUser: null,
        matchdayOpenState: {}, isAdminUser: false, allProfilesCache: [],
        debugLog: []
    };

    function log(msg) {
      console.log(msg);
      state.debugLog.push(msg);
    }

    function htmlEscape(value) { return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    
    function decodeHtml(html) {
        if (!html) return "";
        var txt = document.createElement("textarea");
        txt.innerHTML = html;
        return txt.value;
    }

    window.showDebugInfo = function() {
      const debugEl = document.getElementById("debugContent");
      let debugText = "=== CDL DEBUG INFO ===\n\n";
      debugText += `Current Season: ${state.currentSeason}\n`;
      debugText += `Active Mode: ${state.activeMode}\n`;
      debugText += `Active League: ${state.activeLeague}\n\n`;
      debugText += `Total Profiles: ${state.allProfilesCache.length}\n`;
      debugText += `Profiles:\n`;
      state.allProfilesCache.forEach(p => {
        debugText += `  ${p.display_name || p.discord_name} (${p.id})\n`;
        debugText += `    AD: ${p.assigned_ad_league || 'none'}\n`;
        debugText += `    DC: ${p.assigned_dc_league || 'none'}\n`;
        debugText += `    SC: ${p.assigned_sc_league || 'none'}\n`;
      });
      debugText += `\nLeague Data:\n`;
      Object.entries(state.leagueData).forEach(([league, data]) => {
        debugText += `  ${league}: ${data.standings.rows.length} players, ${data.matchdays.length} days\n`;
      });
      debugEl.innerText = debugText;
      openModal(document.getElementById("debugModal"));
    };

    window.directDeleteNews = async function(id) {
        if(!confirm("Delete?")) return;
        await supabaseClient.from('news').delete().eq('id', id); 
        loadAll();
    };

    window.loadArchiveData = async function() {
        const season = document.getElementById("archiveSeasonSelect").value;
        const league = document.getElementById("archiveLeagueSelect").value;
        const resultContainer = document.getElementById("archiveTableResult");
        if(!season || !league) return;
        
        resultContainer.innerHTML = "<div class='empty'>LOADING...</div>";
        const { data: matches, error = null } = await supabaseClient.from('matches').select('*').eq('season', season).eq('league_name', league).eq('status', 'done');
        
        if (error || !matches || matches.length === 0) {
            resultContainer.innerHTML = "<div class='empty'>NO DATA</div>";
            return;
        }

        const stats = {};
        matches.forEach(m => {
            if(m.player1_id && m.player2_id) {
                if(!stats[m.player1_id]) {
                    const p = state.allProfilesCache.find(prof => prof.id === m.player1_id);
                    stats[m.player1_id] = { name: p ? (p.display_name || p.discord_name) : 'PLAYER', wins: 0, losses: 0 };
                }
                if(!stats[m.player2_id]) {
                    const p = state.allProfilesCache.find(prof => prof.id === m.player2_id);
                    stats[m.player2_id] = { name: p ? (p.display_name || p.discord_name) : 'PLAYER', wins: 0, losses: 0 };
                }
                const l1 = parseInt(m.legs_player1) || 0; 
                const l2 = parseInt(m.legs_player2) || 0;
                if(l1 > l2) { stats[m.player1_id].wins++; stats[m.player2_id].losses++; } 
                else if(l2 > l1) { stats[m.player2_id].wins++; stats[m.player1_id].losses++; }
            }
        });

        const rows = Object.values(stats).sort((a,b) => b.wins - a.wins);
        let html = `<div class="table-wrap"><table><thead><tr><th style="width:50px;">P</th><th>PLAYER</th><th style="text-align:center;">W</th><th style="text-align:center;">L</th></tr></thead><tbody>`;
        rows.forEach((r, idx) => {
            html += `<tr><td style="font-weight: 900; font-size: 18px;">${idx+1}</td><td><strong>${htmlEscape(r.name)}</strong></td><td style="text-align:center;">${r.wins}</td><td style="text-align:center;">${r.losses}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        resultContainer.innerHTML = html;
    };

    function updateRightNavBlock() {
        const defaultBlock = document.getElementById("defaultRightContent");
        const dynamicBlock = document.getElementById("dynamicLeaguesContent");
        const cardTitle = document.getElementById("rightCardTitle");

        if (state.activeMode === "Home") {
            defaultBlock.style.display = "flex";
            dynamicBlock.style.display = "none";
            if (cardTitle) cardTitle.innerText = "🌐 COMMUNITY";
        } else {
            defaultBlock.style.display = "none";
            dynamicBlock.style.display = "grid";
            if (cardTitle) cardTitle.innerText = `📊 ${state.activeMode.toUpperCase()}`;

            // FIXED: Case-insensitive Filterung für Plattform-Auswahl
            const filtered = ALL_LEAGUES.filter(l => l.toLowerCase().startsWith(state.activeMode.toLowerCase()));
            
            dynamicBlock.innerHTML = filtered.map(l => {
                return `<button class="dropdown-btn ${l === state.activeLeague ? "active" : ""}" onclick="selectLeagueDirectly('${l}')">${getShortLeagueNumber(l)}</button>`;
            }).join("");
        }
    }

    window.selectLeagueDirectly = function(leagueName) {
        state.activeLeague = leagueName;
        updateRightNavBlock();
        renderLeague();
    };

    function setMode(mode) {
      state.activeMode = mode;
      document.body.setAttribute("data-mode", mode);
      
      const subTitleEl = document.getElementById("headerSubtitle");
      if (subTitleEl) {
          subTitleEl.innerText = mode === "Home" ? "⚡ DART ESPORTS ⚡" : `⚡ ${mode.toUpperCase()} ⚡`;
      }
      
      const setBtn = (id, isActive) => { const e = document.getElementById(id); if(e) e.classList.toggle("active", isActive); };
      setBtn("modeHome", mode === "Home");
      setBtn("modeAutodarts", mode === "Autodarts");
      setBtn("modeDartCounter", mode === "DartCounter");
      setBtn("modeScolia", mode === "Scolia");
      
      if (mode === "Home") {
        state.activeLeague = null;
        renderHome();
      } else {
        const filtered = ALL_LEAGUES.filter(l => l.toLowerCase().startsWith(mode.toLowerCase()));
        state.activeLeague = filtered.includes(state.activeLeague) ? state.activeLeague : (filtered[0] || null);
        renderLeague();
      }
      updateRightNavBlock();
    }

    function renderLeague() {
      const tArea = document.getElementById("tableArea");
      const mArea = document.getElementById("matchdayArea");
      if(!tArea || !mArea) return;

      if(!state.activeLeague) {
          tArea.innerHTML = `<div class="table-shell"><div class="section-head"><div class="section-title">STANDINGS</div></div><div class="empty">NO LEAGUE SELECTED</div></div>`;
          mArea.innerHTML = "";
          return;
      }
      
      const data = state.leagueData[state.activeLeague] || { standings: { rows: [] }, matchdays: [] };
      tArea.innerHTML = renderStandingsTable(data.standings.rows);
      mArea.innerHTML = renderMatchdays(data.matchdays);
    }

    // FIXED: Funktionsnamen fest synchronisiert (Vorher renderStandingsTable aufgerufen, aber standingsTableHtml deklariert)
    function renderStandingsTable(rows) {
      const visibleRows = rows.filter(s => s.showInMembers !== false);

      if (visibleRows.length === 0) {
          return `<div class="table-shell"><div class="section-head"><div class="section-title">${state.activeLeague}</div></div><div class="empty">🟡 NO PLAYERS</div></div>`;
      }

      const tbody = visibleRows.map((s, idx) => {
          const playerAvg = s.avgCount > 0 ? (s.avgSum / s.avgCount).toFixed(2) : "-";
          return `<tr>
              <td class="rank-col ${rankClass(idx+1, visibleRows.length)}">${idx+1}</td>
              <td><span class="player-link" onclick="openPlayerProfile('${htmlEscape(s.name)}')">${htmlEscape(s.name)}</span></td>
              <td style="text-align: center; font-weight: 700;">${s.gamesPlayed}</td>
              <td style="text-align: center; font-weight: 700; color: var(--sc-green);">${s.wins}</td>
              <td style="text-align: center; font-weight: 700; color: var(--dc-orange);">${s.losses}</td>
              <td style="text-align: center; font-weight: 700;">${s.legDiff}</td>
              <td style="text-align: center; font-weight: 800; color: var(--sc-green-bright);">${playerAvg}</td>
              <td style="text-align: right; font-weight: 900; color: var(--ad-blue-light); font-size: 18px; text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);">${s.points}</td>
            </tr>`;
      }).join("");

      return `<div class="table-shell"><div class="section-head"><div><div class="section-title">${state.activeLeague}</div><div class="section-sub">⚡ LIVE STANDINGS • BO7 ⚡</div></div></div>
      <div class="table-wrap"><table><thead><tr><th style="width: 70px;">P</th><th>PLAYER</th><th style="width: 60px;">SP</th><th style="width: 60px;">W</th><th style="width: 60px;">L</th><th style="width: 80px;">DIFF</th><th style="width: 60px;">AVG</th><th style="width: 70px;">PTS</th></tr></thead><tbody>${tbody}</tbody></table></div></div>`;
    }

    function renderMatchdays(matchdays) {
      if (!matchdays || matchdays.length === 0) return `<div class="empty">Mspieltage geladen...</div>`;
      
      const defaultOpenIndex = Math.max(0, matchdays.findIndex(day => day.status !== 'fertig' && day.status !== 'done'));

      return matchdays.map((day, idx) => {
        const key = `${state.activeLeague}__${day.title}`;
        const isOpen = key in state.matchdayOpenState ? state.matchdayOpenState[key] : idx === defaultOpenIndex;
        
        const tbody = day.rows.map(m => `<tr>
          <td><span class="player-link" onclick="openPlayerProfile('${htmlEscape(m.p1Name)}')">${htmlEscape(m.p1Name)}</span></td>
          <td><span class="player-link" onclick="openPlayerProfile('${htmlEscape(m.p2Name)}')">${htmlEscape(m.p2Name)}</span></td>
          <td style="text-align:center; font-weight:800;">${m.legs1 !== null && m.legs1 !== undefined ? m.legs1 : '-'} : ${m.legs2 !== null && m.legs2 !== undefined ? m.legs2 : '-'}</td>
          <td style="text-align:right;"><span class="status-badge ${m.status === 'done' || m.status === 'fertig' ? 'done' : ''}">${m.status === 'done' || m.status === 'fertig' ? '✓' : '●'}</span></td>
        </tr>`).join("");

        return `<div class="matchday ${isOpen ? "open" : ""}" data-key="${htmlEscape(key)}">
          <button class="matchday-head" onclick="toggleMatchday(this)">
            <span class="matchday-title">${htmlEscape(day.title)}</span>
            <span class="status-badge ${day.status === 'fertig' || day.status === 'done' ? 'done' : ''}" style="margin:0;">${day.doneMatches}/${day.totalMatches}</span>
          </button>
          <div class="matchday-body"><table class="match-table"><tbody>${tbody}</tbody></table></div>
        </div>`;
      }).join("");
    }

    window.openPlayerProfile = async function(playerName) {
        if(playerName === 'Freilos' || playerName === 'Ehem. Spieler') return;
        
        const modal = document.getElementById("playerProfileModal");
        const titleEl = document.getElementById("playerProfileTitle");
        const content = document.getElementById("playerProfileContent");
        
        if(titleEl) titleEl.innerText = "PLAYER";
        content.innerHTML = "<p>LOADING...</p>";
        openModal(modal);

        const p = state.allProfilesCache.find(prof => 
            prof.display_name === playerName || 
            prof.discord_name === playerName || 
            prof.real_name === playerName ||
            prof.username === playerName
        );

        if(!p) {
            content.innerHTML = "<div class='empty'>NOT FOUND</div>";
            return;
        }

        const avatarSrc = p.avatar_url || "https://ui-avatars.com/api/?name=" + encodeURIComponent(p.display_name || p.discord_name || p.username || 'P') + "&background=0066ff&color=fff&bold=true&size=200";
        
        let platformsHtml = "";
        if (p.autodarts_name || p.autodarts_avg) {
            platformsHtml += `<div style="margin-bottom: 16px; padding: 16px; background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(0, 240, 255, 0.08)); border-left: 4px solid var(--ad-blue); border: 2px solid rgba(0, 240, 255, 0.3);"><div style="color: var(--ad-blue); font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);">⚫ AUTODARTS</div><div style="color: var(--text-primary); font-weight: 800; font-size: 14px;">${htmlEscape(p.autodarts_name || '-')}</div><div style="color: var(--sc-green-bright); margin-top: 6px; font-weight: 900; font-size: 18px;">AVG: ${htmlEscape(p.autodarts_avg || '-')}</div></div>`;
        }
        if (p.dartcounter_name || p.dartcounter_avg) {
            platformsHtml += `<div style="margin-bottom: 16px; padding: 16px; background: linear-gradient(135deg, rgba(255, 69, 0, 0.2), rgba(255, 69, 0, 0.08)); border-left: 4px solid var(--dc-orange); border: 2px solid rgba(255, 69, 0, 0.3);"><div style="color: var(--dc-orange); font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; text-shadow: 0 0 15px rgba(255, 69, 0, 0.6);">🟠 DARTCOUNTER</div><div style="color: var(--text-primary); font-weight: 800; font-size: 14px;">${htmlEscape(p.dartcounter_name || '-')}</div><div style="color: var(--dc-orange-bright); margin-top: 6px; font-weight: 900; font-size: 18px;">AVG: ${htmlEscape(p.dartcounter_avg || '-')}</div></div>`;
        }
        if (p.scolia_name || p.scolia_avg) {
            platformsHtml += `<div style="margin-bottom: 16px; padding: 16px; background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 255, 136, 0.08)); border-left: 4px solid var(--sc-green); border: 2px solid rgba(0, 255, 136, 0.3);"><div style="color: var(--sc-green); font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; text-shadow: 0 0 15px rgba(0, 255, 136, 0.6);">🟢 SCOLIA</div><div style="color: var(--text-primary); font-weight: 800; font-size: 14px;">${htmlEscape(p.scolia_name || '-')}</div><div style="color: var(--sc-green-bright); margin-top: 6px; font-weight: 900; font-size: 18px;">AVG: ${htmlEscape(p.scolia_avg || '-')}</div></div>`;
        }

        content.innerHTML = `
            <div>
                <div style="display: flex; gap: 18px; margin-bottom: 28px; align-items: flex-start;">
                    <img src="${avatarSrc}" style="width: 100px; height: 100px; border: 3px solid var(--ad-blue); box-shadow: 0 0 30px rgba(0, 240, 255, 0.6);" alt="Avatar">
                    <div style="flex: 1;">
                        <h2 style="margin: 0 0 8px 0; font-size: 24px; font-weight: 900; color: var(--ad-blue); text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 20px rgba(0, 240, 255, 0.5);">${htmlEscape(p.display_name || p.discord_name || p.username)}</h2>
                        <p style="margin: 0 0 12px 0; color: var(--text-secondary); font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">📍 ${htmlEscape(p.ort || 'NO LOCATION')}</p>
                        <button onclick="alert('DISCORD: ${htmlEscape(p.discord_name || '-')}')" style="padding: 10px 16px; background: linear-gradient(135deg, rgba(88,101,242,0.3), rgba(88,101,242,0.1)); border: 2px solid rgba(88,101,242,0.5); color: #7289da; cursor: pointer; font-weight: 800; font-size: 12px; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; font-family: 'Orbitron', monospace;">💬 DISCORD</button>
                    </div>
                </div>
                
                ${platformsHtml}
                
                <div style="padding: 16px; background: rgba(0, 240, 255, 0.1); border: 2px solid rgba(0, 240, 255, 0.2);">
                    <div style="color: var(--text-muted); font-size: 11px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin-bottom: 8px;">🎯 DART SETUP</div>
                    <p style="margin: 0; font-size: 14px; color: var(--text-primary); font-weight: 700;">${htmlEscape(p.dart_setup || 'NO INFO')}</p>
                </div>
            </div>
        `;
    };

    function renderHome() { 
        const tArea = document.getElementById("tableArea");
        const mArea = document.getElementById("matchdayArea");
        if(tArea) tArea.innerHTML = state.newsHtml; 
        if(mArea) mArea.innerHTML = ""; 
    }
    
    function getShortLeagueNumber(fullName) { 
        const match = fullName.match(/(\d+)$/); 
        return match ? `LG ${match[1]}` : fullName; 
    }

    async function loadAll() {
        const tableAreaEl = document.getElementById("tableArea");

        try {
            log("=== STARTING LOAD ===");

            try {
                const { data: authData } = await supabaseClient.auth.getSession();
                state.currentUser = authData && authData.session ? authData.session.user : null;
            } catch(e) { state.currentUser = null; }
            
            const loginBtnEl = document.getElementById("ligaLoginBtn");
            if(loginBtnEl) loginBtnEl.innerText = state.currentUser ? "👤 PROFILE" : "👤 LOGIN";

            try {
                const { data: newsData } = await supabaseClient.from('news').select('*').order('created_at', { ascending: false });
                let nHtml = "";
                if(newsData && newsData.length > 0) {
                    newsData.forEach(n => {
                        const date = new Date(n.created_at).toLocaleDateString('de-DE');
                        nHtml += `<div class="content-block">
                                    <div class="news-header-wrapper">
                                        <h3 class="news-title-text">${htmlEscape(n.title)}</h3>
                                        <span class="news-date-text">${date}</span>
                                    </div>
                                    <div class="ql-snow"><div class="ql-editor">${decodeHtml(n.content)}</div></div>
                                  </div>`;
                    });
                } else { nHtml = "<div class='empty'>⚪ NO NEWS</div>"; }
                state.newsHtml = `<div class="table-shell"><div class="section-head"><div class="section-title">NEWS</div></div><div style="padding:28px;">${nHtml}</div></div>`;
            } catch(e) {
                state.newsHtml = `<div class='empty'>ERROR</div>`;
            }

            try {
                const { data: sys } = await supabaseClient.from('system_settings').select('current_season, regelwerk_html').eq('id', 1).single();
                state.currentSeason = sys && sys.current_season ? sys.current_season : 'Saison 1';
                state.rulewerkHtml = sys && sys.regelwerk_html ? `<div class="ql-snow"><div class="ql-editor">${decodeHtml(sys.regelwerk_html)}</div></div>` : '<h2>RULES</h2><p>NO RULES</p>';
            } catch(e) {
                state.currentSeason = 'Saison 1';
                state.rulewerkHtml = '<h2>RULES</h2><p>NO RULES</p>';
            }

            log(`Season: ${state.currentSeason}`);

            const { data: profiles } = await supabaseClient.from('profiles').select('*');
            state.allProfilesCache = profiles || [];
            log(`Profiles: ${state.allProfilesCache.length}`);
            
            const { data: matchesData } = await supabaseClient.from('matches').select('*');
            const matches = matchesData ? matchesData.filter(m => m.season && String(m.season).toLowerCase().trim() === state.currentSeason.toLowerCase().trim()) : [];
            log(`Matches: ${matches.length}`);

            const { data: seasons } = await supabaseClient.from('matches').select('season');
            const uniqueSeasons = [...new Set((seasons || []).map(m => m.season))];
            
            const aS = document.getElementById("archiveSeasonSelect");
            if(aS) aS.innerHTML = '<option value="">SEASON</option>' + uniqueSeasons.map(s => `<option value="${s}">${s}</option>`).join("");
            const aL = document.getElementById("archiveLeagueSelect");
            if(aL) aL.innerHTML = '<option value="">LEAGUE</option>' + ALL_LEAGUES.map(l => `<option value="${l}">${l}</option>`).join("");

            ALL_LEAGUES.forEach(l => {
                state.leagueData[l] = { standings: { rows: [] }, matchdays: [] };
            });

            ALL_LEAGUES.forEach(league => {
                log(`\nProcessing ${league}...`);
                
                // FIXED: Absolut fehlertoleranter und case-insensitive Filterabgleich für Spieler-Zuweisung
                const leagueClean = league.toLowerCase().trim();

                const lPlayers = profiles ? profiles.filter(p => {
                    const adL = p.assigned_ad_league ? String(p.assigned_ad_league).toLowerCase().trim() : "";
                    const dcL = p.assigned_dc_league ? String(p.assigned_dc_league).toLowerCase().trim() : "";
                    const scL = p.assigned_sc_league ? String(p.assigned_sc_league).toLowerCase().trim() : "";
                    return adL === leagueClean || dcL === leagueClean || scL === leagueClean;
                }) : [];

                // FIXED: Absolut fehlertoleranter Filterabgleich für Ligen-Matches
                const lMatches = matches ? matches.filter(m => m.league_name && m.league_name.toLowerCase().trim() === leagueClean) : [];
                
                log(`  Found ${lPlayers.length} players, ${lMatches.length} matches`);

                const stats = {};
                
                lPlayers.forEach(p => {
                    stats[p.id] = { 
                        id: p.id, 
                        name: p.display_name || p.discord_name || p.username, 
                        wins: 0, losses: 0, legDiff: 0, points: 0, gamesPlayed: 0, avgSum: 0, avgCount: 0, 
                        yellow: p.yellow_cards || 0, red: p.red_cards || 0, showInMembers: p.show_in_members !== false 
                    };
                });

                lMatches.forEach(m => {
                    if (!m.player1_id || !m.player2_id) return;

                    if (!stats[m.player1_id]) {
                        const p = state.allProfilesCache.find(prof => prof.id === m.player1_id);
                        stats[m.player1_id] = { 
                            id: m.player1_id, 
                            name: p ? (p.display_name || p.discord_name || p.username) : "FORMER PLAYER", 
                            wins: 0, losses: 0, legDiff: 0, points: 0, gamesPlayed: 0, avgSum: 0, avgCount: 0, 
                            yellow: 0, red: 0, showInMembers: true 
                        };
                    }
                    if (!stats[m.player2_id]) {
                        const p = state.allProfilesCache.find(prof => prof.id === m.player2_id);
                        stats[m.player2_id] = { 
                            id: m.player2_id, 
                            name: p ? (p.display_name || p.discord_name || p.username) : "FORMER PLAYER", 
                            wins: 0, losses: 0, legDiff: 0, points: 0, gamesPlayed: 0, avgSum: 0, avgCount: 0, 
                            yellow: 0, red: 0, showInMembers: true 
                        };
                    }

                    if((m.status === 'done' || m.status === 'fertig') && m.player1_id && m.player2_id) {
                        const l1 = parseInt(m.legs_player1) || 0;
                        const l2 = parseInt(m.legs_player2) || 0;
                        
                        stats[m.player1_id].gamesPlayed++;
                        stats[m.player2_id].gamesPlayed++;
                        stats[m.player1_id].legDiff += (l1 - l2);
                        stats[m.player2_id].legDiff += (l2 - l1);

                        if(l1 > l2) { 
                            stats[m.player1_id].wins++; 
                            stats[m.player1_id].points += 2; 
                            stats[m.player2_id].losses++; 
                        } 
                        else if(l2 > l1) { 
                            stats[m.player2_id].wins++; 
                            stats[m.player2_id].points += 2; 
                            stats[m.player1_id].losses++; 
                        }

                        if (m.avg_player1 && !isNaN(parseFloat(m.avg_player1))) {
                            stats[m.player1_id].avgSum += parseFloat(m.avg_player1);
                            stats[m.player1_id].avgCount++;
                        }
                        if (m.avg_player2 && !isNaN(parseFloat(m.avg_player2))) {
                            stats[m.player2_id].avgSum += parseFloat(m.avg_player2);
                            stats[m.player2_id].avgCount++;
                        }
                    }
                });

                const standingsRows = Object.values(stats).sort((a,b) => b.points !== a.points ? b.points - a.points : b.legDiff - a.legDiff);
                
                const groupedMatches = {};
                lMatches.forEach(m => {
                    const day = m.matchday ? `Spieltag ${m.matchday}` : 'Spieltag';
                    if(!groupedMatches[day]) groupedMatches[day] = [];
                    
                    let p1Title = "Freilos";
                    let p2Title = "Freilos";
                    if (m.player1_id && stats[m.player1_id]) p1Title = stats[m.player1_id].name;
                    if (m.player2_id && stats[m.player2_id]) p2Title = stats[m.player2_id].name;

                    groupedMatches[day].push({ 
                        p1Name: p1Title, p2Name: p2Title, 
                        legs1: m.legs_player1, legs2: m.legs_player2, 
                        status: m.status 
                    });
                });

                const matchdays = Object.entries(groupedMatches).map(([title, rows]) => {
                    const done = rows.filter(r => r.status === 'done' || r.status === 'fertig').length;
                    return { 
                        title, status: done === rows.length ? 'fertig' : 'offen', 
                        doneMatches: done, totalMatches: rows.length, rows 
                    };
                }).sort((a, b) => {
                    const aNum = parseInt(a.title.match(/\d+/)?.[0] || 0);
                    const bNum = parseInt(b.title.match(/\d+/)?.[0] || 0);
                    return aNum - bNum;
                });

                state.leagueData[league] = { standings: { rows: standingsRows }, matchdays };
            });

            log("\n=== LOAD COMPLETE ===");
            setMode("Home");

        } catch (error) { 
            console.error(error);
            log(`ERROR: ${error.message}`);
            if(tableAreaEl) tableAreaEl.innerHTML = `<div class="empty" style="color: var(--dc-orange);">❌ ${error.message}</div>`; 
        }
    }

    function safeBind(id, handler) {
        const el = document.getElementById(id);
        if (el) el.addEventListener("click", handler);
    }

    safeBind("modeHome", () => setMode("Home"));
    safeBind("modeAutodarts", () => setMode("Autodarts"));
    safeBind("modeDartCounter", () => setMode("DartCounter"));
    safeBind("modeScolia", () => setMode("Scolia"));
    safeBind("archiveBtn", () => openModal(document.getElementById("archiveModal")));
    safeBind("openImpressumBtn", () => openModal(document.getElementById("impressumModal")));
    safeBind("openLinksBtn", () => openModal(document.getElementById("linksModal")));
    safeBind("openDebugBtn", () => showDebugInfo());
    
    safeBind("regelwerkBtn", () => {
        const modal = document.getElementById('playerProfileModal');
        const titleEl = document.getElementById('playerProfileTitle');
        const contentEl = document.getElementById('playerProfileContent');
        if(titleEl) titleEl.innerText = "RULES";
        if(contentEl) contentEl.innerHTML = state.rulewerkHtml;
        openModal(modal);
    });

    safeBind("ligaLoginBtn", () => {
        if (!state.currentUser) supabaseClient.auth.signInWithOAuth({ provider: 'discord', options: { redirectTo: window.location.href }});
        else window.location.assign("profil.html");
    });

    document.querySelectorAll(".modal-close").forEach(btn => {
        btn.addEventListener("click", () => closeModal(btn.closest(".modal-backdrop")));
    });

    function openModal(m) { if(m) m.classList.add("open"); }
    function closeModal(m) { if(m) m.classList.remove("open"); }

    window.toggleMatchday = function(btn) {
        const card = btn.parentElement;
        const isOpen = !card.classList.contains("open");
        card.classList.toggle("open", isOpen);
        state.matchdayOpenState[card.dataset.key] = isOpen;
    }

    function rankClass(rank, total) { 
        if (rank === 1) return "first"; 
        if (rank === 2) return "second"; 
        if (rank === 3) return "third"; 
        return ""; 
    }

    loadAll();
</script>
</body>
