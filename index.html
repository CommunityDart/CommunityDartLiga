<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CDL Dart Liga</title>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8141059951423155" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#03131b;
      --panel:#041924;
      --line:rgba(120,170,195,.12);
      --text:#f5fbff;
      --muted:#90a9b7;
      --green:#3ddc97;
      --red:#e74c3c;
      --yellow:#f7c948;
      --accent:#20b7ff;
      --accent-border:rgba(32,183,255,.42);
      --row-a:#052130;
      --row-b:#041924;
    }

    body[data-mode="DartCounter"]{ --accent:#ff9f1c; --accent-border:rgba(255,159,28,.42); }
    body[data-mode="Scolia"]{ --accent:#3ddc97; --accent-border:rgba(61,220,151,.42); }
    body[data-mode="Home"]{ --accent:#20b7ff; --accent-border:rgba(32,183,255,.42); }
    
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{ font-family:Arial,Helvetica,sans-serif; background: radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 14%, transparent), transparent 22%), linear-gradient(180deg, var(--bg) 0%, #021017 100%); color:var(--text); min-height:100vh; transition:background .2s ease; }
    .wrap{ width:min(1400px, calc(100% - 28px)); margin:0 auto; padding:8px 0 42px; }
    
    .hero-banner.image-banner{ position:relative; margin:0 0 14px; min-height:420px; border-radius:30px; overflow:hidden; border:1px solid rgba(255,255,255,.10); box-shadow: 0 18px 44px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.06); background: linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.14)), url("banner.png") center center / cover no-repeat; transition: box-shadow .2s ease; }
    .hero-banner.image-banner::before{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.03) 0%, rgba(0,0,0,.08) 55%, rgba(0,0,0,.16) 100%); pointer-events:none; }
    
    body[data-mode="Home"] .hero-banner.image-banner, body[data-mode="Autodarts"] .hero-banner.image-banner{ box-shadow: 0 18px 44px rgba(0,0,0,.34), 0 0 0 1px rgba(32,183,255,.20), 0 0 28px rgba(32,183,255,.14); }
    body[data-mode="DartCounter"] .hero-banner.image-banner{ box-shadow: 0 18px 44px rgba(0,0,0,.34), 0 0 0 1px rgba(255,159,28,.20), 0 0 28px rgba(255,159,28,.14); }
    body[data-mode="Scolia"] .hero-banner.image-banner{ box-shadow: 0 18px 44px rgba(0,0,0,.34), 0 0 0 1px rgba(61,220,151,.20), 0 0 28px rgba(61,220,151,.14); }
    
    /* SYMMETRISCHES MENÜ-RASTER (5 SPALTEN) */
    .top-nav-wrap{ width:min(1200px, 100%); margin:0 auto 24px; }
    .banner-nav{ width:100%; display:grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap:14px; padding:14px; border-radius:22px; background:rgba(4,12,14,.22); border:1px solid rgba(255,255,255,.10); box-shadow: 0 10px 24px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.05); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); align-items: start; }
    
    .nav-column-group { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    
    /* BEHOBEN: DISCORD BLOCK KOMPLETT BEGRENZT & SYMMETRISCH */
    .discord-button-group { display: flex; flex-direction: column; gap: 10px; width: 100%; max-height: 110px; }
    
    .hero-action-btn{ position:relative; width:100%; border:1px solid rgba(255,255,255,.16); background:rgba(6,20,30,.38); color:#f5fbff; border-radius:16px; min-height:50px; padding:0 14px; font-size:14px; font-weight:900; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; text-align:center; gap:10px; transition:.22s ease; white-space:nowrap; overflow:hidden; box-shadow: 0 10px 22px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.10); }
    .discord-button-group .hero-action-btn { min-height: 50px; font-size: 14px; }
    .hero-action-btn::before{ content:""; position:absolute; inset:1px; border-radius:15px; background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,0)); pointer-events:none; }
    .hero-action-btn:hover{ transform:translateY(-2px); background:rgba(10,28,40,.48); border-color:rgba(255,255,255,.24); box-shadow: 0 14px 28px rgba(0,0,0,.24), 0 0 22px rgba(255,255,255,.06); }
    
    .hero-btn-autodarts{ background:rgba(36,141,255,.20); border-color:rgba(90,180,255,.45); }
    .hero-btn-dartcounter{ background:rgba(255,154,31,.18); border-color:rgba(255,186,90,.42); }
    .hero-btn-scolia{ background:rgba(61,220,151,.18); border-color:rgba(100,240,180,.42); }
    .hero-btn-discord{ background:rgba(88,101,242,.28); border-color:rgba(162,170,255,.42); }
    .hero-btn-dark{ background:rgba(3,19,27,.42); border-color:rgba(120,170,195,.18); }
    
    #modeHome.active{ background:rgba(32,183,255,.25); border-color:rgba(130,205,255,.72); box-shadow: 0 14px 28px rgba(0,0,0,.24), 0 0 28px rgba(32,183,255,.28); }
    #modeAutodarts.active{ background:rgba(36,141,255,.30); border-color:rgba(130,205,255,.72); box-shadow: 0 14px 28px rgba(0,0,0,.24), 0 0 28px rgba(36,141,255,.28); }
    #modeDartCounter.active{ background:rgba(255,154,31,.28); border-color:rgba(255,206,130,.72); box-shadow: 0 14px 28px rgba(0,0,0,.24), 0 0 28px rgba(255,154,31,.24); }
    #modeScolia.active{ background:rgba(61,220,151,.28); border-color:rgba(100,240,180,.72); box-shadow: 0 14px 28px rgba(0,0,0,.24), 0 0 28px rgba(61,220,151,.24); }

    /* BEHOBEN: DISCORD LOGO GRÖSSE FESTGEZURRT */
    .discord-icon{ width:22px; height:18px; fill:currentColor; display:block; filter:drop-shadow(0 0 4px rgba(255,255,255,.1)); }

    /* FLIESSENDE DROPDOWNS DIREKT INNERHALB DER SPALTE */
    .dropdown-submenu { display: none; flex-direction: column; gap: 6px; background: rgba(2,16,23,0.6); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 6px; width: 100%; margin-top: 4px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.02); }
    .dropdown-submenu.active { display: flex; }
    .dropdown-btn { background: rgba(6,20,30,0.5); border: 1px solid rgba(255,255,255,0.08); color: #dff3ff; text-align: center; padding: 10px; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer; transition: 0.15s; width: 100%; }
    .dropdown-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--accent-border); }
    .dropdown-btn.active { background: var(--accent); color: #000; font-weight: 900; border-color: var(--accent); box-shadow: 0 0 12px color-mix(in srgb, var(--accent) 40%, transparent); }

    .main{ display:grid; grid-template-columns:minmax(0,1.7fr) minmax(320px,.8fr); gap:18px; align-items:start; }
    body[data-mode="Home"] .main { grid-template-columns: 1fr; }
    body[data-mode="Home"] .sidebar { display: none; }

    .table-shell, .matchday{ border:1px solid var(--line); background:linear-gradient(180deg, rgba(6,27,37,.96), rgba(4,20,28,.98)); box-shadow:0 18px 50px rgba(0,0,0,.35); border-radius:18px; }
    body[data-mode="DartCounter"] .table-shell, body[data-mode="DartCounter"] .matchday{ background:linear-gradient(180deg, rgba(48,24,8,.96), rgba(30,14,4,.98)); border-color:rgba(255,159,28,.22); box-shadow: 0 18px 50px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04); }
    body[data-mode="Scolia"] .table-shell, body[data-mode="Scolia"] .matchday{ background:linear-gradient(180deg, rgba(16,48,32,.96), rgba(10,30,20,.98)); border-color:rgba(61,220,151,.22); box-shadow: 0 18px 50px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.04); }
    
    .table-shell{ overflow:hidden; }

    .section-head{ display:flex; justify-content:space-between; align-items:center; gap:14px; padding:18px 18px 12px; flex-wrap:wrap; }
    .section-title{ margin:0; font-size:18px; font-weight:900; letter-spacing:.01em; }
    .section-sub{ color:var(--muted); font-size:13px; }
    body[data-mode="DartCounter"] .section-sub{ color:#f3c98f; }
    body[data-mode="Scolia"] .section-sub{ color:#9beebb; }

    .table-wrap{ overflow-x:auto; padding:0 0 6px; }
    table{ width:100%; border-collapse:collapse; min-width:760px; table-layout:fixed; }
    thead th{ padding:14px 16px; color:#c8dce6; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--line); background:#041722; white-space:nowrap; text-align:left; min-width:90px; }
    thead th:nth-child(3), thead th:nth-child(4), thead th:nth-child(5), thead th:nth-child(6), thead th:nth-child(7){ text-align:center; }
    
    body[data-mode="DartCounter"] thead th{ background:#3a1d08; color:#ffe2b8; border-bottom:1px solid rgba(255,159,28,.20); }
    body[data-mode="DartCounter"] tbody tr:nth-child(odd) td{ background:#402008; }
    body[data-mode="DartCounter"] tbody tr:nth-child(even) td{ background:#2f1706; }
    body[data-mode="DartCounter"] tbody td{ border-bottom:1px solid rgba(255,159,28,.08); }
    body[data-mode="DartCounter"] tbody tr:hover td{background:#5a2b08}
    
    body[data-mode="Scolia"] thead th{ background:#0e2a1c; color:#c2f5d6; border-bottom:1px solid rgba(61,220,151,.20); }
    body[data-mode="Scolia"] tbody tr:nth-child(odd) td{ background:#143825; }
    body[data-mode="Scolia"] tbody tr:nth-child(even) td{ background:#0f2a1b; }
    body[data-mode="Scolia"] tbody td{ border-bottom:1px solid rgba(61,220,151,.08); }
    body[data-mode="Scolia"] tbody tr:hover td{background:#1d5236}

    tbody tr:nth-child(odd) td{background:var(--row-a)}
    tbody tr:nth-child(even) td{background:var(--row-b)}
    tbody td{ padding:14px 16px; border-bottom:1px solid rgba(120,170,195,.08); font-size:15px; color:#f1f8fb; white-space:nowrap; vertical-align:top; }
    tbody tr:hover td{background:#0a2b3b}

    .rank-col{ width:84px; font-weight:900; position:relative; }
    .rank-col.first::before, .rank-col.last::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:10px; }
    .rank-col.first::before{ background:var(--green); }
    .rank-col.last::before{ background:var(--red); }

    .player-link { cursor: pointer; text-decoration: underline; text-decoration-color: rgba(255,255,255,0.2); transition: 0.2s; font-weight:600; color:#fff; }
    .player-link:hover { color: var(--accent); text-decoration-color: var(--accent); }
    .discord-link { cursor: pointer; font-weight: 700; font-size: 12px; transition: 0.2s; color: #8ec9ee; }
    .discord-link:hover { color: #fff; }

    .player-cell{ width:140px; min-width:140px; font-weight:800; }
    .player-meta-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top:4px; }
    .player-cards{ display:inline-flex; align-items:center; gap:5px; flex-wrap:wrap; }
    .card-badge{ display:inline-block; width:14px; height:18px; border-radius:3px; border:1px solid rgba(255,255,255,.20); box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 2px 6px rgba(0,0,0,.18); }
    .card-badge.yellow{ background:#f7c948; border-color:rgba(0,0,0,.22); }
    .card-badge.red{ background:#e74c3c; border-color:rgba(255,255,255,.14); }
    .points-cell{ font-weight:900; color:#fff; }
    
    thead th:nth-child(3), thead th:nth-child(4), thead th:nth-child(5), thead th:nth-child(6), thead th:nth-child(7),
    tbody td:nth-child(3), tbody td:nth-child(4), tbody td:nth-child(5), tbody td:nth-child(6), tbody td:nth-child(7){ width:110px; text-align:center; }

    .sidebar{ display:flex; flex-direction:column; gap:14px; }
    .matchday-list{ display:flex; flex-direction:column; gap:12px; }
    .matchday{ overflow:hidden; }
    .matchday-head{ width:100%; border:none; background:transparent; color:var(--text); padding:16px 16px; display:flex; justify-content:space-between; align-items:center; gap:10px; cursor:pointer; text-align:left; }
    .matchday-title{ font-size:16px; font-weight:900; flex:1; min-width:0; }
    .matchday-head-right{ display:flex; align-items:center; justify-content:flex-end; gap:10px; width:96px; min-width:96px; flex:0 0 96px; }
    .matchday-progress{ width:46px; text-align:right; font-size:12px; font-weight:900; color:#cfe5ef; }
    .status-dot{ width:11px; height:11px; border-radius:50%; display:inline-block; flex:0 0 11px; }
    .status-dot.done{ background:var(--green); box-shadow:0 0 10px rgba(61,220,151,.65); }
    .status-dot.open{ background:var(--red); box-shadow:0 0 10px rgba(231,76,60,.65); }
    .status-badge{ display:inline-flex; align-items:center; justify-content:center; width:38px; min-width:38px; height:28px; padding:0; border-radius:999px; font-size:12px; font-weight:800; border:1px solid rgba(255,255,255,.08); background:rgba(255,255,255,.04); }
    .status-badge.done{ color:var(--green); border-color:rgba(61,220,151,.28); }
    .status-badge.open{ color:var(--red); border-color:rgba(231,76,60,.28); }
    .matchday-body{ display:none; padding:0 14px 14px; }
    .matchday.open .matchday-body{ display:block; }
    .match-table{ width:100%; min-width:100%; border-collapse:collapse; border-radius:12px; overflow:hidden; table-layout:auto; }
    .match-table td{ padding:12px 10px; font-size:13px; border-bottom:1px solid rgba(120,170,195,.08); white-space:normal; background:rgba(255,255,255,.02); color:#edf7fb; vertical-align:middle; }
    body[data-mode="DartCounter"] .match-table td{ background:rgba(255,255,255,.015); border-bottom:1px solid rgba(255,159,28,.08); }
    body[data-mode="Scolia"] .match-table td{ background:rgba(255,255,255,.015); border-bottom:1px solid rgba(61,220,151,.08); }
    .match-table tbody tr:first-child td{ border-top:none; }
    .match-table td.col-player{ min-width:120px; }
    .col-legs{ width:64px; text-align:center; }
    .status-cell{ width:96px; min-width:96px; text-align:right !important; vertical-align:middle; padding-right:10px !important; }

    .empty{ border:1px dashed rgba(120,170,195,.18); border-radius:14px; padding:14px; color:var(--muted); font-size:14px; text-align:center;}
    body[data-mode="DartCounter"] .empty{ border-color:rgba(255,159,28,.24); color:#f3c98f; }
    body[data-mode="Scolia"] .empty{ border-color:rgba(61,220,151,.24); color:#9beebb; }

    .footer{ margin-top:20px; display:flex; justify-content:center; gap:12px; flex-wrap:wrap; }
    .footer-note{ width:100%; text-align:center; color:#7c95a3; font-size:12px; margin-top:4px; }

    .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.62); display:none; align-items:center; justify-content:center; padding:20px; z-index:1000; }
    .modal-backdrop.open{ display:flex; }
    .modal{ width:min(840px, 100%); max-height:min(88vh, 920px); background:linear-gradient(180deg, rgba(6,27,37,.98), rgba(4,20,28,.99)); border:1px solid var(--line); border-radius:20px; box-shadow:0 24px 60px rgba(0,0,0,.45); overflow:hidden; display:flex; flex-direction:column; }
    .modal-head{ display:flex; justify-content:space-between; align-items:center; gap:12px; padding:18px 18px 14px; border-bottom:1px solid rgba(120,170,195,.10); }
    .modal-title{ margin:0; font-size:18px; font-weight:900; }
    .modal-close{ width:40px; height:40px; border-radius:12px; border:none; background:rgba(255,255,255,0.1); color:#fff; cursor:pointer;}
    .modal-close:hover{ background:rgba(255,255,255,0.2); }
    .modal-body{ padding:18px; color:#d7e8ef; line-height:1.6; font-size:14px; overflow:auto; }
    .content-block{ margin-bottom:18px; padding:14px; border:1px solid rgba(120,170,195,.10); border-radius:14px; background:rgba(255,255,255,.02); position: relative; }
    .content-block h4{ margin:0 0 8px; font-size:15px; color:#fff; }

    .content-block img { max-width: 100%; height: auto; border-radius: 8px; margin: 10px 0; display: block; border: 1px solid rgba(255,255,255,0.1); }

    .news-admin-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; }
    .news-action-link { font-size: 11px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: #90a9b7; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; text-decoration: none; transition: 0.15s; }
    .news-action-link.edit:hover { background: #20b7ff; color: #000; border-color: #20b7ff; }
    .news-action-link.delete:hover { background: #e74c3c; color: #fff; border-color: #e74c3c; }

    .modal-profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
    .modal-avatar { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; background: #021017; }
    .modal-profile-name { font-size: 20px; font-weight: 900; margin: 0; }
    
    .modal-discord-sub { font-size: 13px; color: #8ec9ee; font-weight: bold; cursor: pointer; text-decoration: underline; margin-top: 4px; display: inline-block; }
    .platform-link-btn { display: inline-block; background: rgba(32,183,255,0.15); border: 1px solid rgba(32,183,255,0.3); color: #20b7ff; padding: 2px 8px; border-radius: 4px; text-decoration: none; font-size: 11px; font-weight: bold; margin-left: 8px; transition: 0.2s; }

    @media (max-width:1180px){
      .banner-nav{ grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    }
    @media (max-width:1100px){
      .main{grid-template-columns:1fr}
      .sidebar{order:2}
    }
    @media (max-width:760px) {
      .wrap{width:min(100% - 16px, 1400px)}
      .hero-banner.image-banner{ min-height:180px; border-radius:20px; background-size:cover; }
      .banner-nav{ grid-template-columns: repeat(2, minmax(0, 1fr)); gap:10px; padding: 10px; }
      .hero-action-btn{ min-height:46px; font-size:14px; border-radius: 10px; }
      .player-cell{ width:120px; min-width:120px; }
      thead th { padding: 10px 8px; font-size: 11px; }
      tbody td { padding: 10px 8px; font-size: 13px; }
      .rank-col { width: 60px; }
      .matchday-head-right{ width:92px; min-width:92px; flex:0 0 92px; }
      .modal { width: calc(100% - 24px); margin: 12px; max-height: calc(100vh - 24px); }
    }
    @media (max-width:560px){ .banner-nav { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  </style>
</head>
<body data-mode="Home">

  <div class="wrap">
    <section class="hero-banner image-banner"></section>

    <div class="top-nav-wrap">
      <section class="banner-nav-shell">
        <div class="banner-nav">
          
          <!-- SPALTE 1: NEUIGKEITEN & REGELWERK STABIL UNTEREINANDER -->
          <div class="nav-column-group">
            <button id="modeHome" class="hero-action-btn hero-btn-dark mode-btn active" type="button">Neuigkeiten</button>
            <button id="regelwerkBtn" class="hero-action-btn hero-btn-dark info-btn" type="button">Regelwerk</button>
          </div>

          <!-- SPALTE 2: AUTODARTS + SEIN DIREKTES UNTERMENÜ IM BLOCK -->
          <div class="nav-column-group">
            <button id="modeAutodarts" class="hero-action-btn hero-btn-autodarts mode-btn" type="button">Autodarts</button>
            <div id="autodartsSubmenu" class="dropdown-submenu"></div>
          </div>

          <!-- SPALTE 3: DARTCOUNTER + SEIN DIREKTES UNTERMENÜ IM BLOCK -->
          <div class="nav-column-group">
            <button id="modeDartCounter" class="hero-action-btn hero-btn-dartcounter mode-btn" type="button">DartCounter</button>
            <div id="dartcounterSubmenu" class="dropdown-submenu"></div>
          </div>

          <!-- SPALTE 4: SCOLIA + SEIN DIREKTES UNTERMENÜ IM BLOCK -->
          <div class="nav-column-group">
            <button id="modeScolia" class="hero-action-btn hero-btn-scolia mode-btn" type="button">Scolia</button>
            <div id="scoliaSubmenu" class="dropdown-submenu"></div>
          </div>

          <!-- SPALTE 5: LOGIN / DISCORD (PERFEKT OPTISCH BEGRENZT) -->
          <div class="discord-button-group">
            <a href="https://discord.gg/DEINLINK" target="_blank" class="hero-action-btn hero-btn-discord discord-main-btn">

  <script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    let supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const AD_LEAGUES = ["Autodarts Liga 1", "Autodarts Liga 2", "Autodarts Liga 3", "Autodarts Liga 4", "Autodarts Liga 5", "Autodarts Liga 6"];
    const DC_LEAGUES = ["DartCounter Liga 1", "DartCounter Liga 2", "DartCounter Liga 3", "DartCounter Liga 4", "DartCounter Liga 5", "DartCounter Liga 6"];
    const SC_LEAGUES = ["Scolia Liga 1", "Scolia Liga 2", "Scolia Liga 3"];
    const ALL_LEAGUES = [...AD_LEAGUES, ...DC_LEAGUES, ...SC_LEAGUES];

    const state = { 
        leagueData: {}, activeLeague: null, activeMode: "Home", 
        currentSeason: "Saison 1", newsHtml: "", rulewerkHtml: "", currentUser: null,
        matchdayOpenState: {}, isAdminUser: false
    };

    const tableAreaEl = document.getElementById("tableArea");
    const matchdayAreaEl = document.getElementById("matchdayArea");
    const loginBtnText = document.getElementById("loginBtnText");

    function htmlEscape(value) { return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;"); }

    window.copyDiscord = function(name) {
      navigator.clipboard.writeText(name).then(() => alert("Der Discord-Name '" + name + "' wurde kopiert!"));
    };

    window.directEditNews = function(id) { window.location.href = "profil.html"; };

    window.directDeleteNews = async function(id) {
        if(!confirm("Möchtest du diesen News-Eintrag wirklich direkt löschen?")) return;
        const { error } = await supabaseClient.from('news').delete().eq('id', id);
        if(error) alert("Fehler: " + error.message);
        else loadAll();
    };

    window.openPlayerProfile = async function(playerName) {
        if(playerName === 'Freilos') return;
        const modal = document.getElementById("playerProfileModal");
        const content = document.getElementById("playerProfileContent");
        content.innerHTML = "<p>Suche Spieler...</p>";
        openModal(modal);

        try {
            const { data } = await supabaseClient.from('profiles').select('*')
                .or(`real_name.ilike.%${playerName}%,autodarts_name.ilike.%${playerName}%,dartcounter_name.ilike.%${playerName}%,scolia_name.ilike.%${playerName}%,discord_name.ilike.%${playerName}%`)
                .limit(1).single();

            if (!data) { content.innerHTML = "<div class='empty'>Spieler nicht gefunden.</div>"; return; }

            const avatarSrc = data.avatar_url || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'></svg>";
            let profileHtml = `<div class="modal-profile-header"><img class="modal-avatar" src="${htmlEscape(avatarSrc)}"><div><h2 class="modal-profile-name">${htmlEscape(playerName)}</h2>`;
            
            if (data.discord_id) profileHtml += `<a href="https://discord.com/users/${htmlEscape(data.discord_id)}" target="_blank" style="color:var(--accent); font-size:14px; font-weight:bold; display:block; margin-top:5px; transition:0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='var(--accent)'">Nachricht in Discord 💬</a>`;
            else if (data.discord_name) profileHtml += `<span style="color:#90a9b7; font-size:13px; display:block; margin-top:5px;">Discord: ${htmlEscape(data.discord_name)}</span>`;
            profileHtml += `</div></div>`;

            if (data.dart_setup) profileHtml += `<div class="content-block"><h4>Mein Dartsetup</h4><p style="margin:0; font-size:14px; color:#edf7fb;">${htmlEscape(data.dart_setup)}</p></div>`;

            const adLink = data.autodarts_url ? `<a href="${htmlEscape(data.autodarts_url)}" target="_blank" class="platform-link-btn">🔗 Profil</a>` : '';
            const dcLink = data.dartcounter_url ? `<a href="${htmlEscape(data.dartcounter_url)}" target="_blank" class="platform-link-btn">🔗 Profil</a>` : '';
            const scLink = data.scolia_url ? `<a href="${htmlEscape(data.scolia_url)}" target="_blank" class="platform-link-btn">🔗 Profil</a>` : '';

            profileHtml += `<div class="content-block"><h4>Plattformen & AVG</h4>
                <p style="margin:4px 0;"><strong>Autodarts:</strong> ${htmlEscape(data.autodarts_name || '-')} <em>(AVG: ${htmlEscape(data.autodarts_avg || '-')})</em> ${adLink}</p>
                <p style="margin:4px 0;"><strong>DartCounter:</strong> ${htmlEscape(data.dartcounter_name || '-')} <em>(AVG: ${htmlEscape(data.dartcounter_avg || '-')})</em> ${dcLink}</p>
                <p style="margin:4px 0;"><strong>Scolia:</strong> ${htmlEscape(data.scolia_name || '-')} <em>(AVG: ${htmlEscape(data.scolia_avg || '-')})</em> ${scLink}</p>
            </div>`;
            content.innerHTML = profileHtml;
        } catch (err) { content.innerHTML = "<div class='empty'>Fehler beim Laden.</div>"; }
    };

    function rankClass(rank, total) {
      if (rank === 1) return "first";
      if (rank >= total && total > 1) return "last";
      return "";
    }

    function renderPlayerCards(yellow, red) {
      let html = "";
      for (let i = 0; i < (yellow || 0); i++) html += `<span class="card-badge yellow"></span>`;
      for (let i = 0; i < (red || 0); i++) html += `<span class="card-badge red"></span>`;
      return html ? `<span class="player-cards">${html}</span>` : "";
    }

    function renderStandingsTable(rows) {
      if (!rows || rows.length === 0) return `<div class="table-shell"><div class="section-head"><div class="section-title">Tabelle</div></div><div style="padding:18px"><div class="empty">Keine Spieler in dieser Liga.</div></div></div>`;
      
      const tbody = rows.map((s, idx) => {
        const rank = idx + 1;
        return `<tr>
          <td class="rank-col ${rankClass(rank, rows.length)}">${rank}</td>
          <td class="player-cell">
             <span class="player-link" onclick="openPlayerProfile('${htmlEscape(s.name)}')">${htmlEscape(s.name)}</span>
             <div class="player-meta-row">${renderPlayerCards(s.yellow, s.red)}</div>
          </td>
          <td class="discord-cell">${s.discord ? `<span class="discord-link" onclick="copyDiscord('${htmlEscape(s.discord)}')">${htmlEscape(s.discord)}</span>` : "-"}</td>
          <td>${s.wins}</td><td>${s.losses}</td><td>${s.legDiff}</td><td class="points-cell">${s.points}</td>
        </tr>`;
      }).join("");

      return `<div class="table-shell"><div class="section-head"><div><div class="section-title">Tabelle</div><div class="section-sub">Live berechnet • Bo7</div></div></div>
      <div class="table-wrap"><table><thead><tr><th class="rank-col">Platz</th><th>Spieler</th><th>Discord</th><th>Siege</th><th>Niederlagen</th><th>Leg-Diff</th><th>Punkte</th></tr></thead><tbody>${tbody}</tbody></table></div></div>`;
    }

    function renderMatchdays(matchdays) {
      if (!matchdays || matchdays.length === 0) return `<div class="empty">Keine Spieltage.</div>`;
      const defOpen = matchdays.findIndex(day => day.status !== 'fertig');
      const defaultOpenIndex = defOpen !== -1 ? defOpen : 0;

      return matchdays.map((day, idx) => {
        const key = `${state.activeLeague}__${day.title}`;
        const isOpen = key in state.matchdayOpenState ? state.matchdayOpenState[key] : idx === defaultOpenIndex;
        
        const tbody = day.rows.map(m => `<tr>
          <td class="col-player"><span class="player-link" onclick="openPlayerProfile('${htmlEscape(m.p1Name)}')">${htmlEscape(m.p1Name)}</span></td>
          <td class="col-player"><span class="player-link" onclick="openPlayerProfile('${htmlEscape(m.p2Name)}')">${htmlEscape(m.p2Name)}</span></td>
          <td class="col-legs">${m.legs1 !== null ? m.legs1 : '-'}</td><td class="col-legs">${m.legs2 !== null ? m.legs2 : '-'}</td>
          <td class="status-cell"><span class="status-badge ${m.status === 'done' ? 'done' : 'open'}"><span class="status-dot ${m.status === 'done' ? 'done' : 'open'}"></span></span></td>
        </tr>`).join("");

        return `<div class="matchday ${isOpen ? "open" : ""}" data-key="${htmlEscape(key)}">
          <button class="matchday-head" onclick="toggleMatchday(this)">
            <span class="matchday-title">${htmlEscape(day.title)}</span>
            <span class="matchday-head-right"><span class="matchday-progress">${day.doneMatches}/${day.totalMatches}</span>
            <span class="status-badge ${day.status === 'fertig' ? 'done' : 'open'}"><span class="status-dot ${day.status === 'fertig' ? 'done' : 'open'}"></span></span></span>
          </button>
          <div class="matchday-body"><table class="match-table"><tbody>${tbody}</tbody></table></div>
        </div>`;
      }).join("");
    }

    window.toggleMatchday = function(btn) {
        const card = btn.parentElement;
        const isOpen = !card.classList.contains("open");
        card.classList.toggle("open", isOpen);
        state.matchdayOpenState[card.dataset.key] = isOpen;
    }

    function renderLeague() {
      const data = state.leagueData[state.activeLeague];
      if (!data || !data.standings.rows.length) { 
          tableAreaEl.innerHTML = `<div class="table-shell"><div class="section-head"><div class="section-title">Liga-Status</div></div><div style="padding:18px"><div class="empty">Noch keine Liga derzeit aktiv geschaltet.</div></div></div>`; 
          matchdayAreaEl.innerHTML = ""; 
          return; 
      }
      tableAreaEl.innerHTML = renderStandingsTable(data.standings.rows);
      matchdayAreaEl.innerHTML = renderMatchdays(data.matchdays);
    }

    function getShortLeagueNumber(fullName) {
        const match = fullName.match(/\d+$/);
        return match ? `#${match[0]}` : fullName;
    }

    function renderHome() {
      if (!tableAreaEl) return;
      tableAreaEl.innerHTML = state.newsHtml;
      if (matchdayAreaEl) matchdayAreaEl.innerHTML = "";
    }

    function renderSystemSubmenus() {
      const renderSub = (elId, prefix) => {
        const el = document.getElementById(elId); if (!el) return;
        const filtered = ALL_LEAGUES.filter(l => l.startsWith(prefix) && state.leagueData[l] && state.leagueData[l].standings.rows.length > 0);
        
        if(filtered.length === 0) {
            el.innerHTML = `<div style="padding:10px; font-size:12px; color:#90a9b7; text-align:center; font-style:italic;">Noch keine Liga derzeit</div>`;
        } else {
            el.innerHTML = filtered.map(l => `<button class="dropdown-btn ${l === state.activeLeague ? "active" : ""}" data-name="${htmlEscape(l)}">${getShortLeagueNumber(l)}</button>`).join("");
        }
        el.classList.add('active'); 
        
        el.querySelectorAll(".dropdown-btn").forEach(btn => btn.onclick = (e) => {
            e.stopPropagation();
            state.activeLeague = btn.dataset.name; 
            renderSystemSubmenus(); 
            renderLeague(); 
        });
      };
      renderSub("autodartsSubmenu", "Autodarts");
      renderSub("dartcounterSubmenu", "DartCounter");
      renderSub("scoliaSubmenu", "Scolia");
    }

    function setMode(mode) {
      state.activeMode = mode;
      document.body.setAttribute("data-mode", mode);
      document.getElementById("modeHome").classList.toggle("active", mode === "Home");
      document.getElementById("modeAutodarts").classList.toggle("active", mode === "Autodarts");
      document.getElementById("modeDartCounter").classList.toggle("active", mode === "DartCounter");
      document.getElementById("modeScolia").classList.toggle("active", mode === "Scolia");
      
      document.querySelectorAll('.dropdown-submenu').forEach(e => e.classList.remove('active'));

      if (mode === "Home") {
        renderHome();
      } else {
        const visible = ALL_LEAGUES.filter(l => l.startsWith(mode) && state.leagueData[l] && state.leagueData[l].standings.rows.length > 0);
        state.activeLeague = visible.includes(state.activeLeague) ? state.activeLeague : (visible[0] || null);
        renderSystemSubmenus();
        renderLeague();
      }
    }

    async function loadAll() {
        tableAreaEl.innerHTML = `<div class="empty">Berechne Live-Tabellen...</div>`;
        
        const { data: { session } } = await supabaseClient.auth.getSession();
        state.currentUser = session ? session.user : null;
        loginBtnText.innerText = state.currentUser ? "Mein Profil" : "Liga Login";

        state.isAdminUser = false;
        if (state.currentUser) {
            const { data: pData } = await supabaseClient.from('profiles').select('is_admin').eq('id', state.currentUser.id).maybeSingle();
            if (pData && pData.is_admin === true) {
                state.isAdminUser = true;
            }
        }

        try {
            const { data: newsData } = await supabaseClient.from('news').select('*').order('created_at', { ascending: false });
            let nHtml = "";
            if(newsData && newsData.length > 0) {
                newsData.forEach(n => {
                    const date = new Date(n.created_at).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' });
                    
                    const adminActionsHtml = state.isAdminUser ? `
                        <div class="news-admin-actions">
                            <span class="news-action-link edit" onclick="directEditNews('${n.id}')">✏️</span>
                            <span class="news-action-link delete" onclick="directDeleteNews('${n.id}')">🗑️</span>
                        </div>
                    ` : '';

                    nHtml += `<div class="content-block">
                                ${adminActionsHtml}
                                <h4 style="margin-bottom:12px; color:#fff; font-size:16px; border-bottom:1px dashed rgba(255,255,255,0.05); padding-bottom:6px; padding-right: 60px;">${htmlEscape(n.title)} <span style="font-size:11px; color:#7c95a3; float:right; font-weight:normal; margin-top:4px;">${date} Uhr</span></h4>
                                <div style="color:#d7e8ef; line-height:1.6; font-size:14px;">${n.content}</div>
                              </div>`;
                });
            } else {
                nHtml = "<div class='empty'>Aktuell keine Neuigkeiten vorhanden.</div>";
            }
            state.newsHtml = `<div class="table-shell"><div class="section-head"><div><div class="section-title">Neuigkeiten & Ankündigungen</div><div class="section-sub">Aktuelle Infos unserer Community.</div></div></div><div style="padding:0 18px 18px">${nHtml}</div></div>`;

            try { 
                const r = await fetch('regelwerk.html'); 
                if(r.ok) state.rulewerkHtml = await r.text();
            } catch(e){}
            
            try { const r = await fetch('links.html'); if(r.ok) document.getElementById('linksContent').innerHTML = await r.text(); } catch(e){}

            const { data: sys } = await supabaseClient.from('system_settings').select('current_season').eq('id', 1).single();
            state.currentSeason = sys ? sys.current_season : 'Saison 1';

            const { data: profiles } = await supabaseClient.from('profiles').select('*');
            const { data: matches } = await supabaseClient.from('matches').select('*').eq('season', state.currentSeason);

            ALL_LEAGUES.forEach(league => {
                const lMatches = matches ? matches.filter(m => m.league_name === league) : [];
                const lPlayers = profiles ? profiles.filter(p => p.assigned_ad_league === league || p.assigned_dc_league === league || p.assigned_sc_league === league) : [];
                
                if(lPlayers.length === 0 && lMatches.length === 0) return;

                const stats = {};
                lPlayers.forEach(p => stats[p.id] = { id: p.id, name: p.discord_name || p.real_name || 'Unbekannt', discord: p.discord_name, wins: 0, losses: 0, legDiff: 0, points: 0, yellow: p.yellow_cards, red: p.red_cards });

                lMatches.forEach(m => {
                    if(m.status === 'done' && m.player1_id && m.player2_id) {
                        if(!stats[m.player1_id]) stats[m.player1_id] = { id: m.player1_id, name: "Ehem. Spieler", wins:0, losses:0, legDiff:0, points:0, yellow:0, red:0 };
                        if(!stats[m.player2_id]) stats[m.player2_id] = { id: m.player2_id, name: "Ehem. Spieler", wins:0, losses:0, legDiff:0, points:0, yellow:0, red:0 };

                        const l1 = parseInt(m.legs1) || 0; const l2 = parseInt(m.legs2) || 0;
                        stats[m.player1_id].legDiff += (l1 - l2); stats[m.player2_id].legDiff += (l2 - l1);

                        if(l1 > l2) { stats[m.player1_id].wins++; stats[m.player1_id].points += 2; stats[m.player2_id].losses++; } 
                        else if (l2 > l1) { stats[m.player2_id].wins++; stats[m.player2_id].points += 2; stats[m.player1_id].losses++; } 
                        else { stats[m.player1_id].points += 1; stats[m.player2_id].points += 1; }
                    }
                });

                const standingsRows = Object.values(stats).sort((a,b) => {
                    if(a.red !== b.red) return a.red - b.red;
                    if(b.points !== a.points) return b.points - a.points;
                    return b.legDiff - a.legDiff;
                });

                const groupedMatches = {};
                lMatches.forEach(m => {
                    const day = `Spieltag ${m.matchday}`;
                    if(!groupedMatches[day]) groupedMatches[day] = [];
                    groupedMatches[day].push({ 
                        p1Name: m.player1_id ? (stats[m.player1_id]?.name || 'Unbekannt') : 'Freilos',
                        p2Name: m.player2_id ? (stats[m.player2_id]?.name || 'Unbekannt') : 'Freilos',
                        legs1: m.legs1, legs2: m.legs2, status: m.status
                    });
                });

                const matchdays = Object.entries(groupedMatches).map(([title, rows]) => {
                    const done = rows.filter(r => r.status === 'done').length;
                    return { title, status: (rows.length>0 && done===rows.length)?'fertig':'offen', doneMatches: done, totalMatches: rows.length, rows };
                });

                state.leagueData[league] = { standings: { rows: standingsRows }, matchdays };
            });

            setMode("Home");
        } catch (error) { tableAreaEl.innerHTML = `<div class="empty">Fehler: ${htmlEscape(error?.message)}</div>`; }
    }

    document.getElementById("modeHome").onclick = (e) => { e.stopPropagation(); setMode("Home"); };
    document.getElementById("modeAutodarts").onclick = (e) => { e.stopPropagation(); setMode("Autodarts"); };
    document.getElementById("modeDartCounter").onclick = (e) => { e.stopPropagation(); setMode("DartCounter"); };
    document.getElementById("modeScolia").onclick = (e) => { e.stopPropagation(); setMode("Scolia"); };
    
    document.getElementById("openImpressumBtn").onclick = () => openModal(document.getElementById("impressumModal"));
    document.getElementById("openLinksBtn").onclick = () => openModal(document.getElementById("linksModal"));
    
    document.getElementById("regelwerkBtn").onclick = (e) => {
        e.stopPropagation();
        const modal = document.getElementById('playerProfileModal');
        document.getElementById('playerProfileTitle').innerText = "Regelwerk";
        document.getElementById('playerProfileContent').innerHTML = state.rulewerkHtml;
        openModal(modal);
    };

    document.querySelectorAll("[data-close-modal]").forEach(btn => btn.onclick = () => closeModal(document.getElementById(btn.getAttribute("data-close-modal"))));
    document.querySelectorAll(".modal-backdrop").forEach(m => m.onclick = (e) => { if(e.target === m) closeModal(m); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") document.querySelectorAll('.modal-backdrop').forEach(closeModal); });

    document.getElementById("ligaLoginBtn").onclick = () => {
        if (!state.currentUser) supabaseClient.auth.signInWithOAuth({ provider: 'discord', options: { redirectTo: "https://communitydart.github.io/CommunityDartLiga/" }});
        else window.location.assign("profil.html");
    };

    function openModal(modal) { if (modal) { modal.classList.add("open"); modal.setAttribute("aria-hidden", "false"); } }
    function closeModal(modal) { if (modal) { modal.classList.remove("open"); modal.setAttribute("aria-hidden", "true"); } }

    loadAll();
  </script>
</body>
