<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CDL Dart Liga</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">

  <style>
    :root {
      --ad-blue: #0066ff;
      --ad-blue-light: #4d94ff;
      --ad-blue-dark: #0052cc;
      --dc-orange: #ff6b35;
      --dc-orange-light: #ff8c5a;
      --dc-orange-dark: #e55a1f;
      --sc-green: #00d084;
      --sc-green-light: #33dd99;
      --sc-green-dark: #00a85f;
      --bg-primary: #0a0e27;
      --bg-secondary: #141829;
      --bg-tertiary: #1a1f3a;
      --surface: #1c2140;
      --border: rgba(255, 255, 255, 0.08);
      --text-primary: #f0f4ff;
      --text-secondary: #b0c4ff;
      --text-muted: #6b7695;
      --accent-glow: 0 0 20px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a0e2e 50%, #0a1a2e 100%);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(0, 208, 132, 0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 16px;
      position: relative;
      z-index: 1;
    }

    /* ============ HEADER ============ */
    .header-branding {
      text-align: center;
      margin-bottom: 50px;
      padding: 60px 40px;
      background: linear-gradient(135deg, 
        rgba(0, 102, 255, 0.12) 0%, 
        rgba(255, 107, 53, 0.08) 50%, 
        rgba(0, 208, 132, 0.08) 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 0 40px rgba(0, 102, 255, 0.15),
        0 0 80px rgba(255, 107, 53, 0.08),
        0 0 120px rgba(0, 208, 132, 0.06),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
    }

    .header-branding::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 0% 0%, rgba(0, 102, 255, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(0, 208, 132, 0.3) 0%, transparent 50%);
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(10px, -10px); }
    }

    .header-branding h2 {
      margin: 0 0 8px 0;
      font-size: 56px;
      font-weight: 900;
      letter-spacing: 6px;
      position: relative;
      z-index: 2;
      background: linear-gradient(135deg, 
        var(--ad-blue) 0%, 
        var(--dc-orange) 50%, 
        var(--sc-green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(0, 102, 255, 0.3);
      filter: drop-shadow(0 0 20px rgba(0, 102, 255, 0.2));
    }

    .header-branding p {
      margin: 0;
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      position: relative;
      z-index: 2;
    }

    /* ============ NAVIGATION ============ */
    .dashboard-nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-bottom: 48px;
    }

    .nav-card {
      background: linear-gradient(135deg, 
        rgba(20, 24, 41, 0.8) 0%, 
        rgba(26, 31, 58, 0.6) 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 24px;
      backdrop-filter: blur(20px);
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .nav-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.05), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .nav-card:hover {
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 
        0 16px 48px rgba(0, 0, 0, 0.4),
        inset 0 1px 1px rgba(255, 255, 255, 0.15),
        0 0 40px rgba(0, 102, 255, 0.1);
      transform: translateY(-8px);
    }

    .nav-card:hover::before {
      opacity: 1;
    }

    .nav-card-title {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
    }

    .nav-btn {
      width: 100%;
      padding: 14px 18px;
      margin-bottom: 10px;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      color: var(--text-primary);
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }

    .nav-btn:hover::before {
      transform: translateX(100%);
    }

    .nav-btn:last-child { margin-bottom: 0; }
    
    .nav-btn:hover {
      border-color: rgba(255, 255, 255, 0.2);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.04));
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
    }

    .nav-btn.active {
      background: linear-gradient(135deg, var(--ad-blue), var(--ad-blue-dark));
      border-color: var(--ad-blue);
      color: white;
      box-shadow: 
        0 0 30px rgba(0, 102, 255, 0.5),
        0 12px 24px rgba(0, 102, 255, 0.2);
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }

    /* MODE BUTTONS SPECIFIC COLORS */
    #modeAutodarts.active { 
      background: linear-gradient(135deg, var(--ad-blue), var(--ad-blue-dark));
      box-shadow: 0 0 40px rgba(0, 102, 255, 0.6), 0 12px 24px rgba(0, 102, 255, 0.3);
    }

    #modeDartCounter.active { 
      background: linear-gradient(135deg, var(--dc-orange), var(--dc-orange-dark));
      border-color: var(--dc-orange);
      box-shadow: 0 0 40px rgba(255, 107, 53, 0.6), 0 12px 24px rgba(255, 107, 53, 0.3);
    }

    #modeScolia.active { 
      background: linear-gradient(135deg, var(--sc-green), var(--sc-green-dark));
      border-color: var(--sc-green);
      box-shadow: 0 0 40px rgba(0, 208, 132, 0.6), 0 12px 24px rgba(0, 208, 132, 0.3);
    }

    .icon-svg {
      width: 20px;
      height: 20px;
      stroke-width: 2.5;
      flex-shrink: 0;
      filter: drop-shadow(0 0 8px currentColor);
    }

    /* ============ MAIN LAYOUT ============ */
    .main {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 28px;
      align-items: start;
    }

    body[data-mode="Home"] .main {
      grid-template-columns: 1fr;
    }

    body[data-mode="Home"] .sidebar {
      display: none;
    }

    @media (max-width: 1024px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { display: none !important; }
    }

    /* ============ TABLES ============ */
    .table-shell {
      background: linear-gradient(135deg, 
        rgba(20, 24, 41, 0.6) 0%, 
        rgba(26, 31, 58, 0.4) 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        inset 0 1px 1px rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      transition: all 0.4s ease;
    }

    .table-shell:hover {
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 
        0 16px 48px rgba(0, 0, 0, 0.4),
        inset 0 1px 1px rgba(255, 255, 255, 0.1);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(90deg, 
        rgba(0, 102, 255, 0.08) 0%, 
        transparent 100%);
    }

    .section-title {
      font-size: 22px;
      font-weight: 900;
      margin: 0;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }

    .section-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 600;
    }

    /* TABLE */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      padding: 18px 20px;
      background: rgba(255, 255, 255, 0.04);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    tbody td {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 14px;
      color: var(--text-primary);
    }

    tbody tr:nth-child(odd) td { 
      background: rgba(255, 255, 255, 0.02);
    }
    tbody tr:nth-child(even) td { 
      background: rgba(255, 255, 255, 0.01);
    }
    tbody tr:hover td { 
      background: linear-gradient(90deg, 
        rgba(0, 102, 255, 0.15) 0%, 
        transparent 100%);
    }

    .rank-col {
      font-weight: 900;
      text-align: center;
      width: 70px;
      font-size: 18px;
    }

    .rank-col.first { color: #ffd700; }
    .rank-col.second { color: #c0c0c0; }
    .rank-col.third { color: #cd7f32; }

    .player-link {
      color: var(--ad-blue-light);
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s;
      position: relative;
    }

    .player-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--ad-blue), transparent);
      transition: width 0.3s;
    }

    .player-link:hover {
      color: var(--ad-blue);
      text-shadow: 0 0 10px rgba(0, 102, 255, 0.5);
    }

    .player-link:hover::after {
      width: 100%;
    }

    /* ============ SIDEBAR ============ */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .matchday {
      background: linear-gradient(135deg, 
        rgba(20, 24, 41, 0.6) 0%, 
        rgba(26, 31, 58, 0.4) 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      backdrop-filter: blur(20px);
    }

    .matchday:hover {
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 20px rgba(0, 102, 255, 0.2);
    }

    .matchday-head {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text-primary);
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-weight: 700;
      transition: all 0.2s;
    }

    .matchday-head:hover {
      background: rgba(0, 102, 255, 0.1);
    }

    .matchday-title {
      font-size: 14px;
      font-weight: 700;
    }

    .matchday-body {
      display: none;
      padding: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
    }

    .matchday.open .matchday-body {
      display: block;
    }

    .match-table {
      width: 100%;
      border-collapse: collapse;
    }

    .match-table td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 800;
      background: rgba(255, 107, 53, 0.2);
      color: var(--dc-orange-light);
      border: 1px solid rgba(255, 107, 53, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.done {
      background: rgba(0, 208, 132, 0.2);
      color: var(--sc-green-light);
      border-color: rgba(0, 208, 132, 0.4);
    }

    /* ============ CONTENT ============ */
    .content-block {
      margin-bottom: 20px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      background: linear-gradient(135deg, 
        rgba(0, 102, 255, 0.06) 0%, 
        rgba(0, 208, 132, 0.03) 100%);
      transition: all 0.3s ease;
      backdrop-filter: blur(20px);
    }

    .content-block:hover {
      border-color: rgba(0, 102, 255, 0.3);
      background: linear-gradient(135deg, 
        rgba(0, 102, 255, 0.1) 0%, 
        rgba(0, 208, 132, 0.06) 100%);
      box-shadow: 0 0 20px rgba(0, 102, 255, 0.15);
    }

    .news-header-wrapper {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 2px solid rgba(255, 255, 255, 0.08);
    }

    .news-title-text {
      font-size: 18px;
      font-weight: 800;
      color: var(--text-primary);
      margin: 0 0 8px 0;
    }

    .news-date-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ============ MODALS ============ */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
      backdrop-filter: blur(8px);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(640px, 100%);
      max-height: 85vh;
      background: linear-gradient(135deg, 
        rgba(20, 24, 41, 0.95) 0%, 
        rgba(26, 31, 58, 0.95) 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.5),
        0 0 40px rgba(0, 102, 255, 0.2);
      backdrop-filter: blur(20px);
      animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(90deg, 
        rgba(0, 102, 255, 0.1) 0%, 
        transparent 100%);
    }

    .modal-head h3 {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .modal-close:hover {
      background: rgba(0, 102, 255, 0.2);
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(0, 102, 255, 0.3);
    }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      flex: 1;
    }

    /* ============ DROPDOWNS ============ */
    .dropdown-submenu {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
    }

    .dropdown-btn {
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .dropdown-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .dropdown-btn.active {
      background: linear-gradient(135deg, var(--ad-blue), var(--ad-blue-dark));
      border-color: var(--ad-blue);
      color: white;
      box-shadow: 0 0 20px rgba(0, 102, 255, 0.5);
    }

    /* ============ FOOTER ============ */
    .footer {
      margin-top: 48px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .empty {
      padding: 60px 24px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ============ QUILL ============ */
    .ql-editor {
      color: var(--text-primary) !important;
      background: transparent !important;
      padding: 0 !important;
    }

    .ql-editor p {
      margin-bottom: 12px !important;
      line-height: 1.6 !important;
    }

    /* ============ DEBUG PANEL ============ */
    .debug-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
    }

    .debug-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid var(--ad-blue);
      background: linear-gradient(135deg, var(--ad-blue), var(--ad-blue-dark));
      color: white;
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(0, 102, 255, 0.6);
      transition: all 0.3s;
    }

    .debug-btn:hover {
      transform: scale(1.15);
      box-shadow: 0 0 50px rgba(0, 102, 255, 0.8);
    }

    .debug-content {
      position: absolute;
      bottom: 70px;
      right: 0;
      width: 400px;
      max-height: 400px;
      background: linear-gradient(135deg, rgba(20, 24, 41, 0.95), rgba(26, 31, 58, 0.95));
      border: 1px solid rgba(0, 102, 255, 0.3);
      border-radius: 16px;
      padding: 16px;
      overflow-y: auto;
      box-shadow: 0 0 40px rgba(0, 102, 255, 0.4);
      backdrop-filter: blur(20px);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--ad-blue-light);
    }

    @media (max-width: 768px) {
      .wrap {
        padding: 20px 12px;
      }

      .header-branding {
        padding: 40px 20px;
        margin-bottom: 30px;
      }

      .header-branding h2 {
        font-size: 32px;
        letter-spacing: 3px;
      }

      .dashboard-nav {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .debug-content {
        width: calc(100vw - 40px);
        max-height: 300px;
      }
    }
  </style>
</head>
<body data-mode="Home">

  <div class="wrap">
    
    <div class="header-branding">
       <h2>CDL</h2>
       <p id="headerSubtitle">DART LIGA</p>
    </div>

    <section class="dashboard-nav">
       <div class="nav-card">
          <div class="nav-card-title">📋 Menü</div>
          <button id="modeHome" class="nav-btn active" type="button">
            <span>📰 Neuigkeiten</span>
          </button>
          <button id="regelwerkBtn" class="nav-btn" type="button">
            <span>📑 Regelwerk</span>
          </button>
          <button id="archiveBtn" class="nav-btn" type="button">
            <span>🏛️ Archiv</span>
          </button>
        </div>

       <div class="nav-card">
          <div class="nav-card-title">🎯 Plattformen</div>
          <button id="modeAutodarts" class="nav-btn" type="button">
             <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="2"/></svg>
             <span>AUTODARTS</span>
          </button>
          <button id="modeDartCounter" class="nav-btn" type="button">
             <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="4" width="7" height="16" rx="2"/><rect x="13" y="4" width="7" height="16" rx="2"/></svg>
             <span>DARTCOUNTER</span>
          </button>
          <button id="modeScolia" class="nav-btn" type="button">

    window.directDeleteNews = async function(id) {

    window.loadArchiveData = async function() {
        const season = document.getElementById("archiveSeasonSelect").value;
        const league = document.getElementById("archiveLeagueSelect").value;
        const resultContainer = document.getElementById("archiveTableResult");
        if(!season || !league) return;
        
        resultContainer.innerHTML = "<div class='empty'>Lade Daten...</div>";
        const { data: matches, error } = await supabaseClient.from('matches').select('*').eq('season', season).eq('league_name', league).eq('status', 'done');
        
        if (error || !matches || matches.length === 0) {
            resultContainer.innerHTML = "<div class='empty'>Keine Daten.</div>";
            return;
        }

        const stats = {};
        matches.forEach(m => {
            if(m.player1_id && m.player2_id) {
                if(!stats[m.player1_id]) {
                    const p = state.allProfilesCache.find(prof => prof.id === m.player1_id);
                    stats[m.player1_id] = { name: p ? (p.display_name || p.discord_name) : 'Spieler', wins: 0, losses: 0, legDiff: 0, points: 0 };
                }
                if(!stats[m.player2_id]) {
                    const p = state.allProfilesCache.find(prof => prof.id === m.player2_id);
                    stats[m.player2_id] = { name: p ? (p.display_name || p.discord_name) : 'Spieler', wins: 0, losses: 0, legDiff: 0, points: 0 };
                }
                const l1 = parseInt(m.legs_player1) || 0; 
                const l2 = parseInt(m.legs_player2) || 0;
                stats[m.player1_id].legDiff += (l1 - l2); 
                stats[m.player2_id].legDiff += (l2 - l1);
                if(l1 > l2) { stats[m.player1_id].wins++; stats[m.player1_id].points += 2; stats[m.player2_id].losses++; } 
                else if(l2 > l1) { stats[m.player2_id].wins++; stats[m.player2_id].points += 2; stats[m.player1_id].losses++; }
            }
        });

        const rows = Object.values(stats).sort((a,b) => b.points - a.points);
        let html = `<div class="table-wrap"><table><thead><tr><th style="width:50px;">P</th><th>Spieler</th><th style="text-align:center;">W</th><th style="text-align:center;">L</th></tr></thead><tbody>`;
        rows.forEach((r, idx) => {
            html += `<tr><td style="font-weight: 900;">${idx+1}</td><td><strong>${htmlEscape(r.name)}</strong></td><td style="text-align:center;">${r.wins}</td><td style="text-align:center;">${r.losses}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        resultContainer.innerHTML = html;
    };

    function updateRightNavBlock() {
        const defaultBlock = document.getElementById("defaultRightContent");
        const dynamicBlock = document.getElementById("dynamicLeaguesContent");
        const cardTitle = document.getElementById("rightCardTitle");

        if (state.activeMode === "Home") {
            defaultBlock.style.display = "flex";

            if (cardTitle) cardTitle.innerText = "🌐 Community";

            defaultBlock.style.display = "none";
            dynamicBlock.style.display = "grid";

            const filtered = ALL_LEAGUES.filter(l => l.startsWith(state.activeMode));
            
            dynamicBlock.innerHTML = filtered.map(l => {
                return `<button class="dropdown-btn ${l === state.activeLeague ? "active" : ""}" onclick="selectLeagueDirectly('${l}')">${getShortLeagueNumber(l)}</button>`;
            }).join("");
        }
    }

    function setMode(mode) {
      state.activeMode = mode;
      document.body.setAttribute("data-mode", mode);
      
      const subTitleEl = document.getElementById("headerSubtitle");
      if (subTitleEl) {
          subTitleEl.innerText = mode === "Home" ? "DART LIGA" : mode.toUpperCase();
      }
      
      const setBtn = (id, isActive) => { const e = document.getElementById(id); if(e) e.classList.toggle("active", isActive); };
      setBtn("modeHome", mode === "Home");
      setBtn("modeAutodarts", mode === "Autodarts");
      setBtn("modeDartCounter", mode === "DartCounter");
      setBtn("modeScolia", mode === "Scolia");
      
      if (mode === "Home") {
        state.activeLeague = null;
        renderHome();
      } else {
        const filtered = ALL_LEAGUES.filter(l => l.startsWith(mode));
        state.activeLeague = filtered.includes(state.activeLeague) ? state.activeLeague : (filtered[0] || null);
        renderLeague();
      }
      updateRightNavBlock();
    }

    function renderLeague() {
      const tArea = document.getElementById("tableArea");
      const mArea = document.getElementById("matchdayArea");
      if(!tArea || !mArea) return;

      if(!state.activeLeague) {
          tArea.innerHTML = `<div class="table-shell"><div class="section-head"><div class="section-title">Übersicht</div></div><div class="empty">Keine Liga ausgewählt.</div></div>`;
          mArea.innerHTML = "";
          return;
      }
      
      const data = state.leagueData[state.activeLeague] || { standings: { rows: [] }, matchdays: [] };
      tArea.innerHTML = renderStandingsTable(data.standings.rows);
      mArea.innerHTML = renderMatchdays(data.matchdays);
    }

    function renderStandingsTable(rows) {
      const visibleRows = rows.filter(s => s.showInMembers !== false);

      if (visibleRows.length === 0) {
          return `<div class="table-shell"><div class="section-head"><div class="section-title">${state.activeLeague}</div></div><div class="empty">📭 Keine Spieler in dieser Liga</div></div>`;
      }

      const tbody = visibleRows.map((s, idx) => {
          const playerAvg = s.avgCount > 0 ? (s.avgSum / s.avgCount).toFixed(2) : "-";
          return `<tr>
              <td class="rank-col ${rankClass(idx+1, visibleRows.length)}">${idx+1}</td>
              <td><span class="player-link" onclick="openPlayerProfile('${htmlEscape(s.name)}')">${htmlEscape(s.name)}</span></td>
              <td style="text-align: center; font-weight: 600;">${s.gamesPlayed}</td>
              <td style="text-align: center; font-weight: 600;">${s.wins}</td>
              <td style="text-align: center;">${s.losses}</td>
              <td style="text-align: center;">${s.legDiff}</td>
              <td style="text-align: center; font-weight: 700; color: var(--ad-blue-light);">${playerAvg}</td>
              <td style="text-align: right; font-weight: 900; color: var(--ad-blue-light); font-size: 16px;">${s.points}</td>
            </tr>`;
      }).join("");

      return `<div class="table-shell"><div class="section-head"><div><div class="section-title">${state.activeLeague}</div><div class="section-sub">LIVE STANDINGS • BEST OF 7</div></div></div>
      <div class="table-wrap"><table><thead><tr><th style="width: 60px;">P</th><th>SPIELER</th><th style="width: 60px;">SP</th><th style="width: 60px;">S</th><th style="width: 60px;">N</th><th style="width: 80px;">L-DIFF</th><th style="width: 60px;">AVG</th><th style="width: 60px;">PTS</th></tr></thead><tbody>${tbody}</tbody></table></div></div>`;
    }

    function renderMatchdays(matchdays) {
      if (!matchdays || matchdays.length === 0) return `<div class="empty">⚪ Keine Spieltage</div>`;
      
      const defaultOpenIndex = Math.max(0, matchdays.findIndex(day => day.status !== 'fertig' && day.status !== 'done'));

      return matchdays.map((day, idx) => {
        const key = `${state.activeLeague}__${day.title}`;
        const isOpen = key in state.matchdayOpenState ? state.matchdayOpenState[key] : idx === defaultOpenIndex;
        
        const tbody = day.rows.map(m => `<tr>
          <td><span class="player-link" onclick="openPlayerProfile('${htmlEscape(m.p1Name)}')">${htmlEscape(m.p1Name)}</span></td>
          <td><span class="player-link" onclick="openPlayerProfile('${htmlEscape(m.p2Name)}')">${htmlEscape(m.p2Name)}</span></td>
          <td style="text-align:center; font-weight:700;">${m.legs1 !== null && m.legs1 !== undefined ? m.legs1 : '-'} : ${m.legs2 !== null && m.legs2 !== undefined ? m.legs2 : '-'}</td>
          <td style="text-align:right;"><span class="status-badge ${m.status === 'done' || m.status === 'fertig' ? 'done' : ''}">${m.status === 'done' || m.status === 'fertig' ? '✓' : '○'}</span></td>
        </tr>`).join("");

        return `<div class="matchday ${isOpen ? "open" : ""}" data-key="${htmlEscape(key)}">
          <button class="matchday-head" onclick="toggleMatchday(this)">
            <span class="matchday-title">${htmlEscape(day.title)}</span>
            <span class="status-badge ${day.status === 'fertig' || day.status === 'done' ? 'done' : ''}" style="margin:0;">${day.doneMatches}/${day.totalMatches}</span>
          </button>
          <div class="matchday-body"><table class="match-table"><tbody>${tbody}</tbody></table></div>
        </div>`;
      }).join("");
    }

    window.openPlayerProfile = async function(playerName) {
        if(playerName === 'Freilos' || playerName === 'Ehem. Spieler') return;
        
        const modal = document.getElementById("playerProfileModal");
        const titleEl = document.getElementById("playerProfileTitle");
        const content = document.getElementById("playerProfileContent");
        
        if(titleEl) titleEl.innerText = "SPIELERPROFIL";
        content.innerHTML = "<p>Lade Profil...</p>";
        openModal(modal);

        const p = state.allProfilesCache.find(prof => 
            prof.display_name === playerName || 
            prof.discord_name === playerName || 
            prof.real_name === playerName ||
            prof.username === playerName
        );

        if(!p) {
            content.innerHTML = "<div class='empty'>Profil nicht gefunden.</div>";
            return;
        }

        const avatarSrc = p.avatar_url || "https://ui-avatars.com/api/?name=" + encodeURIComponent(p.display_name || p.discord_name || p.username || 'P') + "&background=0066ff&color=fff&bold=true&size=200";
        
        let platformsHtml = "";
        if (p.autodarts_name || p.autodarts_avg) {
            platformsHtml += `<div style="margin-bottom: 14px; padding: 14px 16px; background: linear-gradient(135deg, rgba(0, 102, 255, 0.15), rgba(0, 102, 255, 0.05)); border-left: 4px solid var(--ad-blue); border-radius: 12px; border: 1px solid rgba(0, 102, 255, 0.2);"><div style="color: var(--ad-blue); font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 4px;">⚫ Autodarts</div><div style="color: var(--text-primary); font-weight: 700;">${htmlEscape(p.autodarts_name || '-')}</div><div style="color: var(--ad-blue-light); margin-top: 4px; font-weight: 800; font-size: 16px;">AVG: ${htmlEscape(p.autodarts_avg || '-')}</div></div>`;
        }
        if (p.dartcounter_name || p.dartcounter_avg) {
            platformsHtml += `<div style="margin-bottom: 14px; padding: 14px 16px; background: linear-gradient(135deg, rgba(255, 107, 53, 0.15), rgba(255, 107, 53, 0.05)); border-left: 4px solid var(--dc-orange); border-radius: 12px; border: 1px solid rgba(255, 107, 53, 0.2);"><div style="color: var(--dc-orange); font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 4px;">🟠 DartCounter</div><div style="color: var(--text-primary); font-weight: 700;">${htmlEscape(p.dartcounter_name || '-')}</div><div style="color: var(--dc-orange-light); margin-top: 4px; font-weight: 800; font-size: 16px;">AVG: ${htmlEscape(p.dartcounter_avg || '-')}</div></div>`;
        }
        if (p.scolia_name || p.scolia_avg) {
            platformsHtml += `<div style="margin-bottom: 14px; padding: 14px 16px; background: linear-gradient(135deg, rgba(0, 208, 132, 0.15), rgba(0, 208, 132, 0.05)); border-left: 4px solid var(--sc-green); border-radius: 12px; border: 1px solid rgba(0, 208, 132, 0.2);"><div style="color: var(--sc-green); font-weight: 800; font-size: 12px; text-transform: uppercase; margin-bottom: 4px;">🟢 Scolia</div><div style="color: var(--text-primary); font-weight: 700;">${htmlEscape(p.scolia_name || '-')}</div><div style="color: var(--sc-green-light); margin-top: 4px; font-weight: 800; font-size: 16px;">AVG: ${htmlEscape(p.scolia_avg || '-')}</div></div>`;
        }

        content.innerHTML = `
            <div>
                <div style="display: flex; gap: 16px; margin-bottom: 24px; align-items: flex-start;">
                    <img src="${avatarSrc}" style="width: 90px; height: 90px; border-radius: 16px; border: 3px solid var(--ad-blue); box-shadow: 0 0 20px rgba(0, 102, 255, 0.4);" alt="Avatar">
                    <div style="flex: 1;">
                        <h2 style="margin: 0 0 6px 0; font-size: 22px; font-weight: 900;">${htmlEscape(p.display_name || p.discord_name || p.username)}</h2>
                        <p style="margin: 0 0 12px 0; color: var(--text-secondary); font-size: 13px;">📍 ${htmlEscape(p.ort || 'Kein Wohnort')}</p>
                        <button onclick="alert('Discord Chat: ${htmlEscape(p.discord_name || '-')}')" style="padding: 8px 14px; background: linear-gradient(135deg, rgba(88,101,242,0.3), rgba(88,101,242,0.1)); border: 1px solid rgba(88,101,242,0.4); color: #7289da; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 12px; transition: all 0.2s; text-transform: uppercase;">💬 Discord</button>
                    </div>
                </div>
                
                ${platformsHtml}
                
                <div style="padding: 14px 16px; background: rgba(0, 102, 255, 0.08); border: 1px solid rgba(0, 102, 255, 0.2); border-radius: 12px;">
                    <div style="color: var(--text-muted); font-size: 11px; text-transform: uppercase; font-weight: 800; margin-bottom: 6px;">🎯 Dart Setup</div>
                    <p style="margin: 0; font-size: 13px; color: var(--text-primary); font-weight: 600;">${htmlEscape(p.dart_setup || 'Keine Angabe')}</p>
                </div>
            </div>
        `;
    };

    function renderHome() { 
        const tArea = document.getElementById("tableArea");
        const mArea = document.getElementById("matchdayArea");
        if(tArea) tArea.innerHTML = state.newsHtml; 
        if(mArea) mArea.innerHTML = ""; 
    }
    
    function getShortLeagueNumber(fullName) { 
        const match = fullName.match(/(\d+)$/); 
        return match ? `Liga ${match[1]}` : fullName; 
    }

    async function loadAll() {
        const tableAreaEl = document.getElementById("tableArea");

        try {
            log("=== STARTING LOAD ===");

            try {
                const { data: authData } = await supabaseClient.auth.getSession();
                state.currentUser = authData && authData.session ? authData.session.user : null;
            } catch(e) { state.currentUser = null; }
            
            const loginBtnEl = document.getElementById("ligaLoginBtn");
            if(loginBtnEl) loginBtnEl.innerText = state.currentUser ? "👤 Profil" : "👤 Login";

            state.isAdminUser = false;
            if (state.currentUser) {
                try {
                    const { data: pData } = await supabaseClient.from('profiles').select('is_admin').eq('id', state.currentUser.id).maybeSingle();
                    if (pData && pData.is_admin === true) state.isAdminUser = true;
                } catch(e){}
            }

            // LOAD NEWS
            try {
                const { data: newsData } = await supabaseClient.from('news').select('*').order('created_at', { ascending: false });
                let nHtml = "";
                if(newsData && newsData.length > 0) {
                    newsData.forEach(n => {
                        const date = new Date(n.created_at).toLocaleDateString('de-DE');
                        nHtml += `<div class="content-block">
                                    <div class="news-header-wrapper">
                                        <h3 class="news-title-text">${htmlEscape(n.title)}</h3>
                                        <span class="news-date-text">${date}</span>
                                    </div>
                                    <div class="ql-snow"><div class="ql-editor">${decodeHtml(n.content)}</div></div>
                                  </div>`;
                    });
                } else { nHtml = "<div class='empty'>📭 Keine News</div>"; }
                state.newsHtml = `<div class="table-shell"><div class="section-head"><div class="section-title">NEUIGKEITEN</div></div><div style="padding:28px;">${nHtml}</div></div>`;
            } catch(e) {
                state.newsHtml = `<div class='empty'>Fehler beim Laden.</div>`;
            }

            // LOAD REGELWERK
            try {
                const { data: sys } = await supabaseClient.from('system_settings').select('current_season, regelwerk_html').eq('id', 1).single();
                state.currentSeason = sys && sys.current_season ? sys.current_season : 'Saison 1';
                state.rulewerkHtml = sys && sys.regelwerk_html ? `<div class="ql-snow"><div class="ql-editor">${decodeHtml(sys.regelwerk_html)}</div></div>` : '<h2>Regelwerk</h2><p>Nicht hinterlegt.</p>';
            } catch(e) {
                state.currentSeason = 'Saison 1';
                state.rulewerkHtml = '<h2>Regelwerk</h2><p>Nicht hinterlegt.</p>';
            }

            log(`Season: ${state.currentSeason}`);

            const { data: profiles } = await supabaseClient.from('profiles').select('*');
            state.allProfilesCache = profiles || [];
            log(`Profiles loaded: ${state.allProfilesCache.length}`);
            state.allProfilesCache.forEach(p => {
              log(`  ${p.display_name || p.discord_name}: AD=${p.assigned_ad_league}, DC=${p.assigned_dc_league}, SC=${p.assigned_sc_league}`);
            });
            
            const { data: matchesData } = await supabaseClient.from('matches').select('*');
            const matches = matchesData ? matchesData.filter(m => m.season && String(m.season).toLowerCase().trim() === state.currentSeason.toLowerCase().trim()) : [];
            log(`Matches loaded: ${matches.length} (total), ${matches.filter(m => m.season === state.currentSeason).length} in season`);

            const { data: seasons } = await supabaseClient.from('matches').select('season');
            const uniqueSeasons = [...new Set((seasons || []).map(m => m.season))];
            
            const aS = document.getElementById("archiveSeasonSelect");
            if(aS) aS.innerHTML = '<option value="">Saison</option>' + uniqueSeasons.map(s => `<option value="${s}">${s}</option>`).join("");
            const aL = document.getElementById("archiveLeagueSelect");
            if(aL) aL.innerHTML = '<option value="">Liga</option>' + ALL_LEAGUES.map(l => `<option value="${l}">${l}</option>`).join("");

            ALL_LEAGUES.forEach(l => {
                state.leagueData[l] = { standings: { rows: [] }, matchdays: [] };
            });

            // PROCESS LEAGUES
            ALL_LEAGUES.forEach(league => {
                log(`\nProcessing ${league}...`);
                
                // Find players assigned to this league
                const lPlayers = profiles ? profiles.filter(p => {
                    const match = p.assigned_ad_league === league || p.assigned_dc_league === league || p.assigned_sc_league === league;
                    if(match) log(`  Player ${p.display_name}: assigned to ${league}`);
                    return match;
                }) : [];

                // Find matches for this league
                const lMatches = matches ? matches.filter(m => m.league_name === league) : [];
                
                log(`  Found ${lPlayers.length} assigned players, ${lMatches.length} matches`);

                const stats = {};
                
                // Initialize from assigned players
                lPlayers.forEach(p => {
                    stats[p.id] = { 
                        id: p.id, 
                        name: p.display_name || p.discord_name || p.username, 
                        wins: 0, losses: 0, legDiff: 0, points: 0, gamesPlayed: 0, avgSum: 0, avgCount: 0, 
                        yellow: p.yellow_cards || 0, red: p.red_cards || 0, showInMembers: p.show_in_members !== false 
                    };
                });

                // Process matches
                lMatches.forEach(m => {
                    if (!m.player1_id || !m.player2_id) return;

                    if (!stats[m.player1_id]) {
                        const p = state.allProfilesCache.find(prof => prof.id === m.player1_id);
                        stats[m.player1_id] = { 
                            id: m.player1_id, 
                            name: p ? (p.display_name || p.discord_name || p.username) : "Ehem. Spieler", 
                            wins: 0, losses: 0, legDiff: 0, points: 0, gamesPlayed: 0, avgSum: 0, avgCount: 0, 
                            yellow: 0, red: 0, showInMembers: true 
                        };
                    }
                    if (!stats[m.player2_id]) {
                        const p = state.allProfilesCache.find(prof => prof.id === m.player2_id);
                        stats[m.player2_id] = { 
                            id: m.player2_id, 
                            name: p ? (p.display_name || p.discord_name || p.username) : "Ehem. Spieler", 
                            wins: 0, losses: 0, legDiff: 0, points: 0, gamesPlayed: 0, avgSum: 0, avgCount: 0, 
                            yellow: 0, red: 0, showInMembers: true 
                        };
                    }

                    if((m.status === 'done' || m.status === 'fertig') && m.player1_id && m.player2_id) {
                        const l1 = parseInt(m.legs_player1) || 0;
                        const l2 = parseInt(m.legs_player2) || 0;
                        
                        stats[m.player1_id].gamesPlayed++;
                        stats[m.player2_id].gamesPlayed++;
                        stats[m.player1_id].legDiff += (l1 - l2);
                        stats[m.player2_id].legDiff += (l2 - l1);

                        if(l1 > l2) { 
                            stats[m.player1_id].wins++; 
                            stats[m.player1_id].points += 2; 
                            stats[m.player2_id].losses++; 
                        } 
                        else if(l2 > l1) { 
                            stats[m.player2_id].wins++; 
                            stats[m.player2_id].points += 2; 
                            stats[m.player1_id].losses++; 
                        }

                        if (m.avg_player1 && !isNaN(parseFloat(m.avg_player1))) {
                            stats[m.player1_id].avgSum += parseFloat(m.avg_player1);
                            stats[m.player1_id].avgCount++;
                        }
                        if (m.avg_player2 && !isNaN(parseFloat(m.avg_player2))) {
                            stats[m.player2_id].avgSum += parseFloat(m.avg_player2);
                            stats[m.player2_id].avgCount++;
                        }
                    }
                });

                const standingsRows = Object.values(stats).sort((a,b) => b.points !== a.points ? b.points - a.points : b.legDiff - a.legDiff);
                
                const groupedMatches = {};
                lMatches.forEach(m => {
                    const day = m.matchday ? `Spieltag ${m.matchday}` : 'Unbekannter Spieltag';
                    if(!groupedMatches[day]) groupedMatches[day] = [];
                    
                    let p1Title = "Freilos";
                    let p2Title = "Freilos";
                    if (m.player1_id && stats[m.player1_id]) p1Title = stats[m.player1_id].name;
                    if (m.player2_id && stats[m.player2_id]) p2Title = stats[m.player2_id].name;

                    groupedMatches[day].push({ 
                        p1Name: p1Title, p2Name: p2Title, 
                        legs1: m.legs_player1, legs2: m.legs_player2, 
                        status: m.status 
                    });
                });

                const matchdays = Object.entries(groupedMatches).map(([title, rows]) => {
                    const done = rows.filter(r => r.status === 'done' || r.status === 'fertig').length;
                    return { 
                        title, status: done === rows.length ? 'fertig' : 'offen', 
                        doneMatches: done, totalMatches: rows.length, rows 
                    };
                }).sort((a, b) => {
                    const aNum = parseInt(a.title.match(/\d+/)?.[0] || 0);
                    const bNum = parseInt(b.title.match(/\d+/)?.[0] || 0);
                    return aNum - bNum;
                });

                state.leagueData[league] = { standings: { rows: standingsRows }, matchdays };
                log(`  ✓ ${standingsRows.length} players in standings`);
            });

            log("\n=== LOAD COMPLETE ===");
            setMode("Home");

        } catch (error) { 
            console.error(error);
            log(`ERROR: ${error.message}`);
            if(tableAreaEl) tableAreaEl.innerHTML = `<div class="empty" style="color: var(--dc-orange);">❌ Fehler: ${error.message}</div>`; 
        }
    }

    function safeBind(id, handler) {
        const el = document.getElementById(id);
        if (el) el.addEventListener("click", handler);
    }

    safeBind("modeHome", () => setMode("Home"));
    safeBind("modeAutodarts", () => setMode("Autodarts"));
    safeBind("modeDartCounter", () => setMode("DartCounter"));
    safeBind("modeScolia", () => setMode("Scolia"));
    safeBind("archiveBtn", () => openModal(document.getElementById("archiveModal")));
    safeBind("openImpressumBtn", () => openModal(document.getElementById("impressumModal")));
    safeBind("openLinksBtn", () => openModal(document.getElementById("linksModal")));
    safeBind("openDebugBtn", () => showDebugInfo());
    
    safeBind("regelwerkBtn", () => {
        const modal = document.getElementById('playerProfileModal');
        const titleEl = document.getElementById('playerProfileTitle');
        const contentEl = document.getElementById('playerProfileContent');
        if(titleEl) titleEl.innerText = "REGELWERK";
        if(contentEl) contentEl.innerHTML = state.rulewerkHtml;
        openModal(modal);
    });

    safeBind("ligaLoginBtn", () => {
        if (!state.currentUser) supabaseClient.auth.signInWithOAuth({ provider: 'discord', options: { redirectTo: window.location.href }});
        else window.location.assign("profil.html");
    });

    document.querySelectorAll(".modal-close").forEach(btn => {
        btn.addEventListener("click", () => closeModal(btn.closest(".modal-backdrop")));
    });

    function openModal(m) { if(m) m.classList.add("open"); }
    function closeModal(m) { if(m) m.classList.remove("open"); }

    window.toggleMatchday = function(btn) {
        const card = btn.parentElement;
        const isOpen = !card.classList.contains("open");
        card.classList.toggle("open", isOpen);
        state.matchdayOpenState[card.dataset.key] = isOpen;
    }

    function rankClass(rank, total) { 
        if (rank === 1) return "first"; 
        if (rank === 2) return "second"; 
        if (rank === 3) return "third"; 
        return ""; 
    }

    loadAll();
  </script>
</body>
</html>
