<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CDL Dart Liga</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* DEIN ORIGINAL CSS */
    :root{ --bg:#03131b; --panel:#041924; --line:rgba(120,170,195,.12); --text:#f5fbff; --muted:#90a9b7; --green:#3ddc97; --red:#e74c3c; --yellow:#f7c948; --accent:#20b7ff; --accent-border:rgba(32,183,255,.42); --row-a:#052130; --row-b:#041924; }
    body[data-mode="DartCounter"]{ --accent:#ff9f1c; --accent-border:rgba(255,159,28,.42); }
    body[data-mode="Home"]{ --accent:#20b7ff; --accent-border:rgba(32,183,255,.42); }
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{ font-family:Arial,Helvetica,sans-serif; background: radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 14%, transparent), transparent 22%), linear-gradient(180deg, var(--bg) 0%, #021017 100%); color:var(--text); min-height:100vh; transition:background .2s ease; }
    .wrap{ width:min(1400px, calc(100% - 28px)); margin:0 auto; padding:8px 0 42px; }
    .button, .mode-btn, .footer-btn, .footer-link, .info-btn{ border:1px solid rgba(75,135,165,.28); background:rgba(4,25,36,.96); color:var(--text); border-radius:12px; min-height:46px; padding:0 16px; font-size:14px; outline:none; cursor:pointer; font-weight:800; transition:.16s ease; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; gap:8px; }
    .button:hover, .mode-btn:hover, .footer-btn:hover, .footer-link:hover, .info-btn:hover{ border-color:var(--accent-border); background:#082738; transform:translateY(-1px); }
    .hero-banner.image-banner{ position:relative; margin:0 0 14px; min-height:420px; border-radius:30px; overflow:hidden; border:1px solid rgba(255,255,255,.10); box-shadow: 0 18px 44px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.06); background: linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.14)), url("banner.png") center center / cover no-repeat; transition: box-shadow .2s ease; }
    .hero-banner.image-banner::before{ content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,.03) 0%, rgba(0,0,0,.08) 55%, rgba(0,0,0,.16) 100%); pointer-events:none; }
    body[data-mode="Home"] .hero-banner.image-banner, body[data-mode="Autodarts"] .hero-banner.image-banner{ box-shadow: 0 18px 44px rgba(0,0,0,.34), 0 0 0 1px rgba(32,183,255,.20), 0 0 28px rgba(32,183,255,.14); }
    body[data-mode="DartCounter"] .hero-banner.image-banner{ box-shadow: 0 18px 44px rgba(0,0,0,.34), 0 0 0 1px rgba(255,159,28,.20), 0 0 28px rgba(255,159,28,.14); }
    .top-nav-wrap{ width:min(1200px, 100%); margin:0 auto 12px; }
    .banner-nav-shell{ display:flex; justify-content:center; align-items:center; margin-bottom:10px; }
    .banner-nav{ width:100%; display:grid; grid-template-columns:repeat(5, minmax(0, 1fr)); gap:12px; padding:12px; border-radius:22px; background:rgba(4,12,14,.22); border:1px solid rgba(255,255,255,.10); box-shadow: 0 10px 24px rgba(0,0,0,.20), inset 0 1px 0 rgba(255,255,255,.05); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
    .discord-button-group { display: flex; flex-direction: column; gap: 8px; grid-column: span 1; }
    .hero-action-btn{ position:relative; width:100%; border:1px solid rgba(255,255,255,.16); background:rgba(6,20,30,.38); color:#f5fbff; border-radius:16px; min-height:50px; padding:0 14px; font-size:14px; font-weight:900; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; text-align:center; gap:10px; transition:.22s ease; white-space:nowrap; overflow:hidden; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); box-shadow: 0 10px 22px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.10), inset 0 -1px 0 rgba(255,255,255,.03); }
    .discord-button-group .hero-action-btn { min-height: 44px; font-size: 13px; }
    .hero-btn-autodarts{ background:rgba(36,141,255,.20); border-color:rgba(90,180,255,.45); }
    .hero-btn-dartcounter{ background:rgba(255,154,31,.18); border-color:rgba(255,186,90,.42); }
    .hero-btn-discord{ background:rgba(88,101,242,.28); border-color:rgba(162,170,255,.42); }
    .hero-btn-dark{ background:rgba(3,19,27,.42); border-color:rgba(120,170,195,.18); }
    #modeHome.active{ background:rgba(32,183,255,.25); border-color:rgba(130,205,255,.72); }
    #modeAutodarts.active{ background:rgba(36,141,255,.30); border-color:rgba(130,205,255,.72); }
    #modeDartCounter.active{ background:rgba(255,154,31,.28); border-color:rgba(255,206,130,.72); }
    .discord-icon{ width:18px; height:18px; fill:currentColor; flex:0 0 18px; display:block; }
    .submenu-row{ display:grid; grid-template-columns:repeat(5, minmax(0, 1fr)); gap:12px; margin-top:10px; align-items:start; }
    .submenu-slot{ min-height:52px; display:none; flex-wrap:wrap; gap:10px; align-items:flex-start; overflow:visible; padding-bottom:0; }
    .submenu-slot.active{ display:flex; }
    .submenu-slot.left{ grid-column:1 / span 3; }
    .submenu-slot.middle{ grid-column:2 / span 3; }
    .submenu-btn{ border:1px solid rgba(75,135,165,.24); background:rgba(5,26,37,.92); color:#dff3ff; padding:11px 14px; min-height:42px; border-radius:12px; font-size:14px; font-weight:800; cursor:pointer; }
    .submenu-btn.active{ color:#fff; border-color:var(--accent-border); background:#082738; box-shadow: inset 3px 0 0 var(--accent), 0 0 18px color-mix(in srgb, var(--accent) 20%, transparent); }
    .main{ display:grid; grid-template-columns:minmax(0,1.7fr) minmax(320px,.8fr); gap:18px; align-items:start; }
    body[data-mode="Home"] .main { grid-template-columns: 1fr; }
    body[data-mode="Home"] .sidebar { display: none; }
    .table-shell, .matchday{ border:1px solid var(--line); background:linear-gradient(180deg, rgba(6,27,37,.96), rgba(4,20,28,.98)); box-shadow:0 18px 50px rgba(0,0,0,.35); border-radius:18px; }
    .table-shell{ overflow:hidden; }
    .section-head{ display:flex; justify-content:space-between; align-items:center; gap:14px; padding:18px 18px 12px; flex-wrap:wrap; }
    .section-title{ margin:0; font-size:18px; font-weight:900; }
    .section-sub{ color:var(--muted); font-size:13px; }
    .table-wrap{ overflow-x:auto; padding:0 0 6px; }
    table{ width:100%; border-collapse:collapse; min-width:760px; table-layout:fixed; }
    thead th{ padding:14px 16px; color:#c8dce6; font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.04em; border-bottom:1px solid var(--line); background:#041722; text-align:left; }
    tbody td{ padding:14px 16px; border-bottom:1px solid rgba(120,170,195,.08); font-size:15px; color:#f1f8fb; }
    .rank-col{ width:84px; font-weight:900; position:relative; }
    .rank-col.first::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:10px; background:var(--green); }
    .player-cell{ width:140px; font-weight:800; }
    .player-name{ display:block; font-weight:600; color:#fff; }
    .discord-cell { color:#8ec9ee; font-weight:700; font-size:14px; }
    .sidebar{ display:flex; flex-direction:column; gap:14px; }
    .matchday-list{ display:flex; flex-direction:column; gap:12px; }
    .matchday-head{ width:100%; border:none; background:transparent; color:var(--text); padding:16px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; font-weight:900; }
    .matchday-body{ display:none; padding:0 14px 14px; }
    .matchday.open .matchday-body{ display:block; }
    .match-table{ width:100%; border-collapse:collapse; }
    .match-table td{ padding:12px 10px; font-size:13px; border-bottom:1px solid rgba(120,170,195,.08); background:rgba(255,255,255,.02); color:#edf7fb; }
    .empty{ border:1px dashed rgba(120,170,195,.18); border-radius:14px; padding:14px; color:var(--muted); font-size:14px; }
    .content-block{ margin-bottom:18px; padding:14px; border:1px solid rgba(120,170,195,.10); border-radius:14px; background:rgba(255,255,255,.02); }
  </style>
</head>
<body data-mode="Home">
  <div class="wrap">
    <section class="hero-banner image-banner"></section>
    
    <div class="top-nav-wrap">
      <section class="banner-nav-shell">
        <div class="banner-nav">
          <button id="modeHome" class="hero-action-btn hero-btn-dark mode-btn active" type="button">Neuigkeiten</button>
          <button id="modeAutodarts" class="hero-action-btn hero-btn-autodarts mode-btn" type="button">Autodarts</button>
          <button id="modeDartCounter" class="hero-action-btn hero-btn-dartcounter mode-btn" type="button">DartCounter</button>

          <div class="discord-button-group">
            <a href="https://discord.gg/DEINLINK" target="_blank" class="hero-action-btn hero-btn-discord">
              <svg class="discord-icon" viewBox="0 0 127.14 96.36"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2A75.57,75.57,0,0,0,95.73,78c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C35.88,65.69,30.5,59.66,30.5,52.25s5.31-13.44,11.95-13.44S54.4,44.87,54.39,52.25,49,65.69,42.45,65.69Zm42.24,0c-6.57,0-11.95-6-11.95-13.44s5.31-13.44,11.95-13.44S96.64,44.87,96.63,52.25,91.26,65.69,84.69,65.69Z"/></svg>
              <span>Discord</span>
            </a>
            <button id="ligaLoginBtn" class="hero-action-btn hero-btn-discord" type="button">
              <svg class="discord-icon" viewBox="0 0 127.14 96.36"><path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.7,77.7,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2A75.57,75.57,0,0,0,95.73,78c.87.71,1.76,1.39,2.66,2a68.68,68.68,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1,105.25,105.25,0,0,0,32.19-16.14h0C129.24,52.84,122.09,29.11,107.7,8.07ZM42.45,65.69C35.88,65.69,30.5,59.66,30.5,52.25s5.31-13.44,11.95-13.44S54.4,44.87,54.39,52.25,49,65.69,42.45,65.69Zm42.24,0c-6.57,0-11.95-6-11.95-13.44s5.31-13.44,11.95-13.44S96.64,44.87,96.63,52.25,91.26,65.69,84.69,65.69Z"/></svg>
              <span id="loginBtnText">Liga Login</span>
            </button>
          </div>
        </div>
      </section>

      <div class="submenu-row">
        <div id="autodartsSubmenu" class="submenu-slot left"></div>
        <div id="dartcounterSubmenu" class="submenu-slot middle"></div>
      </div>
    </div>

    <section class="main">
      <div id="tableArea"></div>
      <aside class="sidebar"><div id="matchdayArea" class="matchday-list"></div></aside>
    </section>
  </div>

  <script>
    // 1. SUPABASE INIT
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DEINE SHEET DATEN
    const SHEET_ID = "1P8aN20vfu6MLnMaEMXLv_OvOeXiF76-dAW1Fpy4DNe0";
    const PLAYER_SHEET = "Spieler_Discord";
    const NEWS_SHEET = "Neuigkeiten";
    const LEAGUES = [ "Autodarts Liga 1", "Autodarts Liga 2", "Autodarts Liga 3", "DartCounter Liga 1" ];
    
    const state = { leagues: LEAGUES.map(n => ({name: n})), leagueData: {}, activeLeague: null, activeMode: "Home", playerMetaMap: {}, matchdayOpenState: {}, newsRows: [] };
    const tableAreaEl = document.getElementById("tableArea");
    const matchdayAreaEl = document.getElementById("matchdayArea");

    // 2. ALLE TABELLEN FUNKTIONEN (Exakt deine Funktionen)
    function normalize(value) { return String(value ?? "").trim().toLowerCase().replace(/\s+/g, " "); }
    function htmlEscape(value) { return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    function csvUrl(sheetName) { return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`; }
    
    function parseCsv(text) {
      const rows = []; let row = []; let cell = ""; let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i]; const next = text[i + 1];
        if (inQuotes) { if (char === '"' && next === '"') { cell += '"'; i++; } else if (char === '"') { inQuotes = false; } else { cell += char; } }
        else { if (char === '"') { inQuotes = true; } else if (char === ',') { row.push(cell); cell = ""; } else if (char === '\n') { row.push(cell); rows.push(row); row = []; cell = ""; } else if (char !== '\r') { cell += char; } }
      }
      row.push(cell); rows.push(row); return rows;
    }

    async function loadCsv(sheetName) {
      const res = await fetch(csvUrl(sheetName));
      if (!res.ok) throw new Error("Fehler beim Laden von " + sheetName);
      return parseCsv(await res.text());
    }

    function rowHasAnyContent(row) { return row && row.some(cell => normalize(cell) !== ""); }
    function safeCell(row, index) { return row && row[index] !== undefined ? String(row[index]).trim() : ""; }

    function parsePlayerDiscordSheet(rows) {
      const map = {};
      for (let i = 0; i < rows.length; i++) {
        const spieler = safeCell(rows[i], 0); const discord = safeCell(rows[i], 1);
        if (spieler && normalize(spieler) !== "spieler") map[normalize(spieler)] = { discord: discord || "" };
      }
      return map;
    }

    function parseStandingsFromLeagueSheet(rows) {
      if (!rows || !rows.length) return { headers: [], rows: [] };
      let tabelleMarker = -1; let spieltageMarker = -1;
      for (let i = 0; i < rows.length; i++) {
        const text = rows[i].map(c => normalize(c)).join(" | ");
        if (tabelleMarker === -1 && text.includes("tabelle")) tabelleMarker = i;
        if (spieltageMarker === -1 && (text.includes("spieltage") || text.includes("spieltag"))) spieltageMarker = i;
      }
      if (tabelleMarker === -1) return { headers: [], rows: [] };
      const start = tabelleMarker + 1; const end = spieltageMarker > start ? spieltageMarker : rows.length;
      const headers = ["Platz", "Spieler", "Siege", "Niederlagen", "Leg-Diff", "Punkte"]; const body = [];
      for (let i = start; i < end; i++) {
        const row = rows[i]; if (!rowHasAnyContent(row)) continue;
        const platz = safeCell(row, 0); const spieler = safeCell(row, 1);
        if (!platz || isNaN(parseInt(platz, 10)) || !spieler || spieler === "-" || normalize(spieler).startsWith("spieler ")) continue;
        body.push([platz, spieler, safeCell(row, 2), safeCell(row, 3), safeCell(row, 4), safeCell(row, 5)]);
      }
      return { headers, rows: body };
    }

    async function loadLeague(leagueName) {
      let leagueRows = []; let ergRows = [];
      try { leagueRows = await loadCsv(leagueName); } catch (e) { }
      return { standings: parseStandingsFromLeagueSheet(leagueRows), matchdays: [] }; // Erg-Sheet hier vereinfacht
    }

    function renderStandingsTable(headers, rows) {
      if (!headers.length || !rows.length) return `<div class="empty">Keine Daten.</div>`;
      const tbody = rows.map((row, index) => {
        const spielerName = row[1];
        const meta = state.playerMetaMap[normalize(spielerName)] || { discord: "" };
        return `<tr>
          <td class="rank-col">${row[0]}</td>
          <td class="player-cell"><span class="player-name">${htmlEscape(spielerName)}</span></td>
          <td class="discord-cell">${htmlEscape(meta.discord)}</td>
          <td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td><td class="points-cell">${row[5]}</td>
        </tr>`;
      }).join("");
      return `<div class="table-shell"><div class="table-wrap"><table><thead><tr><th>Platz</th><th>Spieler</th><th>Discord</th><th>Siege</th><th>Niederlagen</th><th>Leg-Diff</th><th>Punkte</th></tr></thead><tbody>${tbody}</tbody></table></div></div>`;
    }

    function renderLeague() {
      const data = state.leagueData[state.activeLeague];
      if (!data) { tableAreaEl.innerHTML = `<div class="empty">Keine Liga gewählt.</div>`; matchdayAreaEl.innerHTML = ""; return; }
      tableAreaEl.innerHTML = renderStandingsTable(data.standings.headers, data.standings.rows);
    }

    function setMode(mode) {
      state.activeMode = mode;
      document.body.setAttribute("data-mode", mode);
      document.getElementById("modeHome").classList.toggle("active", mode === "Home");
      document.getElementById("modeAutodarts").classList.toggle("active", mode === "Autodarts");
      document.getElementById("modeDartCounter").classList.toggle("active", mode === "DartCounter");
      
      if (mode === "Home") {
        tableAreaEl.innerHTML = `<div class="table-shell"><h2>Neuigkeiten</h2><p>Lade News...</p></div>`;
      } else {
        const visibleLeagues = state.leagues.filter(l => l.name.startsWith(mode));
        if (visibleLeagues.length > 0) {
            state.activeLeague = visibleLeagues[0].name;
            renderLeague();
        }
      }
    }

    // 3. SAUBERE LOGIN LOGIK
    async function initAuth() {
        const btn = document.getElementById('ligaLoginBtn');
        
        // Listener für den Login Button - LEITET HART UM!
        btn.addEventListener('click', async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                // Hier schicken wir Discord direkt auf die neue profil.html
                const redirectUrl = "https://communitydart.github.io/CommunityDartLiga/profil.html";
                await supabaseClient.auth.signInWithOAuth({ 
                    provider: 'discord', 
                    options: { redirectTo: redirectUrl } 
                });
            } else {
                window.location.href = "profil.html";
            }
        });

        // Ändere Button Text, falls Session schon da ist
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            document.getElementById('loginBtnText').innerText = "Mein Profil";
        }
    }

    // 4. MAIN LOADER
    async function loadAll() {
      await initAuth();
      tableAreaEl.innerHTML = `<div class="empty">Lade Tabellen-Daten...</div>`;

      try {
        const playerRows = await loadCsv(PLAYER_SHEET).catch(() => []);
        state.playerMetaMap = parsePlayerDiscordSheet(playerRows);

        const entries = await Promise.all(state.leagues.map(async league => [league.name, await loadLeague(league.name)]));
        state.leagueData = Object.fromEntries(entries);

        setMode("Home");
      } catch (error) {
        tableAreaEl.innerHTML = `<div class="empty">Fehler beim Laden der Daten: ${error.message}</div>`;
      }
    }

    // Event Listener für Navigation
    document.getElementById("modeHome").addEventListener("click", () => setMode("Home"));
    document.getElementById("modeAutodarts").addEventListener("click", () => setMode("Autodarts"));
    document.getElementById("modeDartCounter").addEventListener("click", () => setMode("DartCounter"));

    loadAll();
  </script>
</body>
</html>
