<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CDL Dart Liga</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      /* HELLERES MODERNES SLATE DESIGN */
      --bg: #1e293b;
      --panel: #2c3e50;
      --panel-glass: rgba(44, 62, 80, 0.85);
      --line: rgba(52, 152, 219, 0.35);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --green: #2ecc71;
      --red: #e74c3c;
      --yellow: #f1c40f;
      --accent: #3498db;
      --accent-border: rgba(52, 152, 219, 0.6);
      --row-a: #334155;
      --row-b: #273746;
      
      /* SATTEL, INTENSIVE NEON FARBEN */
      --ad-color: #0077ff;
      --dc-color: #ff6a00;
      --sc-color: #00ff66;
    }

    body[data-mode="DartCounter"]{ --accent: var(--dc-color); --accent-border: rgba(255,106,0,.6); }
    body[data-mode="Scolia"]{ --accent: var(--sc-color); --accent-border: rgba(0,255,102,.6); }
    body[data-mode="Home"]{ --accent: #3498db; --accent-border: rgba(52,152,219,.6); }
    
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{ font-family:Arial,Helvetica,sans-serif; background: radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 20%, transparent), transparent 45%), linear-gradient(180deg, var(--bg) 0%, #1e293b 100%); color:var(--text); min-height:100vh; transition:background .3s ease; }
    .wrap{ width:min(1400px, calc(100% - 28px)); margin:0 auto; padding:20px 0 42px; }
    
    .header-branding { text-align: center; margin-bottom: 25px; padding: 15px; border-radius: 20px; background: var(--panel-glass); border: 1px solid var(--line); box-shadow: 0 10px 30px rgba(0,0,0,0.1); backdrop-filter: blur(8px); }
    .header-branding h2 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 2px; color: #fff; }
    .header-branding span { font-size: 12px; color: var(--accent); font-weight: bold; text-transform: uppercase; }

    .dashboard-nav { display: grid; grid-template-columns: 1fr 1.3fr 1fr; gap: 20px; margin-bottom: 25px; align-items: stretch; }
    .nav-card { background: var(--panel-glass); border: 1px solid var(--line); border-radius: 20px; padding: 18px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 12px 32px rgba(0,0,0,0.12); backdrop-filter: blur(10px); position: relative; }
    .nav-card-title { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; margin-bottom: 4px; border-bottom: 1px dashed rgba(255,255,255,0.15); padding-bottom: 6px; }

    .nav-btn { position: relative; width: 100%; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); color: #edf7fb; border-radius: 12px; min-height: 48px; padding: 0 16px; font-size: 14px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: flex-start; gap: 12px; transition: .25s cubic-bezier(0.4, 0, 0.2, 1); text-decoration: none; }
    .nav-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.12); }
    
    /* EXTRA INTENSIVE EFFEKTE FÜR DIE PLATTFORMEN */
    .btn-autodarts { border-color: rgba(0,119,255,0.4); background: rgba(0,119,255,0.05); color: #99ccff; }
    .btn-autodarts:hover, .btn-autodarts.active { background: linear-gradient(90deg, #0055d4, #0077ff); border-color: #00a2ff; box-shadow: 0 0 25px rgba(0,119,255,0.6); color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
    
    .btn-dartcounter { border-color: rgba(255,106,0,0.4); background: rgba(255,106,0,0.04); color: #ffcc99; }
    .btn-dartcounter:hover, .btn-dartcounter.active { background: linear-gradient(90deg, #cc4400, #ff6a00); border-color: #ff943d; box-shadow: 0 0 25px rgba(255,106,0,0.6); color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
    
    .btn-scolia { border-color: rgba(0,255,102,0.4); background: rgba(0,255,102,0.05); color: #99ffbb; }
    .btn-scolia:hover, .btn-scolia.active { background: linear-gradient(90deg, #00b344, #00ff66); border-color: #33ff88; box-shadow: 0 0 25px rgba(0,255,102,0.6); color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
    
    .btn-home.active, .btn-info.active { border-color: var(--accent); background: rgba(52,152,219,0.25); color: #fff; box-shadow: 0 0 15px rgba(52,152,219,0.3); }
    .btn-discord { background: rgba(88,101,242,0.2); border-color: rgba(88,101,242,0.5); }
    .btn-discord:hover { background: rgba(88,101,242,0.3); border-color: #5865f2; box-shadow: 0 0 15px rgba(88,101,242,0.3); }

    .dropdown-submenu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; height: 100%; align-content: start; }
    .dropdown-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); color: #dff3ff; text-align: center; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.15s; }
    .dropdown-btn:hover { background: rgba(255,255,255,0.12); border-color: var(--accent-border); }
    .dropdown-btn.active { background: var(--accent); color: #000; font-weight: 900; border-color: var(--accent); box-shadow: 0 0 15px rgba(32,183,255,0.4); }

    .main { display: grid; grid-template-columns: minmax(0,1.7fr) minmax(340px,.8fr); gap: 20px; align-items: start; }
    body[data-mode="Home"] .main { grid-template-columns: 1fr; }
    body[data-mode="Home"] .sidebar { display: none; }

    .table-shell, .matchday { border: 1px solid var(--line); background: linear-gradient(180deg, rgba(44,62,80,.95), rgba(30,43,56,.98)); box-shadow: 0 18px 50px rgba(0,0,0,0.12); border-radius: 18px; overflow: hidden; }
    
    .section-head { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .section-title { margin: 0; font-size: 18px; font-weight: 900; }
    .section-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

    .table-wrap { overflow-x: auto; padding-bottom: 4px; }
    table { width: 100%; border-collapse: collapse; min-width: 700px; table-layout: fixed; }
    thead th { padding: 14px 16px; color: #e2e8f0; font-size: 12px; font-weight: 800; text-transform: uppercase; background: rgba(255,255,255,0.08); border-bottom: 1px solid var(--line); text-align: left; }
    thead th:nth-child(3), thead th:nth-child(4), thead th:nth-child(5), thead th:nth-child(6), thead th:nth-child(7) { text-align: center; }
    
    tbody tr:nth-child(odd) td { background: var(--row-a); }
    tbody tr:nth-child(even) td { background: var(--row-b); }
    tbody td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 14px; color: #f1f8fb; white-space: nowrap; }
    tbody tr:hover td { background: rgba(255, 255, 255, 0.05); }

    .rank-col { width: 75px; font-weight: 900; text-align: center !important; position: relative; }
    .rank-col.first::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--green); }
    .rank-col.last::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--red); }

    .player-link { cursor: pointer; font-weight: 700; color: #fff; text-decoration: none; }
    .player-link:hover { color: var(--accent); text-decoration: underline; }
    
    thead th:nth-child(3), thead th:nth-child(4), thead th:nth-child(5), thead th:nth-child(6), thead th:nth-child(7) { width: 95px; text-align: center; }

    .sidebar { display: flex; flex-direction: column; gap: 14px; }
    .matchday-list { display: flex; flex-direction: column; gap: 12px; }
    .matchday-head { width: 100%; border: none; background: transparent; color: var(--text); padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .matchday-title { font-size: 15px; font-weight: 800; }
    .matchday-body { display: none; padding: 0 14px 14px; }
    .matchday.open .matchday-body { display: block; }
    
    .match-table { width: 100%; border-collapse: collapse; }
    .match-table td { padding: 10px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; background: rgba(231,76,60,0.2); color: #fff; border: 1px solid rgba(231,76,60,0.3); }
    .status-badge.done { background: rgba(46,204,113,0.2); color: #fff; border: 1px solid rgba(46,204,113,0.3); }

    .content-block { margin-bottom: 16px; padding: 16px; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; background: rgba(255,255,255,0.03); position: relative; }
    .content-block h4 { margin: 0 0 8px; font-size: 15px; color: #fff; }
    .content-block img { max-width: 100%; height: auto; border-radius: 8px; margin: 10px 0; display: block; }
    .empty { border: 1px dashed var(--line); border-radius: 14px; padding: 20px; color: var(--muted); font-size: 14px; text-align: center; }

    .news-admin-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; }
    .news-action-link { font-size: 11px; background: rgba(255,255,255,0.15); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; color: var(--muted); }
    .news-action-link:hover { background: var(--accent); color: #000; }

    .footer { margin-top: 25px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 1000; backdrop-filter: blur(4px); }
    .modal-backdrop.open { display: flex; }
    .modal { width: min(840px, 100%); max-height: 85vh; background: var(--panel); border: 1px solid var(--line); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .modal-close { width: 36px; height: 36px; border-radius: 10px; border: none; background: rgba(255,255,255,0.08); color: #fff; cursor: pointer; }
    .modal-body { padding: 18px; overflow-y: auto; color: #d7e8ef; line-height: 1.6; }

    .archive-control-box { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); }
    .archive-select { padding: 10px; border-radius: 8px; background: #1e293b; color: #fff; border: 1px solid #4b87a5; outline: none; font-weight: bold; min-width: 160px; }

    @media (max-width: 950px) {
      .dashboard-nav { grid-template-columns: 1fr; gap: 15px; }
      .main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-mode="Home">

  <div class="wrap">
    
    <div class="header-branding">
       <h2>CDL DART LIGA</h2>
       <span>Official Cyber League Hub</span>
    </div>

    <section class="dashboard-nav">
       
       <div class="nav-card">
          <div class="nav-card-title">Allgemeine Infos</div>
          <button id="modeHome" class="nav-btn btn-home active" type="button">📰 Neuigkeiten</button>
          <button id="regelwerkBtn" class="nav-btn btn-info" type="button">📑 Regelwerk</button>
          <button id="archiveBtn" class="nav-btn btn-info" type="button">🏛️ Liga Archiv</button>
       </div>

       <div class="nav-card">
          <div class="nav-card-title">Wähle deine Plattform</div>
          <button id="modeAutodarts" class="nav-btn btn-autodarts" type="button">🎯 Autodarts <span class="btn-text-right">Liga 1-6</span></button>
          <button id="modeDartCounter" class="nav-btn btn-dartcounter" type="button">📱 DartCounter <span class="btn-text-right">Liga 1-6</span></button>
          <button id="modeScolia" class="nav-btn btn-scolia" type="button">🎥 Scolia <span class="btn-text-right">Liga 1-3</span></button>
       </div>

       <div class="nav-card" id="rightNavBlock">
          <div id="defaultRightContent" style="display: flex; flex-direction: column; gap: 12px; width: 100%;">
             <div class="nav-card-title">Community & Profile</div>
             <a href="https://discord.gg/DEINLINK" target="_blank" class="nav-btn btn-discord">
               <span>💬 CDL Discord Server</span>
             </a>
             <button id="ligaLoginBtn" class="nav-btn" style="border-color: rgba(255,255,255,0.25);" type="button">
               <span id="loginBtnText">👤 Liga Login</span>
             </button>
             <a href="https://www.paypal.com/pool/9nHfKrmgfD" target="_blank" class="nav-btn" style="border-color: rgba(46,204,113,0.4); font-size: 13px; min-height: 42px;">
               <span>☕ Serverkasse unterstützen</span>
             </a>
          </div>
          <div id="dynamicLeaguesContent" class="dropdown-submenu" style="display: none;"></div>
       </div>

    </section>

    <section class="main">
      <div id="tableArea"></div>
      <aside class="sidebar">
        <div id="matchdayArea" class="matchday-list"></div>
      </aside>
    </section>

    <div class="footer">
      <button id="openImpressumBtn" class="nav-btn" style="min-height:36px; padding:0 12px; font-size:12px; width:auto;" type="button">Impressum</button>
      <button id="openLinksBtn" class="nav-btn" style="min-height:36px; padding:0 12px; font-size:12px; width:auto;" type="button">Links</button>
    </div>
  </div>

  <div id="archiveModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head"><h3>🏛️ Historisches Liga-Archiv</h3><button class="modal-close" type="button">✕</button></div>
      <div class="modal-body">
         <div class="archive-control-box">
             <select id="archiveSeasonSelect" class="archive-select" onchange="loadArchiveData()"><option value="">-- Saison --</option></select>
             <select id="archiveLeagueSelect" class="archive-select" onchange="loadArchiveData()"><option value="">-- Liga --</option></select>
         </div>
         <div id="archiveTableResult"></div>
      </div>
    </div>
  </div>

  <div id="playerProfileModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head"><h3 id="playerProfileTitle">Spielerprofil</h3><button class="modal-close" type="button">✕</button></div>
      <div id="playerProfileContent" class="modal-body"></div>
    </div>
  </div>

  <div id="impressumModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-head"><h3>Impressum</h3><button class="modal-close" type="button">✕</button></div>
      <div class="modal-body"><p>Oliver Eger<br>Bahnhofstraße 9<br>37520 Osterode am Harz</p></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    let supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const AD_LEAGUES = ["Autodarts Liga 1", "Autodarts Liga 2", "Autodarts Liga 3", "Autodarts Liga 4", "Autodarts Liga 5", "Autodarts Liga 6"];
    const DC_LEAGUES = ["DartCounter Liga 1", "DartCounter Liga 2", "DartCounter Liga 3", "DartCounter Liga 4", "DartCounter Liga 5", "DartCounter Liga 6"];
    const SC_LEAGUES = ["Scolia Liga 1", "Scolia Liga 2", "Scolia Liga 3"];
    const ALL_LEAGUES = [...AD_LEAGUES, ...DC_LEAGUES, ...SC_LEAGUES];

    const state = { 
        leagueData: {}, activeLeague: null, activeMode: "Home", 
        currentSeason: "Saison 1", newsHtml: "", rulewerkHtml: "", currentUser: null,
        matchdayOpenState: {}, isAdminUser: false, allProfilesCache: []
    };

    const tableAreaEl = document.getElementById("tableArea");
    const matchdayAreaEl = document.getElementById("matchdayArea");

    function htmlEscape(value) { return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

    window.copyDiscord = function(name) {
      navigator.clipboard.writeText(name).then(() => alert("Der Discord-Name '" + name + "' wurde kopiert!"));
    };

    window.directEditNews = function(id) { window.location.href = "profil.html"; };

    window.directDeleteNews = async function(id) {
        if(!confirm("Möchtest du diesen News-Eintrag wirklich direkt löschen?")) return;
        const { error } = await supabaseClient.from('news').delete().eq('id', id);
        if(error) alert("Fehler: " + error.message);
        else loadAll();
    };

    window.loadArchiveData = async function() {
        const season = document.getElementById("archiveSeasonSelect").value;
        const league = document.getElementById("archiveLeagueSelect").value;
        const resultContainer = document.getElementById("archiveTableResult");

        if(!season || !league) return;
        resultContainer.innerHTML = "<div class='empty'>Lade historische Tabellendaten...</div>";

        const { data: matches, error } = await supabaseClient.from('matches').select('*').eq('season', season).eq('league_name', league).eq('status', 'done');
        
        if (error || !matches || matches.length === 0) {
            resultContainer.innerHTML = "<div class='empty'>Für diese Kombination liegen keine Spieldaten vor.</div>";
            return;
        }

        const stats = {};
        matches.forEach(m => {
            if(m.player1_id && m.player2_id) {
                if(!stats[m.player1_id]) {
                    const p = state.allProfilesCache.find(prof => prof.id === m.player1_id);
                    stats[m.player1_id] = { name: p ? (p.discord_name || p.real_name) : 'Spieler', wins: 0, losses: 0, legDiff: 0, points: 0 };
                }
                if(!stats[m.player2_id]) {
                    const p = state.allProfilesCache.find(prof => prof.id === m.player2_id);
                    stats[m.player2_id] = { name: p ? (p.discord_name || p.real_name) : 'Spieler', wins: 0, losses: 0, legDiff: 0, points: 0 };
                }

                const l1 = parseInt(m.legs1) || 0; const l2 = parseInt(m.legs2) || 0;
                stats[m.player1_id].legDiff += (l1 - l2); stats[m.player2_id].legDiff += (l2 - l1);

                if(l1 > l2) { stats[m.player1_id].wins++; stats[m.player1_id].points += 2; stats[m.player2_id].losses++; } 
                else { stats[m.player2_id].wins++; stats[m.player2_id].points += 2; stats[m.player1_id].losses++; }
            }
        });

        const rows = Object.values(stats).sort((a,b) => b.points !== a.points ? b.points - a.points : b.legDiff - a.legDiff);

        let html = `<table><thead><tr><th width="80px">Platz</th><th>Spieler</th><th>Siege</th><th>Niederlagen</th><th>Leg-Diff</th><th>Punkte</th></tr></thead><tbody>`;
        rows.forEach((r, idx) => {
            html += `<tr><td>${idx+1}</td><td><b>${htmlEscape(r.name)}</b></td><td>${r.wins}</td><td>${r.losses}</td><td>${r.legDiff}</td><td style="color:#2ecc71; font-weight:bold;">${r.points}</td></tr>`;
        });
        html += `</tbody></table>`;
        resultContainer.innerHTML = `<div class="table-wrap" style="background:rgba(0,0,0,0.1); border-radius:10px; margin-top:10px;">${html}</div>`;
    };

    function updateRightNavBlock() {
        const defaultBlock = document.getElementById("defaultRightContent");
        const dynamicBlock = document.getElementById("dynamicLeaguesContent");
        const rightCard = document.getElementById("rightNavBlock");
        const cardTitle = rightCard.querySelector(".nav-card-title");

        if (state.activeMode === "Home") {
            defaultBlock.style.display = "flex";
            dynamicBlock.style.display = "none";
            cardTitle.innerText = "Community & Profile";
        } else {
            defaultBlock.style.display = "none";
            dynamicBlock.style.display = "grid";
            cardTitle.innerText = `Aktive ${state.activeMode} Ligen`;

            const filtered = ALL_LEAGUES.filter(l => l.startsWith(state.activeMode));
            dynamicBlock.innerHTML = filtered.map(l => {
                const hasData = state.leagueData[l] && state.leagueData[l].standings.rows.length > 0;
                if(!hasData) return `<button class="dropdown-btn" style="opacity:0.25; cursor:not-allowed;" disabled>${getShortLeagueNumber(l)}</button>`;
                return `<button class="dropdown-btn ${l === state.activeLeague ? "active" : ""}" onclick="selectLeagueDirectly('${l}')">${getShortLeagueNumber(l)}</button>`;
            }).join("");
        }
    }

    window.selectLeagueDirectly = function(leagueName) {
        state.activeLeague = leagueName;
        updateRightNavBlock();
        renderLeague();
    };

    function setMode(mode) {
      state.activeMode = mode;
      document.body.setAttribute("data-mode", mode);
      document.getElementById("modeHome").classList.toggle("active", mode === "Home");
      document.getElementById("modeAutodarts").classList.toggle("active", mode === "Autodarts");
      document.getElementById("modeDartCounter").classList.toggle("active", mode === "DartCounter");
      document.getElementById("modeScolia").classList.toggle("active", mode === "Scolia");
      
      if (mode === "Home") {
        state.activeLeague = null;
        renderHome();
      } else {
        const visible = ALL_LEAGUES.filter(l => l.startsWith(mode) && state.leagueData[l] && state.leagueData[l].standings.rows.length > 0);
        state.activeLeague = visible.includes(state.activeLeague) ? state.activeLeague : (visible[0] || null);
        renderLeague();
      }
      updateRightNavBlock();
    }

    function renderLeague() {
      if(!state.activeLeague) {
          tableAreaEl.innerHTML = `<div class="table-shell"><div class="section-head"><div class="section-title">Plattformübersicht</div></div><div style="padding:18px"><div class="empty">⚠️ In dieser Sektion ist derzeit keine Liga aktiv geschaltet.</div></div></div>`;
          matchdayAreaEl.innerHTML = "";
          return;
      }
      const data = state.leagueData[state.activeLeague];
      tableAreaEl.innerHTML = renderStandingsTable(data.standings.rows);
      matchdayAreaEl.innerHTML = renderMatchdays(data.matchdays);
    }

    function renderStandingsTable(rows) {
      const tbody = rows.map((s, idx) => `<tr>
          <td class="rank-col ${rankClass(idx+1, rows.length)}">${idx+1}</td>
          <td><span class="player-link" onclick="openPlayerProfile('${htmlEscape(s.name)}')">${htmlEscape(s.name)}</span></td>
          <td>${s.discord ? `<span style="color:var(--muted); font-size:12px;">${htmlEscape(s.discord)}</span>` : "-"}</td>
          <td>${s.wins}</td><td>${s.losses}</td><td>${s.legDiff}</td><td style="font-weight:bold; color:var(--accent);">${s.points}</td>
        </tr>`).join("");

      return `<div class="table-shell"><div class="section-head"><div><div class="section-title">${state.activeLeague}</div><div class="section-sub">Live berechneter Tabellenstand • Bo7</div></div></div>
      <div class="table-wrap"><table><thead><tr><th class="rank-col">Platz</th><th>Spieler</th><th>Discord</th><th>Siege</th><th>Niederlagen</th><th>Leg-Diff</th><th>Punkte</th></tr></thead><tbody>${tbody}</tbody></table></div></div>`;
    }

    function renderMatchdays(matchdays) {
      if (!matchdays || matchdays.length === 0) return `<div class="empty">Keine aufgezeichneten Spieltage für diese Liga hinterlegt.</div>`;
      const defaultOpenIndex = matchdays.findIndex(day => day.status !== 'fertig') === -1 ? 0 : matchdays.findIndex(day => day.status !== 'fertig');

      return matchdays.map((day, idx) => {
        const key = `${state.activeLeague}__${day.title}`;
        const isOpen = key in state.matchdayOpenState ? state.matchdayOpenState[key] : idx === defaultOpenIndex;
        
        const tbody = day.rows.map(m => `<tr>
          <td><span class="player-link" onclick="openPlayerProfile('${htmlEscape(m.p1Name)}')">${htmlEscape(m.p1Name)}</span></td>
          <td><span class="player-link" onclick="openPlayerProfile('${htmlEscape(m.p2Name)}')">${htmlEscape(m.p2Name)}</span></td>
          <td style="text-align:center; font-weight:bold;">${m.legs1 !== null ? m.legs1 : '-'} : ${m.legs2 !== null ? m.legs2 : '-'}</td>
          <td style="text-align:right;"><span class="status-badge ${m.status === 'done' ? 'done' : ''}">${m.status === 'done' ? 'Gespeichert' : 'Offen'}</span></td>
        </tr>`).join("");

        return `<div class="matchday ${isOpen ? "open" : ""}" data-key="${htmlEscape(key)}">
          <button class="matchday-head" onclick="toggleMatchday(this)">
            <span class="matchday-title">${htmlEscape(day.title)}</span>
            <span class="status-badge ${day.status === 'fertig' ? 'done' : ''}" style="margin:0;">${day.doneMatches}/${day.totalMatches}</span>
          </button>
          <div class="matchday-body"><table class="match-table"><tbody>${tbody}</tbody></table></div>
        </div>`;
      }).join("");
    }

    window.openPlayerProfile = async function(playerName) {
        if(playerName === 'Freilos' || playerName === 'Ehem. Spieler') return;
        const modal = document.getElementById("playerProfileModal");
        const content = document.getElementById("playerProfileContent");
        content.innerHTML = "<p>Lade Profilkarte...</p>";
        openModal(modal);

        const p = state.allProfilesCache.find(prof => prof.discord_name === playerName || prof.real_name === playerName);
        if(!p) { content.innerHTML = "<div class='empty'>Keine Profildaten im Cache gefunden.</div>"; return; }

        content.innerHTML = `<div class="content-block">
            <h4>🎯 ${htmlEscape(playerName)}</h4>
            <p><strong> Dartsetup:</strong> ${htmlEscape(p.dart_setup || 'Keine Angabe')}</p>
            <p><strong> Autodarts-AVG:</strong> ${htmlEscape(p.autodarts_avg || '-')}</p>
            <p><strong> DartCounter-AVG:</strong> ${htmlEscape(p.dartcounter_avg || '-')}</p>
        </div>`;
    };

    function renderHome() { tableAreaEl.innerHTML = state.newsHtml; matchdayAreaEl.innerHTML = ""; }
    function getShortLeagueNumber(fullName) { const match = fullName.match(/\d+$/); return match ? `#${match[0]}` : fullName; }

    async function loadAll() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        state.currentUser = session ? session.user : null;
        document.getElementById("loginBtnText").innerText = state.currentUser ? "👤 Mein Profil" : "👤 Liga Login";

        if (state.currentUser) {
            const { data: pData } = await supabaseClient.from('profiles').select('is_admin').eq('id', state.currentUser.id).maybeSingle();
            if (pData && pData.is_admin === true) state.isAdminUser = true;
        }

        try {
            const { data: newsData } = await supabaseClient.from('news').select('*').order('created_at', { ascending: false });
            let nHtml = "";
            if(newsData && newsData.length > 0) {
                newsData.forEach(n => {
                    const date = new Date(n.created_at).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' });
                    const adminActionsHtml = state.isAdminUser ? `<div class="news-admin-actions"><span class="news-action-link" onclick="directEditNews('${n.id}')">✏️ Edit</span><span class="news-action-link" onclick="directDeleteNews('${n.id}')">🗑️</span></div>` : '';
                    nHtml += `<div class="content-block">${adminActionsHtml}<h4>${htmlEscape(n.title)} <span style="font-size:11px; color:var(--muted); float:right;">${date}</span></h4><div>${n.content}</div></div>`;
                });
            } else { nHtml = "<div class='empty'>Aktuell keine Neuigkeiten verfasst.</div>"; }
            state.newsHtml = `<div class="table-shell"><div class="section-head"><div class="section-title">Neuigkeiten & Ankündigungen</div></div><div style="padding:18px;">${nHtml}</div></div>`;

            try { const r = await fetch('regelwerk.html'); if(r.ok) state.rulewerkHtml = await r.text(); } catch(e){}

            const { data: sys } = await supabaseClient.from('system_settings').select('current_season').eq('id', 1).single();
            state.currentSeason = sys ? sys.current_season : 'Saison 1';

            const { data: profiles } = await supabaseClient.from('profiles').select('*');
            state.allProfilesCache = profiles || [];
            
            const { data: matches } = await supabaseClient.from('matches').select('*').eq('season', state.currentSeason);

            const { data: seasons } = await supabaseClient.from('matches').select('season');
            const uniqueSeasons = [...new Set((seasons || []).map(m => m.season))];
            document.getElementById("archiveSeasonSelect").innerHTML = uniqueSeasons.map(s => `<option value="${s}">${s}</option>`).join("");
            document.getElementById("archiveLeagueSelect").innerHTML = ALL_LEAGUES.map(l => `<option value="${l}">${l}</option>`).join("");

            ALL_LEAGUES.forEach(league => {
                const lMatches = matches ? matches.filter(m => m.league_name === league) : [];
                const lPlayers = profiles ? profiles.filter(p => p.assigned_ad_league === league || p.assigned_dc_league === league || p.assigned_sc_league === league) : [];
                if(lPlayers.length === 0 && lMatches.length === 0) return;

                const stats = {};
                lPlayers.forEach(p => stats[p.id] = { id: p.id, name: p.discord_name || p.real_name, discord: p.discord_name, wins: 0, losses: 0, legDiff: 0, points: 0, yellow: p.yellow_cards, red: p.red_cards });

                lMatches.forEach(m => {
                    if(m.status === 'done' && m.player1_id && m.player2_id) {
                        if(!stats[m.player1_id]) stats[m.player1_id] = { id: m.player1_id, name: "Ehem. Spieler", wins:0, losses:0, legDiff:0, points:0, yellow:0, red:0 };
                        if(!stats[m.player2_id]) stats[m.player2_id] = { id: m.player2_id, name: "Ehem. Spieler", wins:0, losses:0, legDiff:0, points:0, yellow:0, red:0 };
                        const l1 = parseInt(m.legs1) || 0; const l2 = parseInt(m.legs2) || 0;
                        stats[m.player1_id].legDiff += (l1 - l2); stats[m.player2_id].legDiff += (l2 - l1);
                        if(l1 > l2) { stats[m.player1_id].wins++; stats[m.player1_id].points += 2; stats[m.player2_id].losses++; } 
                        else { stats[m.player2_id].wins++; stats[m.player2_id].points += 2; stats[m.player1_id].losses++; }
                    }
                });

                const standingsRows = Object.values(stats).sort((a,b) => b.points !== a.points ? b.points - a.points : b.legDiff - a.legDiff);
                const groupedMatches = {};
                lMatches.forEach(m => {
                    const day = `Spieltag ${m.matchday}`;
                    if(!groupedMatches[day]) groupedMatches[day] = [];
                    groupedMatches[day].push({ p1Name: stats[m.player1_id]?.name || 'Freilos', p2Name: stats[m.player2_id]?.name || 'Freilos', legs1: m.legs1, legs2: m.legs2, status: m.status });
                });

                const matchdays = Object.entries(groupedMatches).map(([title, rows]) => {
                    const done = rows.filter(r => r.status === 'done').length;
                    return { title, status: done===rows.length?'fertig':'offen', doneMatches: done, totalMatches: rows.length, rows };
                });

                state.leagueData[league] = { standings: { rows: standingsRows }, matchdays };
            });

            setMode("Home");
        } catch (e) { tableAreaEl.innerHTML = `<div class="empty">Kritischer Ladefehler.</div>`; }
    }

    document.getElementById("modeHome").onclick = () => setMode("Home");
    document.getElementById("modeAutodarts").onclick = () => setMode("Autodarts");
    document.getElementById("modeDartCounter").onclick = () => setMode("DartCounter");
    document.getElementById("modeScolia").onclick = () => setMode("Scolia");
    
    document.getElementById("archiveBtn").onclick = () => openModal(document.getElementById("archiveModal"));
    document.getElementById("openImpressumBtn").onclick = () => openModal(document.getElementById("impressumModal"));
    
    document.getElementById("regelwerkBtn").onclick = () => {
        const modal = document.getElementById('playerProfileModal');
        document.getElementById('playerProfileTitle').innerText = "Regelwerk";
        document.getElementById('playerProfileContent').innerHTML = state.rulewerkHtml;
        openModal(modal);
    };

    document.getElementById("ligaLoginBtn").onclick = () => {
        if (!state.currentUser) supabaseClient.auth.signInWithOAuth({ provider: 'discord', options: { redirectTo: window.location.href }});
        else window.location.assign("profil.html");
    };

    document.querySelectorAll(".modal-close").forEach(btn => btn.onclick = () => closeModal(btn.closest(".modal-backdrop")));
    function openModal(m) { if(m) m.classList.add("open"); }
    function closeModal(m) { if(m) m.classList.remove("open"); }

    function rankClass(rank, total) { if (rank === 1) return "first"; if (rank >= total && total > 1) return "last"; return ""; }

    loadAll();
  </script>
</body>
</html>
