<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CDL Dart Liga</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">

  <style>
    :root{
      --bg: #0b1329;
      --panel: #1c2541;
      --panel-glass: rgba(28, 37, 65, 0.85);
      --line: rgba(52, 152, 219, 0.25);
      --text: #f8fafc;
      --muted: #94a3b8;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --accent: #3b82f6;
      --accent-border: rgba(59, 130, 246, 0.5);
      --row-a: #1e293b;
      --row-b: #0f172a;
      
      --ad-color: #3b82f6;
      --dc-color: #f97316;
      --sc-color: #10b981;
    }

    body[data-mode="DartCounter"]{ --accent: var(--dc-color); --accent-border: rgba(249, 115, 22, 0.5); }
    body[data-mode="Scolia"]{ --accent: var(--sc-color); --accent-border: rgba(16, 185, 129, 0.5); }
    body[data-mode="Home"]{ --accent: #3b82f6; --accent-border: rgba(59, 130, 246, 0.5); }
    
    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body{ font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 15%, transparent), transparent 50%), linear-gradient(180deg, var(--bg) 0%, #070a14 100%); color:var(--text); min-height:100vh; transition:background .3s ease; }
    
    .wrap { width: min(1200px, calc(100% - 28px)); margin: 0 auto; padding: 15px 0 42px; }
    
    /* NEUER FRISCHER BANNER-HEADER */
    .header-branding { text-align: center; margin-bottom: 25px; padding: 35px 20px; border-radius: 16px; background: linear-gradient(135deg, rgba(28, 37, 65, 0.95), rgba(11, 19, 41, 0.95)); border: 1px solid var(--line); box-shadow: 0 10px 30px rgba(0,0,0,0.3), 0 0 20px color-mix(in srgb, var(--accent) 25%, transparent); backdrop-filter: blur(10px); transition: box-shadow 0.3s ease; }
    .header-branding h2 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: 3px; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .header-branding p { margin: 8px 0 0 0; font-size: 14px; color: var(--muted); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }

    .dashboard-nav { display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 15px; margin: 0 auto 25px auto; max-width: 1024px; align-items: start !important; }
    .nav-card { background: var(--panel-glass); border: 1px solid var(--line); border-radius: 16px; padding: 12px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); backdrop-filter: blur(10px); height: fit-content !important; align-self: start !important; }
    .nav-card-title { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; margin-bottom: 2px; border-bottom: 1px dashed rgba(255,255,255,0.15); padding-bottom: 4px; }

    .nav-btn { position: relative; width: 100%; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #edf7fb; border-radius: 12px; min-height: 48px; padding: 0 16px; font-size: 14px; font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; justify-content: flex-start; gap: 12px; transition: .25s ease; text-decoration: none; }
    .nav-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    
    .btn-autodarts { border-color: rgba(59, 130, 246, 0.3); background: rgba(59, 130, 246, 0.05); color: #93c5fd; }
    .btn-autodarts:hover, .btn-autodarts.active { background: linear-gradient(90deg, #1d4ed8, #3b82f6); border-color: #60a5fa; box-shadow: 0 0 25px rgba(59, 130, 246, 0.4); color: #fff; }
    
    .btn-dartcounter { border-color: rgba(249, 115, 22, 0.3); background: rgba(249, 115, 22, 0.05); color: #ffedd5; }
    .btn-dartcounter:hover, .btn-dartcounter.active { background: linear-gradient(90deg, #c2410c, #f97316); border-color: #f97316; box-shadow: 0 0 25px rgba(249, 115, 22, 0.4); color: #fff; }
    
    .btn-scolia { border-color: rgba(16, 185, 129, 0.3); background: rgba(16, 185, 129, 0.05); color: #d1fae5; }
    .btn-scolia:hover, .btn-scolia.active { background: linear-gradient(90deg, #047857, #10b981); border-color: #34d399; box-shadow: 0 0 25px rgba(16, 185, 129, 0.4); color: #fff; }
    
    .btn-home.active, .btn-info.active { border-color: var(--accent); background: rgba(59, 130, 246, 0.2); color: #fff; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
    .btn-discord { background: rgba(88,101,242,0.15); border-color: rgba(88,101,242,0.3); }
    .btn-discord:hover { background: rgba(88,101,242,0.25); border-color: #5865f2; box-shadow: 0 0 15px rgba(88,101,242,0.2); }

    .dropdown-submenu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; align-content: start; }
    .dropdown-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #edf2f7; text-align: center; padding: 12px; border-radius: 10px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.15s; }
    .dropdown-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--accent-border); }
    .dropdown-btn.active { background: var(--accent); color: #000; font-weight: 900; border-color: var(--accent); box-shadow: 0 0 15px rgba(59,130,246,0.4); }

    /* VERGRÖSSERT: Hauptansicht vergrößert für maximalen Platz */
    .main { display: grid; grid-template-columns: minmax(0,2.3fr) minmax(340px,0.85fr); gap: 20px; align-items: start; }
    body[data-mode="Home"] .main { grid-template-columns: 1fr; }
    body[data-mode="Home"] .sidebar { display: none; }

    .table-shell, .matchday { border: 1px solid var(--line); background: linear-gradient(180deg, rgba(28, 37, 65, 0.95), rgba(11, 19, 41, 0.95)); box-shadow: 0 18px 50px rgba(0,0,0,0.3); border-radius: 18px; overflow: hidden; }
    
    .section-head { display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .section-title { margin: 0; font-size: 18px; font-weight: 900; }
    .section-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }

    .table-wrap { overflow-x: auto; padding-bottom: 4px; }
    table { width: 100%; border-collapse: collapse; min-width: 720px; table-layout: fixed; }
    thead th { padding: 14px 16px; color: #e2e8f0; font-size: 12px; font-weight: 800; text-transform: uppercase; background: rgba(255,255,255,0.04); border-bottom: 1px solid var(--line); text-align: left; }
    
    thead th:nth-child(3), thead th:nth-child(4), thead th:nth-child(5), thead th:nth-child(6), thead th:nth-child(7), thead th:nth-child(8) { text-align: center; width: 75px; }
    
    tbody tr:nth-child(odd) td { background: var(--row-a); }
    tbody tr:nth-child(even) td { background: var(--row-b); }
    tbody td { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px; color: #f1f8fb; white-space: nowrap; }
    tbody tr:hover td { background: rgba(255, 255, 255, 0.03); }
    
    tbody td:nth-child(3), tbody td:nth-child(4), tbody td:nth-child(5), tbody td:nth-child(6), tbody td:nth-child(7), tbody td:nth-child(8) { text-align: center; }

    .rank-col { width: 75px; font-weight: 900; text-align: center !important; position: relative; }
    .rank-col.first::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--green); }
    .rank-col.last::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--red); }

    .player-link { cursor: pointer; font-weight: 700; color: #fff; text-decoration: none; }
    .player-link:hover { color: var(--accent); text-decoration: underline; }

    .sidebar { display: flex; flex-direction: column; gap: 14px; }
    .matchday-list { display: flex; flex-direction: column; gap: 12px; }
    .matchday-head { width: 100%; border: none; background: transparent; color: var(--text); padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .matchday-title { font-size: 15px; font-weight: 800; }
    .matchday-body { display: none; padding: 0 14px 14px; }
    .matchday.open .matchday-body { display: block; }
    
    .match-table { width: 100%; border-collapse: collapse; }
    .match-table td { padding: 10px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); background: rgba(255,255,255,0.02); text-align: left; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .status-badge.done { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }

    .content-block { margin-bottom: 16px; padding: 16px; border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; background: rgba(255,255,255,0.02); position: relative; }
    .news-header-wrapper { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed rgba(255,255,255,0.15); padding-bottom: 8px; margin-bottom: 12px; gap: 15px; padding-right: 90px; }
    .news-title-text { margin: 0; font-size: 16px; color: #fff; font-weight: bold; }
    .news-date-text { font-size: 11px; color: var(--muted); white-space: nowrap; }

    .news-admin-actions { position: absolute; top: 14px; right: 14px; display: flex; gap: 6px; z-index: 5; }
    .news-action-link { font-size: 11px; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 6px; cursor: pointer; font-weight: bold; color: var(--text); border: 1px solid rgba(255,255,255,0.05); }
    .news-action-link:hover { background: var(--accent); color: #000; border-color: var(--accent); }

    .footer { margin-top: 25px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 1000; backdrop-filter: blur(4px); }
    .modal-backdrop.open { display: flex; }
    .modal { width: min(840px, 100%); max-height: 85vh; background: var(--panel); border: 1px solid var(--line); border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .modal-close { width: 36px; height: 36px; border-radius: 10px; border: none; background: rgba(255,255,255,0.08); color: #fff; cursor: pointer; }
    .modal-body { padding: 18px; overflow-y: auto; color: #d7e8ef; line-height: 1.6; }

    #playerProfileModal .modal { max-width: 440px; }
    #playerProfileModal .modal-body { padding: 12px; }

    .archive-control-box { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 12px; border: 1px solid #4b87a5; outline: none; font-weight: bold; min-width: 160px; }
    .archive-select { padding: 10px; border-radius: 8px; background: #1e293b; color: #fff; border: 1px solid #4b87a5; outline: none; font-weight: bold; min-width: 160px; }

    .icon-svg { width: 18px !important; height: 18px !important; min-width: 18px; min-height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    
    .ql-editor p { margin-bottom: 12px !important; line-height: 1.6 !important; color: #f1f8fb !important; }
    .ql-editor ol { list-style-type: decimal !important; margin: 0 0 16px 25px !important; padding: 0 !important; display: block !important; }
    .ql-editor ul { list-style-type: disc !important; margin: 0 0 16px 25px !important; padding: 0 !important; display: block !important; }
    .ql-editor li { display: list-item !important; list-style-position: outside !important; margin-bottom: 8px !important; line-height: 1.5 !important; color: #edf7fb !important; }
    .ql-editor h1, .ql-editor h2, .ql-editor h3, .ql-editor h4 { margin-top: 20px !important; margin-bottom: 12px !important; color: #fff !important; font-weight: bold !important; }

    /* DESIGN: ULTRA-KOMPAKTE PROFIL-CARD OPTIK */
    .profile-card-content { display: flex; flex-direction: column; width: 100%; padding: 0; gap: 8px; }
    .profile-header-compact { display: flex; align-items: center; justify-content: space-between; gap: 12px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); width: 100%; margin-bottom: 2px; }
    .profile-avatar-compact { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; background: #1e293b; flex-shrink: 0; }
    .profile-meta-compact { display: flex; flex-direction: column; gap: 2px; align-items: flex-end; text-align: right; }
    .profile-name-compact { font-size: 19px; font-weight: 900; margin: 0; color: #fff; letter-spacing: 0.3px; line-height: 1.2; }
    .profile-sub-compact { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    
    .profile-discord-btn { background: rgba(88,101,242,0.15); color: #7289da; border: 1px solid rgba(88,101,242,0.4); padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; margin-top: 2px; transition: 0.15s; }
    .profile-discord-btn:hover { background: #5865f2; color: #fff; transform: translateY(-1px); }

    .profile-details-list { display: flex; flex-direction: column; gap: 4px; width: 100%; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 2px; }
    .profile-detail-item { display: flex; justify-content: space-between; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 4px; align-items: center; gap: 10px; }
    .profile-detail-item:last-child { border-bottom: none; padding-bottom: 0; }
    .profile-detail-label { color: var(--muted); font-weight: bold; }
    .profile-detail-val { color: #fff; font-weight: 600; text-align: right; }
    
    .platform-row-compact { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.15); padding: 6px 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.04); margin-bottom: 4px; box-shadow: inset 0 1px 1px rgba(255,255,255,0.02); font-size: 13px; }
    .platform-badge-mini { font-size: 10px; font-weight: bold; padding: 2px 4px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.3px; flex-shrink: 0; }
    .platform-badge-mini.ad { background: rgba(59, 130, 246, 0.15); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.2); }
    .platform-badge-mini.dc { background: rgba(249, 115, 22, 0.15); color: #ffedd5; border: 1px solid rgba(249, 115, 22, 0.2); }
    .platform-badge-mini.sc { background: rgba(16, 185, 129, 0.15); color: #d1fae5; border: 1px solid rgba(16, 185, 129, 0.2); }
  </style>
</head>

    window.directDeleteNews = async function(id) {

        await supabaseClient.from('news').delete().eq('id', id); loadAll();
    };

    window.loadArchiveData = async function() {
        const season = document.getElementById("archiveSeasonSelect").value;
        const league = document.getElementById("archiveLeagueSelect").value;
        const resultContainer = document.getElementById("archiveTableResult");
        if(!season || !league) return;
        
        resultContainer.innerHTML = "<div class='empty'>Lade Daten...</div>";
        const { data: matches, error = null } = await supabaseClient.from('matches').select('*').eq('season', season).eq('league_name', league).eq('status', 'done');
        
        if (error || !matches || matches.length === 0) {
            resultContainer.innerHTML = "<div class='empty'>Keine Spieldaten vorhanden.</div>";
            return;
        }

        const stats = {};
        matches.forEach(m => {
            if(m.player1_id && m.player2_id) {
                if(!stats[m.player1_id]) {
                    const p = state.allProfilesCache.find(prof => prof.id === m.player1_id);
                    stats[m.player1_id] = { name: p ? (p.display_name || p.discord_name || p.username) : 'Spieler', wins: 0, losses: 0, legDiff: 0, points: 0 };
                }
                if(!stats[m.player2_id]) {
                    const p = state.allProfilesCache.find(prof => prof.id === m.player2_id);
                    stats[m.player2_id] = { name: p ? (p.display_name || p.discord_name || p.username) : 'Spieler', wins: 0, losses: 0, legDiff: 0, points: 0 };
                }
                const l1 = parseInt(m.legs_player1) || 0; const l2 = parseInt(m.legs_player2) || 0;
                stats[m.player1_id].legDiff += (l1 - l2); stats[m.player2_id].legDiff += (l2 - l1);
                if(l1 > l2) { stats[m.player1_id].wins++; stats[m.player1_id].points += 2; stats[m.player2_id].losses++; } 
                else { stats[m.player2_id].wins++; stats[m.player2_id].points += 2; stats[m.player1_id].losses++; }
            }
        });

        const rows = Object.values(stats).sort((a,b) => b.points !== a.points ? b.points - a.points : b.legDiff - a.legDiff);
        let html = `<table><thead><tr><th width="80px">Platz</th><th>Spieler</th><th>Siege</th><th>Niederlagen</th><th>Leg-Diff</th><th>Punkte</th></tr></thead><tbody>`;
        rows.forEach((r, idx) => {
            html += `<tr><td>${idx+1}</td><td><b>${htmlEscape(r.name)}</b></td><td>${r.wins}</td><td>${r.losses}</td><td>${r.legDiff}</td><td style="color:#2ecc71; font-weight:bold;">${r.points}</td></tr>`;
        });
        html += `</tbody></table>`;
        resultContainer.innerHTML = `<div class="table-wrap" style="background:rgba(0,0,0,0.1); border-radius:10px; margin-top:10px;">${html}</div>`;
    };

    function updateRightNavBlock() {
        const defaultBlock = document.getElementById("defaultRightContent");
        const dynamicBlock = document.getElementById("dynamicLeaguesContent");
        const cardTitle = document.getElementById("rightCardTitle");

        if (state.activeMode === "Home") {
            defaultBlock.style.display = "flex";
            dynamicBlock.style.display = "none";
            if (cardTitle) cardTitle.innerText = "Community & Profile";
        } else {
            defaultBlock.style.display = "none";
            dynamicBlock.style.display = "grid";
            if (cardTitle) cardTitle.innerText = `Aktive ${state.activeMode} Ligen`;

            // FIXED: Verwendet korrekten Filter für die Plattform-Erkennung (case-insensitive & whitespace clean)
            const filtered = ALL_LEAGUES.filter(l => l.toLowerCase().replace(/\s+/g,'').startsWith(state.activeMode.toLowerCase().replace(/\s+/g,'')));
            dynamicBlock.innerHTML = filtered.map(l => {
                return `<button class="dropdown-btn ${l === state.activeLeague ? "active" : ""}" onclick="selectLeagueDirectly('${l}')">${getShortLeagueNumber(l)}</button>`;
            }).join("");
        }
    }

    window.selectLeagueDirectly = function(leagueName) {
        state.activeLeague = leagueName;
        updateRightNavBlock();
        renderLeague();
    };

    function setMode(mode) {
      state.activeMode = mode;
      document.body.setAttribute("data-mode", mode);
      
      const subTitleEl = document.getElementById("headerSubtitle");
      if (subTitleEl) {
          subTitleEl.innerText = mode === "Home" ? "Community Dart Liga" : `${mode} Ligen Übersicht`;
      }
      
      const setBtn = (id, isActive) => { const e = document.getElementById(id); if(e) e.classList.toggle("active", isActive); };
      setBtn("modeHome", mode === "Home");
      setBtn("modeAutodarts", mode === "Autodarts");
      setBtn("modeDartCounter", mode === "DartCounter");
      setBtn("modeScolia", mode === "Scolia");
      
      if (mode === "Home") {
        state.activeLeague = null;
        renderHome();
      } else {
        const visible = ALL_LEAGUES.filter(l => l.toLowerCase().replace(/\s+/g,'').startsWith(mode.toLowerCase().replace(/\s+/g,'')));
        state.activeLeague = visible.includes(state.activeLeague) ? state.activeLeague : (visible[0] || null);
        renderLeague();
      }
      updateRightNavBlock();
    }

    function renderLeague() {
      const tArea = document.getElementById("tableArea");
      const mArea = document.getElementById("matchdayArea");
      if(!tArea || !mArea) return;

      if(!state.activeLeague) {
          tArea.innerHTML = `<div class="table-shell"><div class="section-head"><div class="section-title">Plattformübersicht</div></div><div style="padding:18px"><div class="empty">⚠️ In dieser Sektion ist derzeit keine Liga active geschaltet.</div></div></div>`;
          mArea.innerHTML = "";
          return;
      }
      const data = state.leagueData[state.activeLeague] || { standings: { rows: [] }, matchdays: [] };
      tArea.innerHTML = renderStandingsTable(data.standings.rows);
      mArea.innerHTML = renderMatchdays(data.matchdays);
    }

    // FIXED: Einheitliche Funktionsbenennung repariert!
    function renderStandingsTable(rows) {
      const visibleRows = rows.filter(s => s.showInMembers !== false);

      const tbody = visibleRows.map((s, idx) => {
          const playerAvg = s.avgCount > 0 ? (s.avgSum / s.avgCount).toFixed(2) : "-";
          return `<tr>
              <td class="rank-col ${rankClass(idx+1, visibleRows.length)}">${idx+1}</td>
              <td><span class="player-link" onclick="openPlayerProfile('${htmlEscape(s.name)}')">${htmlEscape(s.name)}</span> ${renderPlayerCards(s.yellow, s.red)}</td>
              <td>${s.gamesPlayed}</td>
              <td>${s.wins}</td>
              <td>${s.losses}</td>
              <td>${s.legDiff}</td>
              <td style="font-weight:bold; color:#cbd5e1;">${playerAvg}</td>
              <td style="font-weight:bold; color:var(--accent);">${s.points}</td>
            </tr>`;
      }).join("");

      return `<div class="table-shell"><div class="section-head"><div><div class="section-title">${state.activeLeague}</div><div class="section-sub">Live berechneter Tabellenstand • Bo7</div></div></div>
      <div class="table-wrap"><table><thead><tr><th class="rank-col">Platz</th><th>Spieler</th><th>Sp</th><th>S</th><th>N</th><th>Leg-Diff</th><th>AVG</th><th>Punkte</th></tr></thead><tbody>${tbody}</tbody></table></div></div>`;
    }

    function renderMatchdays(matchdays) {
      if (!matchdays || matchdays.length === 0) return `<div class="empty">Keine aufgezeichneten Spieltage für diese Liga hinterlegt.</div>`;
      const defaultOpenIndex = matchdays.findIndex(day => day.status !== 'fertig' && day.status !== 'done') === -1 ? 0 : matchdays.findIndex(day => day.status !== 'fertig' && day.status !== 'done');

      return matchdays.map((day, idx) => {
        const key = `${state.activeLeague}__${day.title}`;
        const isOpen = key in state.matchdayOpenState ? state.matchdayOpenState[key] : idx === defaultOpenIndex;
        
        const tbody = day.rows.map(m => `<tr>
          <td><span class="player-link" onclick="openPlayerProfile('${htmlEscape(m.p1Name)}')">${htmlEscape(m.p1Name)}</span></td>
          <td><span class="player-link" onclick="openPlayerProfile('${htmlEscape(m.p2Name)}')">${htmlEscape(m.p2Name)}</span></td>
          <td style="text-align:center; font-weight:bold;">${m.legs1 !== null && m.legs1 !== undefined ? m.legs1 : '-'} : ${m.legs2 !== null && m.legs2 !== undefined ? m.legs2 : '-'}</td>
          <td style="text-align:right;"><span class="status-badge ${m.status === 'done' || m.status === 'fertig' ? 'done' : ''}">${m.status === 'done' || m.status === 'fertig' ? 'Gespeichert' : 'Offen'}</span></td>
        </tr>`).join("");

        return `<div class="matchday ${isOpen ? "open" : ""}" data-key="${htmlEscape(key)}">
          <button class="matchday-head" onclick="toggleMatchday(this)">
            <span class="matchday-title">${htmlEscape(day.title)}</span>
            <span class="status-badge ${day.status === 'fertig' || day.status === 'done' ? 'done' : ''}" style="margin:0;">${day.doneMatches}/${day.totalMatches}</span>
          </button>
          <div class="matchday-body"><table class="match-table"><tbody>${tbody}</tbody></table></div>
        </div>`;
      }).join("");
    }

        if (discordId && discordId !== "" && discordId !== "null") {
            window.open(`https://discord.com/users/${discordId}`, "_blank");
        } else if (discordName && discordName !== '-') {
            navigator.clipboard.writeText(discordName).then(() => {
                alert(`Discord-Name '${discordName}' wurde kopiert!\n\nDiscord wird geöffnet. Nutze dort einfach die Suche, um direkt zu chatten.`);
                window.open("https://discord.com/channels/@me", "_blank");
            }).catch(err => {
                window.open("https://discord.com/channels/@me", "_blank");
            });
        } else {
            alert("Dieser Spieler hat keinen Discord-Namen hinterlegt.");
        }
    };

        if(mArea) mArea.innerHTML = "";

    function getShortLeagueNumber(fullName) { const match = fullName.match(/\d+$/); return match ? `#${match[0]}` : fullName; }

    async function loadAll() {
        const tableAreaEl = document.getElementById("tableArea");

        try {
            try {
                const { data: authData } = await supabaseClient.auth.getSession();
                state.currentUser = authData && authData.session ? authData.session.user : null;
            } catch(e) { state.currentUser = null; }
            
            const loginBtnEl = document.getElementById("loginBtnText");
            if(loginBtnEl) loginBtnEl.innerText = state.currentUser ? "👤 Mein Profil" : "👤 Liga Login";

            state.isAdminUser = false;
            if (state.currentUser) {
                try {
                    const { data: pData } = await supabaseClient.from('profiles').select('is_admin').eq('id', state.currentUser.id).maybeSingle();
                    if (pData && pData.is_admin === true) state.isAdminUser = true;
                } catch(e){}
            }

            try {
                const { data: newsData } = await supabaseClient.from('news').select('*').order('created_at', { ascending: false });
                let nHtml = "";
                if(newsData && newsData.length > 0) {
                    newsData.forEach(n => {
                        const date = new Date(n.created_at).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit' });
                        const adminActionsHtml = state.isAdminUser ? `<div class="news-admin-actions"><span class="news-action-link" onclick="directEditNews('${n.id}')">✏️ Edit</span><span class="news-action-link" onclick="directDeleteNews('${n.id}')">🗑️</span></div>` : '';
                        
                        nHtml += `<div class="content-block">
                                    ${adminActionsHtml}
                                    <div class="news-header-wrapper">
                                        <h4 class="news-title-text">${htmlEscape(n.title)}</h4>
                                        <span class="news-date-text">${date}</span>
                                    </div>
                                    <div class="ql-snow"><div class="ql-editor">${decodeHtml(n.content)}</div></div>
                                  </div>`;
                    });
                } else { nHtml = "<div class='empty'>Aktuell keine Neuigkeiten verfasst.</div>"; }
                state.newsHtml = `<div class="table-shell"><div class="section-head"><div class="section-title">Neuigkeiten & Ankündigungen</div></div><div style="padding:18px;">${nHtml}</div></div>`;
            } catch(e) {
                state.newsHtml = `<div class='empty'>Fehler beim Laden der News.</div>`;
            }

            try {
                const { data: sys } = await supabaseClient.from('system_settings').select('current_season, regelwerk_html').eq('id', 1).single();
                state.currentSeason = sys && sys.current_season ? sys.current_season : 'Saison 1';
                state.rulewerkHtml = sys && sys.regelwerk_html ? `<div class="ql-snow"><div class="ql-editor">${decodeHtml(sys.regelwerk_html)}</div></div>` : '<h1>Regelwerk</h1><p>Aktuell kein Regelwerk hinterlegt.</p>';
            } catch(e) {
                state.currentSeason = 'Saison 1';
                state.rulewerkHtml = '<h1>Regelwerk</h1><p>Aktuell kein Regelwerk hinterlegt.</p>';
            }

            const linksContentEl = document.getElementById('linksContent');
            if (linksContentEl) {
                try { const r = await fetch('links.html'); if(r.ok) linksContentEl.innerHTML = await r.text(); } catch(e){}
            }

            const { data: profiles } = await supabaseClient.from('profiles').select('*');
            state.allProfilesCache = profiles || [];
            
            const { data: matchesData } = await supabaseClient.from('matches').select('*');
            // FIXED: Verhindert String-Fehler bei leeren oder abweichenden Saison-Einträgen
            const matches = matchesData ? matchesData.filter(m => m.season && String(m.season).toLowerCase().trim() === state.currentSeason.toLowerCase().trim()) : [];

            const { data: seasons } = await supabaseClient.from('matches').select('season');
            const uniqueSeasons = [...new Set((seasons || []).map(m => m.season))];
            
            const aS = document.getElementById("archiveSeasonSelect");
            if(aS) aS.innerHTML = uniqueSeasons.map(s => `<option value="${s}">${s}</option>`).join("");
            const aL = document.getElementById("archiveLeagueSelect");
            if(aL) aL.innerHTML = ALL_LEAGUES.map(l => `<option value="${l}">${l}</option>`).join("");

            ALL_LEAGUES.forEach(l => {
                state.leagueData[l] = { standings: { rows: [] }, matchdays: [] };
            });

            ALL_LEAGUES.forEach(league => {
                // FIXED: Nutzt jetzt eine absolut fehlertolerante Filter-Berechnung für den Abgleich
                const leagueClean = league.toLowerCase().replace(/\s+/g,'');
                const lMatches = matches ? matches.filter(m => m.league_name && m.league_name.toLowerCase().replace(/\s+/g,'') === leagueClean) : [];
                
                const lPlayers = profiles ? profiles.filter(p => 
                    (p.assigned_ad_league && p.assigned_ad_league.toLowerCase().replace(/\s+/g,'') === leagueClean) ||
                    (p.assigned_dc_league && p.assigned_dc_league.toLowerCase().replace(/\s+/g,'') === leagueClean) ||
                    (p.assigned_sc_league && p.assigned_sc_league.toLowerCase().replace(/\s+/g,'') === leagueClean)
                ) : [];

                const stats = {};
                lPlayers.forEach(p => {
                    stats[p.id] = { id: p.id, name: p.display_name || p.discord_name || p.username, discord: p.discord_name, wins: 0, losses: 0, legDiff: 0, points: 0, gamesPlayed: 0, avgSum: 0, avgCount: 0, yellow: p.yellow_cards, red: p.red_cards, showInMembers: p.show_in_members };
                });

                lMatches.forEach(m => {
                    if (m.player1_id && !stats[m.player1_id]) {
                        const p = state.allProfilesCache.find(prof => prof.id === m.player1_id);
                        stats[m.player1_id] = { id: m.player1_id, name: p ? (p.display_name || p.discord_name || p.username) : "Ehem. Spieler", wins:0, losses:0, legDiff:0, points:0, gamesPlayed:0, avgSum:0, avgCount:0, yellow:0, red:0, showInMembers: p ? p.show_in_members : true };
                    }
                    if (m.player2_id && !stats[m.player2_id]) {
                        const p = state.allProfilesCache.find(prof => prof.id === m.player2_id);
                        stats[m.player2_id] = { id: m.player2_id, name: p ? (p.display_name || p.discord_name || p.username) : "Ehem. Spieler", wins:0, losses:0, legDiff:0, points:0, gamesPlayed:0, avgSum:0, avgCount:0, yellow:0, red:0, showInMembers: p ? p.show_in_members : true };
                    }

                    if((m.status === 'done' || m.status === 'fertig') && m.player1_id && m.player2_id) {
                        const l1 = parseInt(m.legs_player1) || 0; const l2 = parseInt(m.legs_player2) || 0;
                        
                        stats[m.player1_id].gamesPlayed++;
                        stats[m.player2_id].gamesPlayed++;
                        
                        stats[m.player1_id].legDiff += (l1 - l2); stats[m.player2_id].legDiff += (l2 - l1);
                        if(l1 > l2) { stats[m.player1_id].wins++; stats[m.player1_id].points += 2; stats[m.player2_id].losses++; } 
                        else if(l2 > l1) { stats[m.player2_id].wins++; stats[m.player2_id].points += 2; stats[m.player1_id].losses++; }

                        if (m.avg_player1 && !isNaN(parseFloat(m.avg_player1))) {
                            stats[m.player1_id].avgSum += parseFloat(m.avg_player1);
                            stats[m.player1_id].avgCount++;
                        }
                        if (m.avg_player2 && !isNaN(parseFloat(m.avg_player2))) {
                            stats[m.player2_id].avgSum += parseFloat(m.avg_player2);
                            stats[m.player2_id].avgCount++;
                        }
                    }
                });

                const standingsRows = Object.values(stats).sort((a,b) => b.points !== a.points ? b.points - a.points : b.legDiff - a.legDiff);
                const groupedMatches = {};
                lMatches.forEach(m => {
                    const day = m.matchday ? `Spieltag ${m.matchday}` : 'Unbekannter Spieltag';
                    if(!groupedMatches[day]) groupedMatches[day] = [];
                    
                    let p1Title = "Freilos";
                    let p2Title = "Freilos";
                    if (m.player1_id) {
                        p1Title = stats[m.player1_id]?.name || (state.allProfilesCache.find(x => x.id === m.player1_id)?.display_name) || "Spieler 1";
                    }
                    if (m.player2_id) {
                        p2Title = stats[m.player2_id]?.name || (state.allProfilesCache.find(x => x.id === m.player2_id)?.display_name) || "Spieler 2";
                    }

                    groupedMatches[day].push({ p1Name: p1Title, p2Name: p2Title, legs1: m.legs_player1, legs2: m.legs_player2, status: m.status });
                });

                const matchdays = Object.entries(groupedMatches).map(([title, rows]) => {
                    const done = rows.filter(r => r.status === 'done' || r.status === 'fertig').length;
                    return { title, status: done===rows.length?'fertig':'offen', doneMatches: done, totalMatches: rows.length, rows };
                });

                state.leagueData[league] = { standings: { rows: standingsRows }, matchdays };
            });

            setMode("Home");

        } catch (error) { 
            console.error("Gesamter Ladefehler:", error);
            if(tableAreaEl) tableAreaEl.innerHTML = `<div class="empty" style="color: red; border-color: red;">Kritischer Fehler: ${error.message}</div>`; 
        }
    }

        const el = document.getElementById(id);
        if (el) el.addEventListener("click", handler);
    }

    safeBind("modeHome", () => setMode("Home"));
    safeBind("modeAutodarts", () => setMode("Autodarts"));
    safeBind("modeDartCounter", () => setMode("DartCounter"));
    safeBind("modeScolia", () => setMode("Scolia"));
    
    safeBind("archiveBtn", () => openModal(document.getElementById("archiveModal")));
    safeBind("openImpressumBtn", () => openModal(document.getElementById("impressumModal")));
    safeBind("openLinksBtn", () => openModal(document.getElementById("linksModal")));
    
    safeBind("regelwerkBtn", () => {
        const modal = document.getElementById('playerProfileModal');
        const titleEl = document.getElementById('playerProfileTitle');
        const contentEl = document.getElementById('playerProfileContent');
        if(titleEl) titleEl.innerText = "Regelwerk";
        if(contentEl) contentEl.innerHTML = state.rulewerkHtml;
        openModal(modal);
    });

    safeBind("ligaLoginBtn", () => {
        if (!state.currentUser) supabaseClient.auth.signInWithOAuth({ provider: 'discord', options: { redirectTo: window.location.href }});
        else window.location.assign("profil.html");
    });

    document.querySelectorAll(".modal-close").forEach(btn => {
        btn.addEventListener("click", () => closeModal(btn.closest(".modal-backdrop")));
    });

    function openModal(m) { if(m) m.classList.add("open"); }
    function closeModal(m) { if(m) m.classList.remove("open"); }

    window.toggleMatchday = function(btn) {
        const card = btn.parentElement;
        const isOpen = !card.classList.contains("open");
        card.classList.toggle("open", isOpen);
        state.matchdayOpenState[card.dataset.key] = isOpen;
    }

    function rankClass(rank, total) { if (rank === 1) return "first"; if (rank >= total && total > 1) return "last"; return ""; }

    loadAll();
</script>
</body>
</html>
