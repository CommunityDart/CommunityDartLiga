<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Mein Profil</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Füge hier dein CSS für das Formular ein */
    body { background: #03131b; color: #fff; font-family: sans-serif; padding: 20px; }
    .shell { background: #041924; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Profil bearbeiten</h1>
    <div id="profileContent">Lade Profil...</div>
    <button onclick="supabase.auth.signOut().then(() => window.location.href='index.html')">Logout</button>
  </div>

  <script>
    const supabase = supabase.createClient("https://ppxwnqbovrnvzkcpyrcj.supabase.co", "DEIN_ANON_KEY");

    supabase.auth.getSession().then(({data}) => {
      if (!data.session) window.location.href = "index.html";
      else loadProfile(data.session.user);
    });

    async function loadProfile(user) {
        // Hier deine Logik zum Profil laden...
        document.getElementById('profileContent').innerHTML = "Profil geladen!";
    }
  </script>
</body>
</html>
