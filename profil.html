<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mein Profil - CDL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

  <style>
    body { background: #0f1c24; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
    .shell { background: #162a35; border: 1px solid rgba(32,183,255,0.3); padding: 30px; border-radius: 15px; max-width: 600px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
    
    .top-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .back-btn { background: transparent; color: #20b7ff; border: 1px solid #20b7ff; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .back-btn:hover { background: rgba(32,183,255,0.1); }
    .admin-btn { border-color: #e74c3c; color: #e74c3c; }
    .admin-btn:hover { background: rgba(231,76,60,0.1); }
    .news-btn { border-color: #2ecc71; color: #2ecc71; }
    .news-btn:hover { background: rgba(46,204,113,0.1); }
    
    .profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #20b7ff; object-fit: cover; background: #0f1c24; flex-shrink: 0; }
    .admin-badge { background: #e74c3c; color: white; font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: bold; margin-left: 10px; display: none; }
    
    label { display: block; font-size: 13px; color: #a3b8c5; margin-bottom: 5px; font-weight: bold; }
    input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; background: #0f1c24; border: 1px solid #4b87a5; color: white; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.2s; }
    input[type="text"]:focus { border-color: #20b7ff; box-shadow: 0 0 8px rgba(32,183,255,0.3); }
    
    .url-input { margin-top: -10px; border-color: rgba(120,170,195,0.2) !important; background: rgba(0,0,0,0.15) !important; font-size: 13px !important; }

    button { border: none; padding: 14px 24px; cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.2s ease; font-size: 15px; }
    button:hover { opacity: 0.8; }
    #saveBtn { background: #2ecc71; color: #fff; }
    .logout-btn { background: #e74c3c; color: white; margin-left: 10px; }
    
    .input-group { display: flex; gap: 15px; }
    .input-group > div { flex: 1; }
    .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 15px 0 20px 0; }
    
    .registration-box { background: rgba(32, 183, 255, 0.03); border: 1px dashed rgba(32,183,255,0.3); padding: 20px; border-radius: 12px; margin-bottom: 25px; display: none; }
    .checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 8px; }
    .checkbox-group label { display: flex; align-items: center; gap: 10px; font-size: 15px; cursor: pointer; }

    /* NEWS OVERLAY STYLES */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:9999; backdrop-filter: blur(4px); }
    .modal-box { background:#162a35; border:1px solid #2ecc71; padding:25px; border-radius:12px; width:100%; max-width:700px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    
    .ql-toolbar.ql-snow { background: #0f1c24 !important; border-color: #4b87a5 !important; border-radius: 8px 8px 0 0; }
    .ql-container.ql-snow { border-color: #4b87a5 !important; background: #0f1c24; border-radius: 0 0 8px 8px; height: 250px; font-size: 15px; color: #fff; }
    .ql-editor.ql-blank::before { color: #5a7585 !important; }

    .admin-news-section { background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; margin-top: 25px; display: none; }
    .admin-news-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .news-manage-btn { padding: 6px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .edit-btn { background: #20b7ff; color: #000; margin-right: 5px; }
    .delete-btn { background: #e74c3c; color: #fff; }
  </style>
</head>
<body>

  <div id="newsModalOverlay" class="modal-overlay">
    <div class="modal-box">
      <h3 id="newsModalTitle" style="margin-top:0; color:#2ecc71; text-align:center;">📰 Neuigkeit verfassen</h3>
      <input type="hidden" id="editNewsId" value="">
      <input type="text" id="newsTitleInput" placeholder="Überschrift">
      <div style="margin-bottom:15px;"><div id="editor-container"></div></div>
      <div style="display:flex; gap:10px;">
        <button onclick="saveNews()" style="background:#2ecc71; color:#fff; flex:1;">Speichern</button>
        <button onclick="closeNewsModal()" style="background:#e74c3c; color:#fff; flex:1;">Abbrechen</button>
      </div>
    </div>
  </div>

  <div class="shell">
    <div class="top-buttons">
        <button class="back-btn" onclick="window.location.href='index.html'">← Homepage</button>
        <button id="adminDashboardBtn" class="back-btn admin-btn" style="display:none;" onclick="window.location.href='admin.html'">⚙️ Admin Dashboard</button>
        <button id="newsDashboardBtn" class="back-btn news-btn" style="display:none;" onclick="openNewsModalForCreate()">📰 News erstellen</button>
    </div>
    
    <div class="profile-header">
      <img id="userAvatar" class="avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'></svg>">
      <h2><span id="statusText">Lade Profil...</span> <span id="adminBadge" class="admin-badge">ADMIN</span></h2>
    </div>
    
    <div id="seasonRegistrationBox" class="registration-box">
      <h3>🎯 Anmeldung nächste Saison</h3>
      <p id="registrationStatusText">Lade Status...</p>
      <div id="registrationFormArea" style="display:none;">
          <div class="checkbox-group">
            <label><input type="checkbox" id="want_ad"> Autodarts Liga</label>
            <label><input type="checkbox" id="want_dc"> DartCounter Liga</label>
            <label><input type="checkbox" id="want_sc"> Scolia Liga</label>
          </div>
          <button type="button" id="btnSaveRegistration" style="background: #20b7ff; color: #fff; width: 100%;">Anmeldung Speichern</button>
      </div>
      <div id="assignmentArea"></div>
    </div>

    <div id="adminNewsSection" class="admin-news-section">
        <h3 style="margin-top:0; color:#2ecc71; font-size:16px;">Newsverwaltung</h3>
        <div id="adminNewsList">Lade...</div>
    </div>

    <div class="divider"></div>

    <form id="profilForm" style="display:none;">
      <div class="input-group">
        <div><label>Vorname</label><input type="text" id="real_name"></div>
        <div style="flex:0 0 90px;"><label>PLZ</label><input type="text" id="plz" maxlength="5"></div>
        <div><label>Wohnort</label><input type="text" id="ort"></div>
      </div>
      <label>Dartsetup</label><input type="text" id="dart_setup">
      
      <div class="input-group">
        <div><label>Autodarts Name</label><input type="text" id="autodarts_name"></div>
        <div style="flex:0 0 90px;"><label>AVG</label><input type="text" id="autodarts_avg"></div>
      </div>
      <input type="text" id="autodarts_url" class="url-input" placeholder="Profil URL">
      
      <div class="input-group" style="margin-top:10px;">
        <div><label>DartCounter Name</label><input type="text" id="dartcounter_name"></div>
        <div style="flex:0 0 90px;"><label>AVG</label><input type="text" id="dartcounter_avg"></div>
      </div>
      <input type="text" id="dartcounter_url" class="url-input" placeholder="Profil URL">

      <div class="divider"></div>
      <button type="submit" id="saveBtn">Profil Speichern</button>
      <button type="button" id="logoutBtn" class="logout-btn">Ausloggen</button>
      <div id="msgBox" style="margin-top:15px; display:none; padding:10px; border-radius:8px; text-align:center;"></div>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null; let quillEditor = null;

    function initQuill() {
        if (quillEditor) return;
        quillEditor = new Quill('#editor-container', { theme: 'snow', modules: { toolbar: [[{ 'header': [1, 2, false] }], ['bold', 'italic', 'underline'], [{ 'color': [] }], ['image', 'clean']] } });
    }

    window.openNewsModalForCreate = () => { initQuill(); document.getElementById('newsModalTitle').innerText = "💡 Neue Nachricht"; document.getElementById('editNewsId').value = ""; document.getElementById('newsTitleInput').value = ""; quillEditor.setContents([]); document.getElementById('newsModalOverlay').style.display = 'flex'; };
    window.closeNewsModal = () => document.getElementById('newsModalOverlay').style.display = 'none';

    window.saveNews = async () => {
        const title = document.getElementById('newsTitleInput').value.trim();
        const htmlContent = quillEditor.getSemanticHTML();
        const editId = document.getElementById('editNewsId').value;
        if(!title) return alert('Titel fehlt!');

        if (editId) { await supabaseClient.from('news').update({ title, content: htmlContent }).eq('id', editId); }
        else { await supabaseClient.from('news').insert([{ title, content: htmlContent }]); }
        closeNewsModal(); loadAdminNewsList();
    };

    async function loadAdminNewsList() {
        const { data } = await supabaseClient.from('news').select('id, title, created_at').order('created_at', { ascending: false });
        document.getElementById('adminNewsList').innerHTML = (data || []).map(n => `
            <div class="admin-news-item">
                <span><b>${htmlEscape(n.title)}</b></span>
                <div>
                    <button class="news-manage-btn edit-btn" onclick="openNewsForEdit('${n.id}')">✏️</button>
                    <button class="news-manage-btn delete-btn" onclick="deleteNews('${n.id}')">🗑️</button>
                </div>
            </div>`).join("");
    }

    window.openNewsForEdit = async (id) => {
        initQuill(); const { data } = await supabaseClient.from('news').select('*').eq('id', id).single();
        document.getElementById('editNewsId').value = data.id;
        document.getElementById('newsTitleInput').value = data.title;
        quillEditor.clipboard.dangerouslyPasteHTML(data.content);
        document.getElementById('newsModalOverlay').style.display = 'flex';
    };

    window.deleteNews = async (id) => { if(confirm('Löschen?')) { await supabaseClient.from('news').delete().eq('id', id); loadAdminNewsList(); } };

    async function initProfile() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = "index.html"; return; }
      currentUser = session.user;
      document.getElementById("statusText").innerText = currentUser.user_metadata.full_name || "Spieler";
      document.getElementById("profilForm").style.display = "block";

      const { data } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
      if(data) {
          document.getElementById("real_name").value = data.real_name || "";
          document.getElementById("plz").value = data.plz || "";
          document.getElementById("ort").value = data.ort || "";
          document.getElementById("dart_setup").value = data.dart_setup || "";
          document.getElementById("autodarts_name").value = data.autodarts_name || "";
          document.getElementById("autodarts_avg").value = data.autodarts_avg || "";
          document.getElementById("dartcounter_name").value = data.dartcounter_name || "";
          document.getElementById("dartcounter_avg").value = data.dartcounter_avg || "";
          
          if(data.is_admin) {
              document.getElementById("adminBadge").style.display = "inline-block";
              document.getElementById("adminDashboardBtn").style.display = "inline-block";
              document.getElementById("newsDashboardBtn").style.display = "inline-block";
              document.getElementById("adminNewsSection").style.display = "block";
              loadAdminNewsList();
          }
      }
    }

    document.getElementById("profilForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const updates = {
            id: currentUser.id,
            real_name: document.getElementById("real_name").value, plz: document.getElementById("plz").value,
            ort: document.getElementById("ort").value, dart_setup: document.getElementById("dart_setup").value,
            autodarts_name: document.getElementById("autodarts_name").value, autodarts_avg: document.getElementById("autodarts_avg").value,
            dartcounter_name: document.getElementById("dartcounter_name").value, dartcounter_avg: document.getElementById("dartcounter_avg").value,
            updated_at: new Date()
        };
        await supabaseClient.from('profiles').upsert(updates);
        alert("Profil gespeichert!");
    });

    document.getElementById("logoutBtn").onclick = async () => { await supabaseClient.auth.signOut(); window.location.href = "index.html"; };
    function htmlEscape(v) { return String(v).replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
    initProfile();
  </script>
</body>
</html>
