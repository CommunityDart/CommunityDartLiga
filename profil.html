<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Mein Profil - CDL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #03131b; color: #fff; font-family: sans-serif; padding: 20px; }
    .shell { background: #041924; border: 1px solid rgba(32,183,255,0.2); padding: 30px; border-radius: 15px; max-width: 600px; margin: 40px auto; }
    
    .profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #20b7ff; object-fit: cover; background: #021017; }
    .admin-badge { background: #e74c3c; color: white; font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: bold; margin-left: 10px; display: none; }
    
    label { display: block; font-size: 13px; color: #90a9b7; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 10px; margin-bottom: 15px; background: #021017; border: 1px solid #4b87a5; color: white; border-radius: 5px; box-sizing: border-box; }
    button { background: #3ddc97; color: #000; border: none; padding: 12px 24px; cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.2s ease; }
    button:hover { opacity: 0.8; }
    .back-btn { background: transparent; color: #20b7ff; border: 1px solid #20b7ff; margin-bottom: 20px; }
    .logout-btn { background: #e74c3c; color: white; margin-left: 10px; }
    
    .input-group { display: flex; gap: 10px; }
    .input-group > div { flex: 1; }
    .divider { height: 1px; background: rgba(120,170,195,0.1); margin: 15px 0 20px 0; }
  </style>
</head>
<body>
  <div class="shell">
    <button class="back-btn" onclick="window.location.href='index.html'">← Zurück zu den Ligen</button>
    
    <div class="profile-header">
      <img id="userAvatar" class="avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'></svg>" alt="Avatar">
      <div>
        <h2 style="margin: 0;"><span id="statusText">Lade Profil...</span> <span id="adminBadge" class="admin-badge">ADMIN</span></h2>
      </div>
    </div>
    
    <form id="profilForm" style="display:none;">
      
      <div class="input-group">
        <div style="flex: 2;"><label>Echter Vorname</label><input type="text" id="real_name" placeholder="Dein Vorname"></div>
        <div style="flex: 1;"><label>PLZ</label><input type="text" id="plz" maxlength="5" placeholder="12345"></div>
        <div style="flex: 2;"><label>Wohnort</label><input type="text" id="ort" placeholder="Musterstadt"></div>
      </div>

      <div class="divider"></div>

      <div class="input-group">
        <div style="flex: 2;"><label>Autodarts Name</label><input type="text" id="autodarts_name"></div>
        <div style="flex: 1;"><label>AVG</label><input type="text" id="autodarts_avg" placeholder="z.B. 45.6"></div>
      </div>
      
      <div class="input-group">
        <div style="flex: 2;"><label>DartCounter Name</label><input type="text" id="dartcounter_name"></div>
        <div style="flex: 1;"><label>AVG</label><input type="text" id="dartcounter_avg" placeholder="z.B. 45.6"></div>
      </div>

      <div class="input-group">
        <div style="flex: 2;"><label>Scolia Name</label><input type="text" id="scolia_name"></div>
        <div style="flex: 1;"><label>AVG</label><input type="text" id="scolia_avg" placeholder="z.B. 45.6"></div>
      </div>

      <div class="divider"></div>

      <button type="submit" id="saveBtn">Profil Speichern</button>
      <button type="button" id="logoutBtn" class="logout-btn">Ausloggen</button>
      
      <div id="msgBox" style="margin-top:15px; font-weight:bold; padding: 10px; border-radius: 5px; display: none;"></div>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    async function initProfile() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      
      if (!session && !window.location.hash.includes("access_token") && !window.location.search.includes("code")) {
         window.location.href = "index.html";
         return;
      }

      supabaseClient.auth.onAuthStateChange(async (event, session) => {
          if (session) {
              currentUser = session.user;
              
              const meta = session.user.user_metadata || {};
              const discordName = meta.full_name || meta.name || "Spieler";
              const avatarUrl = meta.avatar_url || meta.picture || "";
              
              document.getElementById("statusText").innerText = discordName;
              if (avatarUrl) {
                  document.getElementById("userAvatar").src = avatarUrl;
              }
              document.getElementById("profilForm").style.display = "block";
              
              try {
                  const { data, error } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
                  if (data) {
                      document.getElementById("real_name").value = data.real_name || "";
                      document.getElementById("plz").value = data.plz || "";
                      document.getElementById("ort").value = data.ort || "";
                      document.getElementById("autodarts_name").value = data.autodarts_name || "";
                      document.getElementById("autodarts_avg").value = data.autodarts_avg || "";
                      document.getElementById("dartcounter_name").value = data.dartcounter_name || "";
                      document.getElementById("dartcounter_avg").value = data.dartcounter_avg || "";
                      document.getElementById("scolia_name").value = data.scolia_name || "";
                      document.getElementById("scolia_avg").value = data.scolia_avg || "";
                      
                      if (data.is_admin === true) document.getElementById("adminBadge").style.display = "inline-block";
                  }
              } catch (err) {}
          } else if (event === 'SIGNED_OUT') {
              window.location.href = "index.html";
          }
      });
    }

    function showError(text) {
        const msgBox = document.getElementById("msgBox");
        msgBox.style.display = "block";
        msgBox.style.background = "rgba(231, 76, 60, 0.2)";
        msgBox.style.color = "#e74c3c";
        msgBox.style.border = "1px solid #e74c3c";
        msgBox.innerText = text;
    }

    document.getElementById("profilForm").addEventListener("submit", async function(e) {
        e.preventDefault(); 
        const saveBtn = document.getElementById("saveBtn");
        
        const autoName = document.getElementById("autodarts_name").value.trim();
        const autoAvg = document.getElementById("autodarts_avg").value.trim().replace(',', '.');
        const dcName = document.getElementById("dartcounter_name").value.trim();
        const dcAvg = document.getElementById("dartcounter_avg").value.trim().replace(',', '.');
        const scName = document.getElementById("scolia_name").value.trim();
        const scAvg = document.getElementById("scolia_avg").value.trim().replace(',', '.');

        // Pflichtfeld-Prüfung
        if (autoName !== "" && autoAvg === "") return showError("Fehler: Autodarts AVG fehlt!");
        if (dcName !== "" && dcAvg === "") return showError("Fehler: DartCounter AVG fehlt!");
        if (scName !== "" && scAvg === "") return showError("Fehler: Scolia AVG fehlt!");

        saveBtn.innerText = "Speichert...";
        saveBtn.disabled = true;

        const meta = currentUser.user_metadata || {};
        const safeAvatarUrl = meta.avatar_url || meta.picture || "";

        // HIER IST DER FIX: Wenn ein Wert leer ist (""), senden wir ein sauberes null (Datenbank-Leerzeichen)
        const updates = {
            id: currentUser.id,
            real_name: document.getElementById("real_name").value.trim() || null,
            plz: document.getElementById("plz").value.trim() || null,
            ort: document.getElementById("ort").value.trim() || null,
            autodarts_name: autoName || null,
            autodarts_avg: autoAvg || null,
            dartcounter_name: dcName || null,
            dartcounter_avg: dcAvg || null,
            scolia_name: scName || null,
            scolia_avg: scAvg || null,
            avatar_url: safeAvatarUrl || null,
            updated_at: new Date()
        };
        
        const { error } = await supabaseClient.from('profiles').upsert(updates);
        
        saveBtn.innerText = "Profil Speichern";
        saveBtn.disabled = false;

        if (error) {
            showError("Fehler beim Speichern! " + error.message);
        } else {
            const msgBox = document.getElementById("msgBox");
            msgBox.style.display = "block";
            msgBox.style.background = "rgba(61, 220, 151, 0.2)";
            msgBox.style.color = "#3ddc97";
            msgBox.style.border = "1px solid #3ddc97";
            msgBox.innerText = "Profil erfolgreich gespeichert!";
            setTimeout(() => msgBox.style.display = "none", 4000);
        }
    });

    document.getElementById("logoutBtn").addEventListener("click", async function(e) {
        e.preventDefault();
        document.getElementById("statusText").innerText = "Wird ausgeloggt...";
        document.getElementById("profilForm").style.display = "none";
        await supabaseClient.auth.signOut();
        setTimeout(() => { window.location.href = "index.html"; }, 500); 
    });

    initProfile();
  </script>
</body>
</html>
