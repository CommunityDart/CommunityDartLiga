<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Mein Profil - CDL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #03131b; color: #fff; font-family: sans-serif; padding: 20px; }
    .shell { background: #041924; border: 1px solid rgba(32,183,255,0.2); padding: 30px; border-radius: 15px; max-width: 600px; margin: 40px auto; }
    input { width: 100%; padding: 10px; margin-bottom: 15px; background: #021017; border: 1px solid #4b87a5; color: white; border-radius: 5px; }
    button { background: #3ddc97; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
    .back-btn { background: transparent; color: #20b7ff; border: 1px solid #20b7ff; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="shell">
    <button class="back-btn" onclick="window.location.href='index.html'">← Zurück zu den Ligen</button>
    <h2 id="statusText">Lade dein Profil...</h2>
    
    <form id="profilForm" style="display:none;" onsubmit="saveProfile(event)">
      <label>Echter Name</label>
      <input type="text" id="real_name" placeholder="Dein Vorname">
      
      <label>Autodarts Name</label>
      <input type="text" id="autodarts_name">
      
      <label>DartCounter Name</label>
      <input type="text" id="dartcounter_name">

      <button type="submit">Profil Speichern</button>
      <button type="button" style="background: #e74c3c; margin-left:10px;" onclick="logout()">Ausloggen</button>
      <p id="erfolgMsg" style="color: #3ddc97; display:none;">Gespeichert!</p>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    // Prüfen, ob der Login geklappt hat
    supabaseClient.auth.onAuthStateChange(async (event, session) => {
        if (session) {
            currentUser = session.user;
            document.getElementById("statusText").innerText = "Willkommen, " + (session.user.user_metadata.full_name || "Spieler");
            document.getElementById("profilForm").style.display = "block";
            
            // Lade vorhandene Daten aus der DB
            const { data } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
            if (data) {
                document.getElementById("real_name").value = data.real_name || "";
                document.getElementById("autodarts_name").value = data.autodarts_name || "";
                document.getElementById("dartcounter_name").value = data.dartcounter_name || "";
            }
        } else {
            // Nicht eingeloggt! Zurückschicken!
            window.location.href = "index.html";
        }
    });

    // Profil Speichern
    async function saveProfile(e) {
        e.preventDefault();
        const updates = {
            id: currentUser.id,
            real_name: document.getElementById("real_name").value,
            autodarts_name: document.getElementById("autodarts_name").value,
            dartcounter_name: document.getElementById("dartcounter_name").value,
            updated_at: new Date()
        };
        await supabaseClient.from('profiles').upsert(updates);
        document.getElementById("erfolgMsg").style.display = "block";
        setTimeout(() => document.getElementById("erfolgMsg").style.display = "none", 3000);
    }

    // Logout
    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.href = "index.html";
    }
  </script>
</body>
</html>
