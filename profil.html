<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mein Profil - CDL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #03131b; color: #fff; font-family: sans-serif; padding: 20px; margin: 0; }
    .shell { background: #041924; border: 1px solid rgba(32,183,255,0.2); padding: 30px; border-radius: 15px; max-width: 600px; margin: 20px auto; }
    
    .top-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .back-btn { background: transparent; color: #20b7ff; border: 1px solid #20b7ff; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .admin-btn { border-color: #e74c3c; color: #e74c3c; }
    
    .profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
    .avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #20b7ff; object-fit: cover; background: #021017; flex-shrink: 0; }
    .admin-badge { background: #e74c3c; color: white; font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: bold; margin-left: 10px; display: none; vertical-align: middle; }
    
    label { display: block; font-size: 13px; color: #90a9b7; margin-bottom: 5px; font-weight: bold; }
    input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; background: #021017; border: 1px solid #4b87a5; color: white; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
    input[type="text"]:focus { outline: none; border-color: #20b7ff; box-shadow: 0 0 8px rgba(32,183,255,0.3); }
    
    button { border: none; padding: 14px 24px; cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.2s ease; font-size: 15px; }
    button:hover { opacity: 0.8; }
    #saveBtn { background: #3ddc97; color: #000; }
    .logout-btn { background: #e74c3c; color: white; margin-left: 10px; }
    
    .input-group { display: flex; gap: 15px; }
    .input-group > div { flex: 1; }
    .divider { height: 1px; background: rgba(120,170,195,0.1); margin: 15px 0 20px 0; }
    
    .hint-text { font-size: 12px; color: #90a9b7; margin-top: 15px; font-style: italic; text-align: center; }

    .registration-box { background: rgba(32, 183, 255, 0.05); border: 1px solid rgba(32,183,255,0.3); padding: 20px; border-radius: 12px; margin-bottom: 25px; display: none; }
    .registration-box h3 { margin-top: 0; color: var(--accent); font-size: 18px; margin-bottom: 10px; text-align: center;}
    .checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; }
    .checkbox-group label { display: flex; align-items: center; gap: 10px; font-size: 15px; color: #fff; cursor: pointer; margin: 0; }
    .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .league-assignment-text { color: #3ddc97; font-weight: bold; font-size: 14px; margin-top: 10px; text-align: center; background: rgba(61, 220, 151, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(61, 220, 151, 0.3);}

    @media (max-width: 600px) {
      body { padding: 10px; }
      .shell { padding: 20px; margin: 10px auto; border-radius: 12px; }
      .input-group { flex-direction: column; gap: 0; }
      button { width: 100%; display: block; margin-bottom: 10px; }
      .logout-btn { margin-left: 0; margin-top: 5px; }
      .profile-header { flex-direction: column; text-align: center; gap: 10px; }
      h2 { font-size: 22px; }
      .top-buttons { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    
    <div class="top-buttons">
        <button class="back-btn" onclick="window.location.href='index.html'">← Zurück zu den Ligen</button>
        <button id="adminDashboardBtn" class="back-btn admin-btn" style="display:none;" onclick="window.location.href='admin.html'">⚙️ Admin Dashboard</button>
    </div>
    
    <div class="profile-header">
      <img id="userAvatar" class="avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'></svg>" alt="Avatar">
      <div>
        <h2 style="margin: 0;"><span id="statusText">Lade Profil...</span> <span id="adminBadge" class="admin-badge">ADMIN</span></h2>
      </div>
    </div>
    
    <!-- SAISON-ABFRAGE BOX (Multi-Plattform) -->
    <div id="seasonRegistrationBox" class="registration-box">
      <h3>🎯 Anmeldung nächste Saison</h3>
      <p id="registrationStatusText" style="font-size: 14px; margin-bottom: 15px; text-align: center;">Wähle die Plattformen aus, auf denen du nächste Saison spielen möchtest. Nimmst du alle Haken raus, setzt du aus.</p>
      
      <div id="registrationFormArea">
          <div class="checkbox-group">
            <label><input type="checkbox" id="want_ad"> Autodarts Liga spielen</label>
            <label><input type="checkbox" id="want_dc"> DartCounter Liga spielen</label>
            <label><input type="checkbox" id="want_sc"> Scolia Liga spielen</label>
          </div>
          <button type="button" id="btnSaveRegistration" style="background: #20b7ff; color: #fff; width: 100%;">Anmeldung Speichern / Ändern</button>
      </div>

      <div id="assignmentArea"></div>
    </div>

    <!-- Das eigentliche Profil-Formular -->
    <form id="profilForm" style="display:none;">
      
      <div class="input-group">
        <div style="flex: 2;"><label>Echter Vorname</label><input type="text" id="real_name" placeholder="Dein Vorname"></div>
        <div style="flex: 1;"><label>PLZ *</label><input type="text" id="plz" maxlength="5" inputmode="numeric" placeholder="12345"></div>
        <div style="flex: 2;"><label>Wohnort</label><input type="text" id="ort" placeholder="Musterstadt"></div>
      </div>

      <div class="divider"></div>

      <label>Mein Dartsetup (Welche Darts spiele ich derzeit?)</label>
      <input type="text" id="dart_setup" placeholder="z.B. Target Gabriel Clemens 21g, Condor Flights">

      <div class="divider"></div>

      <div class="input-group">
        <div style="flex: 2;"><label>Autodarts Name</label><input type="text" id="autodarts_name"></div>
        <div style="flex: 1;"><label>AVG</label><input type="text" id="autodarts_avg" inputmode="decimal" placeholder="z.B. 45.6"></div>
      </div>
      
      <div class="input-group">
        <div style="flex: 2;"><label>DartCounter Name</label><input type="text" id="dartcounter_name"></div>
        <div style="flex: 1;"><label>AVG</label><input type="text" id="dartcounter_avg" inputmode="decimal" placeholder="z.B. 45.6"></div>
      </div>

      <div class="input-group">
        <div style="flex: 2;"><label>Scolia Name</label><input type="text" id="scolia_name"></div>
        <div style="flex: 1;"><label>AVG</label><input type="text" id="scolia_avg" inputmode="decimal" placeholder="z.B. 45.6"></div>
      </div>

      <div class="divider"></div>

      <button type="submit" id="saveBtn">Profil Speichern</button>
      <button type="button" id="logoutBtn" class="logout-btn">Ausloggen</button>
      
      <p class="hint-text">* wird benötigt für die Mitgliederkarte</p>
      
      <div id="msgBox" style="margin-top:15px; font-weight:bold; padding: 12px; border-radius: 8px; display: none; text-align:center;"></div>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    async function initProfile() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session && !window.location.hash.includes("access_token") && !window.location.search.includes("code")) {
         window.location.href = "index.html"; return;
      }

      supabaseClient.auth.onAuthStateChange(async (event, session) => {
          if (session) {
              currentUser = session.user;
              const meta = session.user.user_metadata || {};
              document.getElementById("statusText").innerText = meta.full_name || meta.name || "Spieler";
              if (meta.avatar_url || meta.picture) document.getElementById("userAvatar").src = meta.avatar_url || meta.picture;
              
              document.getElementById("profilForm").style.display = "block";
              
              try {
                  const { data, error } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
                  const { data: sysData } = await supabaseClient.from('system_settings').select('registration_open').eq('id', 1).single();
                  const isRegistrationOpen = sysData ? sysData.registration_open : false;

                  if (data) {
                      document.getElementById("real_name").value = data.real_name || "";
                      document.getElementById("plz").value = data.plz || "";
                      document.getElementById("ort").value = data.ort || "";
                      document.getElementById("dart_setup").value = data.dart_setup || "";
                      document.getElementById("autodarts_name").value = data.autodarts_name || "";
                      document.getElementById("autodarts_avg").value = data.autodarts_avg || "";
                      document.getElementById("dartcounter_name").value = data.dartcounter_name || "";
                      document.getElementById("dartcounter_avg").value = data.dartcounter_avg || "";
                      document.getElementById("scolia_name").value = data.scolia_name || "";
                      document.getElementById("scolia_avg").value = data.scolia_avg || "";
                      
                      if (data.is_admin === true) {
                          document.getElementById("adminBadge").style.display = "inline-block";
                          document.getElementById("adminDashboardBtn").style.display = "inline-block";
                      }

                      // SAISON ANMELDUNG LOGIK
                      const regBox = document.getElementById("seasonRegistrationBox");
                      const regText = document.getElementById("registrationStatusText");
                      const regForm = document.getElementById("registrationFormArea");
                      const assignArea = document.getElementById("assignmentArea");
                      
                      document.getElementById("want_ad").checked = data.want_autodarts || false;
                      document.getElementById("want_dc").checked = data.want_dartcounter || false;
                      document.getElementById("want_sc").checked = data.want_scolia || false;
                      
                      regBox.style.display = "block";

                      if (!isRegistrationOpen) {
                          regText.innerHTML = "🔒 <strong>Die Anmeldung für die neue Saison ist aktuell geschlossen.</strong>";
                          regForm.style.display = "none";
                      } else {
                          regText.innerHTML = "Wähle die Plattformen aus, auf denen du nächste Saison spielen möchtest. Willst du pausieren, entferne alle Haken und klicke Speichern.";
                      }

                      // Zeige Zuteilungen, falls vorhanden
                      let assignHtml = "";
                      if (data.assigned_ad_league) assignHtml += `<div>🎯 Autodarts: <strong>${data.assigned_ad_league}</strong></div>`;
                      if (data.assigned_dc_league) assignHtml += `<div>📱 DartCounter: <strong>${data.assigned_dc_league}</strong></div>`;
                      if (data.assigned_sc_league) assignHtml += `<div>🎥 Scolia: <strong>${data.assigned_sc_league}</strong></div>`;
                      
                      if (assignHtml !== "") {
                          assignArea.innerHTML = `<div class="league-assignment-text">✅ Du wurdest bereits eingeteilt:<br>${assignHtml}</div>`;
                      } else if (data.want_autodarts || data.want_dartcounter || data.want_scolia) {
                          assignArea.innerHTML = `<div style="text-align:center; color:#90a9b7; margin-top:10px;">⏳ Deine Anmeldung ist gespeichert. Du wartest auf die Liga-Einteilung.</div>`;
                      }

                      document.getElementById("btnSaveRegistration").onclick = async () => {
                          const btn = document.getElementById("btnSaveRegistration");
                          btn.innerText = "Speichert...";
                          
                          await supabaseClient.from('profiles').update({
                              want_autodarts: document.getElementById("want_ad").checked,
                              want_dartcounter: document.getElementById("want_dc").checked,
                              want_scolia: document.getElementById("want_sc").checked
                          }).eq('id', currentUser.id);
                          
                          window.location.reload();
                      };
                  }
              } catch (err) {}
          } else if (event === 'SIGNED_OUT') window.location.href = "index.html";
      });
    }

    // Profilspeicherung (wie vorher)
    document.getElementById("profilForm").addEventListener("submit", async function(e) {
        e.preventDefault(); 
        const saveBtn = document.getElementById("saveBtn");
        
        const autoName = document.getElementById("autodarts_name").value.trim();
        const autoAvg = document.getElementById("autodarts_avg").value.trim().replace(',', '.');
        const dcName = document.getElementById("dartcounter_name").value.trim();
        const dcAvg = document.getElementById("dartcounter_avg").value.trim().replace(',', '.');
        const scName = document.getElementById("scolia_name").value.trim();
        const scAvg = document.getElementById("scolia_avg").value.trim().replace(',', '.');

        saveBtn.innerText = "Speichert...";
        saveBtn.disabled = true;

        const meta = currentUser.user_metadata || {};
        const safeAvatarUrl = meta.avatar_url || meta.picture || "";
        const currentDiscordName = meta.full_name || meta.name || "";
        const currentDiscordId = meta.sub || currentUser.id || "";

        const updates = {
            id: currentUser.id, discord_name: currentDiscordName || null, discord_id: currentDiscordId || null,
            real_name: document.getElementById("real_name").value.trim() || null, plz: document.getElementById("plz").value.trim() || null,
            ort: document.getElementById("ort").value.trim() || null, dart_setup: document.getElementById("dart_setup").value.trim() || null,
            autodarts_name: autoName || null, autodarts_avg: autoAvg || null,
            dartcounter_name: dcName || null, dartcounter_avg: dcAvg || null,
            scolia_name: scName || null, scolia_avg: scAvg || null,
            avatar_url: safeAvatarUrl || null, updated_at: new Date()
        };
        
        await supabaseClient.from('profiles').upsert(updates);
        
        saveBtn.innerText = "Profil Speichern"; saveBtn.disabled = false;
        
        const msgBox = document.getElementById("msgBox");
        msgBox.style.display = "block"; msgBox.style.background = "rgba(61, 220, 151, 0.2)";
        msgBox.style.color = "#3ddc97"; msgBox.style.border = "1px solid #3ddc97";
        msgBox.innerText = "Profil erfolgreich gespeichert!";
        setTimeout(() => msgBox.style.display = "none", 4000);
    });

    document.getElementById("logoutBtn").addEventListener("click", async function(e) {
        e.preventDefault(); await supabaseClient.auth.signOut(); window.location.href = "index.html"; 
    });

    initProfile();
  </script>
</body>
</html>
