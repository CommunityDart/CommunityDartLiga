<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mein Profil - CDL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #1e293b;
      --panel: #2c3e50;
      --panel-glass: rgba(44, 62, 80, 0.85);
      --line: rgba(52, 152, 219, 0.35);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #3498db;
      --green: #2ecc71;
    }
    * { box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; background: #0f1c24; color: var(--text); min-height: 100vh; margin: 0; padding: 20px; }
    .wrap { width: min(800px, 100%); margin: 0 auto; }
     
    .panel { background: var(--panel-glass); border: 1px solid var(--line); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); backdrop-filter: blur(8px); margin-bottom: 20px; }
    h2, h3 { margin-top: 0; color: #fff; }
     
    .input-group { margin-bottom: 15px; }
    label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: var(--muted); }
    .input-text, select { width: 100%; padding: 12px; border-radius: 10px; background: #1e293b; border: 1px solid var(--line); color: #fff; outline: none; font-size: 14px; }
    .input-text:focus, select:focus { border-color: var(--accent); }
     
    .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; text-align: center; display: block; text-decoration: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #2980b9; }
    .btn-success { background: var(--green); color: #fff; }
    .btn-success:hover { background: #27ae60; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.1); margin-top: 10px; }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }
     
    .flex-group { display: flex; gap: 15px; }
    .flex-group .input-group { flex: 1; }
     
    .status-box { padding: 12px; border-radius: 10px; background: rgba(241,196,15,0.1); border: 1px solid #f1c40f; color: #f1c40f; font-weight: bold; text-align: center; margin-bottom: 20px; }
    .status-box.registered { background: rgba(46,204,113,0.1); border: 1px solid var(--green); color: var(--green); }
     
    @media (max-width: 600px) { .flex-group { flex-direction: column; gap: 0; } }
  </style>
</head>
<body>

  <div class="wrap">
     
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
       <h2>👤 Mein Profil</h2>
       <button class="btn btn-secondary" style="width:auto; margin:0;" onclick="logout()">Abmelden</button>
    </div>

    <div id="adminPanelLink" style="display:none; margin-bottom:20px;">
       <a href="admin.html" class="btn btn-primary" style="background:#e74c3c; text-align:center;">⚙️ Zur Kommandozentrale (Admin)</a>
    </div>

    <div id="registrationStatusBox" class="status-box">
       Du bist aktuell noch nicht für die kommende Saison angemeldet.
    </div>

    <div class="panel">
       <h3>Anmelde- &amp; Spielerdaten</h3>
       <form id="profileForm" onsubmit="saveProfile(event)">
           
          <div class="input-group">
             <label>Discord-Name (wird in der Tabelle angezeigt):</label>
             <input type="text" id="discordNameInput" class="input-text" required readonly style="opacity:0.6; cursor:not-allowed;">
          </div>

          <div class="input-group">
             <label>Echter Name (optional):</label>
             <input type="text" id="realNameInput" class="input-text" placeholder="Dein Vorname">
          </div>

          <div class="input-group">
             <label>Dein Dart-Setup (Darts, Spitzen, Flights):</label>
             <input type="text" id="dartSetupInput" class="input-text" placeholder="z.B. Target Gabriel Clemens 21g...">
          </div>

          <div class="flex-group">
             <div class="input-group">
                <label>Autodarts Name:</label>
                <input type="text" id="adNameInput" class="input-text" placeholder="Dein Ingame-Name">
             </div>
             <div class="input-group">
                <label>Autodarts AVG (optional):</label>
                <input type="text" id="adAvgInput" class="input-text" placeholder="z.B. 55.4">
             </div>
          </div>

          <div class="flex-group">
             <div class="input-group">
                <label>DartCounter Name:</label>
                <input type="text" id="dcNameInput" class="input-text" placeholder="Dein Ingame-Name">
             </div>
             <div class="input-group">
                <label>DartCounter AVG (optional):</label>
                <input type="text" id="dcAvgInput" class="input-text" placeholder="z.B. 52.1">
             </div>
          </div>

          <div class="input-group">
             <label>Scolia Name (falls vorhanden):</label>
             <input type="text" id="scoliaNameInput" class="input-text" placeholder="Dein Scolia-Nutzername">
          </div>

          <button type="submit" class="btn btn-success" style="margin-top:10px;">💾 Profil speichern &amp; für neue Saison anmelden</button>
       </form>
    </div>

    <a href="index.html" class="btn btn-secondary"> Zurück zur Startseite</a>

  </div>

  <script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;

    async function checkUser() {
        const { data } = await supabaseClient.auth.getSession();
        if (!data || !data.session) {
            window.location.assign("index.html");
            return;
        }
        currentUser = data.session.user;
        loadProfileData();
    }

    async function loadProfileData() {
        if(!currentUser) return;

        let { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
        
        if (!profile) {
            const discordName = currentUser.user_metadata.full_name || currentUser.user_metadata.name || "Spieler";
            const { data: newProfile } = await supabaseClient.from('profiles').insert([
                { id: currentUser.id, discord_name: discordName, status_neue_saison: 'waiting' }
            ]).select().single();
            profile = newProfile;
        }

        if (profile) {
            document.getElementById("discordNameInput").value = profile.discord_name || "";
            document.getElementById("realNameInput").value = profile.real_name || "";
            document.getElementById("dartSetupInput").value = profile.dart_setup || "";
            document.getElementById("adNameInput").value = profile.autodarts_name || "";
            document.getElementById("adAvgInput").value = profile.autodarts_avg || "";
            document.getElementById("dcNameInput").value = profile.dartcounter_name || "";
            document.getElementById("dcAvgInput").value = profile.dartcounter_avg || "";
            document.getElementById("scoliaNameInput").value = profile.scolia_name || "";

            const statusBox = document.getElementById("registrationStatusBox");
            if (profile.status_neue_saison === 'waiting' || profile.status_neue_saison === 'assigned') {
                statusBox.classList.add("registered");
                statusBox.innerText = "✅ Du bist erfolgreich für die kommende Saison registriert!";
            } else {
                statusBox.classList.remove("registered");
                statusBox.innerText = "🟨 Du bist aktuell noch nicht für die kommende Saison angemeldet. Bitte fülle deine Daten aus und klicke auf Speichern.";
            }

            if (profile.is_admin === true) {
                document.getElementById("adminPanelLink").style.display = "block";
            }
        }
    }

    window.saveProfile = async function(e) {
        e.preventDefault();
        if(!currentUser) return;

        const updates = {
            real_name: document.getElementById("realNameInput").value.trim(),
            dart_setup: document.getElementById("dartSetupInput").value.trim(),
            autodarts_name: document.getElementById("adNameInput").value.trim(),
            autodarts_avg: document.getElementById("adAvgInput").value.trim(),
            dartcounter_name: document.getElementById("dcNameInput").value.trim(),
            dartcounter_avg: document.getElementById("dcAvgInput").value.trim(),
            scolia_name: document.getElementById("scoliaNameInput").value.trim(),
            status_neue_saison: 'waiting'
        };

        const { error } = await supabaseClient.from('profiles').update(updates).eq('id', currentUser.id);

        if (error) {
            alert("Fehler beim Speichern: " + error.message);
        } else {
            alert("🎉 Daten erfolgreich gespeichert und für die neue Saison angemeldet!");
            loadProfileData();
        }
    }

    window.logout = async function() {
        await supabaseClient.auth.signOut();
        window.location.assign("index.html");
    }

    checkUser();
  </script>
</body>
</html>
