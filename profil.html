<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mein Profil - CDL</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>

  <style>
    :root{
      --bg: #1e293b;
      --panel: #2c3e50;
      --panel-glass: rgba(44, 62, 80, 0.85);
      --line: rgba(52, 152, 219, 0.35);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --green: #2ecc71;
      --red: #e74c3c;
      --yellow: #f1c40f;
      --accent: #3498db;
      --row-a: #334155;
    }

    *{box-sizing:border-box} html,body{margin:0;padding:0}
    body { background: radial-gradient(circle at top left, rgba(52,152,219,0.15), transparent 45%), linear-gradient(180deg, var(--bg) 0%, #1e293b 100%); color: var(--text); font-family: sans-serif; padding: 20px; min-height: 100vh; }
    .shell { background: var(--panel-glass); border: 1px solid var(--line); padding: 30px; border-radius: 20px; max-width: 650px; margin: 20px auto; box-shadow: 0 12px 32px rgba(0,0,0,0.15); backdrop-filter: blur(10px); }
    
    .top-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
    .back-btn { background: rgba(255,255,255,0.06); color: #edf7fb; border: 1px solid rgba(255,255,255,0.2); padding: 10px 16px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s ease; text-decoration: none; display: inline-flex; align-items: center; }
    .back-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); transform: translateY(-1px); }
    .admin-btn { border-color: rgba(231,76,60,0.4); color: #e74c3c; }
    .admin-btn:hover { border-color: #e74c3c; background: rgba(231,76,60,0.1); }
    .news-btn { border-color: rgba(46,204,113,0.4); color: #2ecc71; }
    .news-btn:hover { border-color: #2ecc71; background: rgba(46,204,113,0.1); }
    
    .profile-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); }
    .avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; background: #1e293b; flex-shrink: 0; }
    .admin-badge { background: #e74c3c; color: white; font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: bold; margin-left: 10px; display: none; }
    
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: bold; letter-spacing: 0.5px; }
    input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; background: #1e293b; border: 1px solid #4b87a5; color: white; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.2s; }
    input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(52,152,219,0.3); }
    
    .url-input { margin-top: -10px; border-color: rgba(255,255,255,0.1) !important; background: rgba(0,0,0,0.1) !important; font-size: 13px !important; color: #cbd5e1 !important; }

    button { border: none; padding: 14px 24px; cursor: pointer; font-weight: bold; border-radius: 10px; transition: 0.2s ease; font-size: 14px; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    #saveBtn { background: #2ecc71; color: #fff; box-shadow: 0 4px 12px rgba(46,204,113,0.2); }
    .logout-btn { background: #e74c3c; color: white; margin-left: 10px; box-shadow: 0 4px 12px rgba(231,76,60,0.2); }
    
    .input-group { display: flex; gap: 15px; }
    .input-group > div { flex: 1; }
    .divider { height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0; }
    
    .registration-box { background: rgba(32, 183, 255, 0.03); border: 1px dashed var(--line); padding: 20px; border-radius: 14px; margin-bottom: 25px; }
    .registration-box h3 { margin-top: 0; font-size: 16px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px; }
    .checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; background: rgba(0,0,0,0.15); padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.03); }
    .checkbox-group label { display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; color: #edf7fb; font-weight: bold; }
    .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

    /* FIX: NEWS OVERLAY GEGEN ÜBERLAPPUNGEN SCHÜTZEN */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:9999; backdrop-filter: blur(5px); padding: 20px; }
    .modal-box { background: var(--panel); border:1px solid #2ecc71; padding:25px; border-radius:20px; width:100%; max-width:700px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 15px; }
    
    .ql-toolbar.ql-snow { background: #1e293b !important; border-color: #4b87a5 !important; border-radius: 8px 8px 0 0; }
    .ql-container.ql-snow { border-color: #4b87a5 !important; background: #1e293b; border-radius: 0 0 8px 8px; min-height: 220px; max-height: 350px; font-size: 15px; color: #fff; overflow-y: auto; }
    .ql-editor.ql-blank::before { color: #cbd5e1 !important; font-style: normal; }

    .admin-news-section { background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; margin-top: 25px; display: none; }
    .admin-news-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.01); border-radius: 6px; margin-bottom: 6px; }
    .news-manage-btn { padding: 6px 12px; font-size: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; }
    .edit-btn { background: var(--accent); color: #000; margin-right: 5px; }
    .delete-btn { background: #e74c3c; color: #fff; }
    .hint-text { font-size: 12px; color: var(--muted); margin-top: -10px; margin-bottom: 15px; font-style: italic; }
  </style>
</head>
<body>

  <div id="newsModalOverlay" class="modal-overlay">
    <div class="modal-box">
      <h3 id="newsModalTitle" style="margin:0; color:#2ecc71; text-align:center;">📰 Neuigkeit verfassen</h3>
      <input type="hidden" id="editNewsId" value="">
      
      <div>
         <label>Überschrift der Ankündigung</label>
         <input type="text" id="newsTitleInput" style="margin-bottom: 0;" placeholder="z.B. Wartungsarbeiten am Server...">
      </div>
      
      <div>
         <label>Inhalt der Nachricht</label>
         <div id="editor-container"></div>
      </div>

      <div style="display:flex; gap:10px; margin-top: 5px;">
        <button onclick="saveNews()" style="background:#2ecc71; color:#fff; flex:1;">Veröffentlichen / Speichern</button>
        <button onclick="closeNewsModal()" style="background:#e74c3c; color:#fff; flex:1;">Abbrechen</button>
      </div>
    </div>
  </div>

  <div class="shell">
    <div class="top-buttons">
        <button class="back-btn" onclick="window.location.href='index.html'">← Homepage</button>
        <button id="adminDashboardBtn" class="back-btn admin-btn" style="display:none;" onclick="window.location.href='admin.html'">⚙️ Admin Dashboard</button>
        <button id="newsDashboardBtn" class="back-btn news-btn" style="display:none;" onclick="openNewsModalForCreate()">📰 News erstellen</button>
    </div>
    
    <div class="profile-header">
      <img id="userAvatar" class="avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'></svg>">
      <h2 style="margin:0; font-size:22px; font-weight:900;"><span id="statusText">Lade Profil...</span> <span id="adminBadge" class="admin-badge">ADMIN</span></h2>
    </div>
    
    <div id="seasonRegistrationBox" class="registration-box">
      <h3>🎯 Anmeldung nächste Saison</h3>
      <p id="registrationStatusText" style="font-size:13px; color:var(--muted); margin-bottom:12px;">Wähle unten deine gewünschten Plattformen aus:</p>
      <div id="registrationFormArea">
          <div class="checkbox-group">
            <label><input type="checkbox" id="want_ad"> Autodarts Liga spielen</label>
            <label><input type="checkbox" id="want_dc"> DartCounter Liga spielen</label>
            <label><input type="checkbox" id="want_sc"> Scolia Liga spielen</label>
          </div>
          <button type="button" id="btnSaveRegistration" style="background: var(--accent); color: #fff; width: 100%;">Anmeldung Speichern</button>
      </div>
      <div id="assignmentArea"></div>
    </div>

    <div id="adminNewsSection" class="admin-news-section">
        <h3 style="margin-top:0; color:#2ecc71; font-size:15px; font-weight:800; border-bottom:1px dashed rgba(255,255,255,0.1); padding-bottom:6px;">Newsverwaltung</h3>
        <div id="adminNewsList">Lade...</div>
    </div>

    <div class="divider"></div>

    <form id="profilForm" style="display:none;">
      <div class="input-group">
        <div><label>Vorname</label><input type="text" id="real_name" placeholder="Dein Vorname"></div>
        <div style="flex:0 0 100px;"><label>PLZ *</label><input type="text" id="plz" maxlength="5" inputmode="numeric" placeholder="12345"></div>
        <div><label>Wohnort</label><input type="text" id="ort" placeholder="Wohnort"></div>
      </div>
      <p class="hint-text">* Postleitzahl wird für die Mitgliederkarte benötigt.</p>

      <label>Mein Dartsetup (Welche Darts spielst du derzeit?)</label>
      <input type="text" id="dart_setup" placeholder="z.B. Target Gabriel Clemens 21g, Condor Flights">
      
      <div class="divider"></div>

      <div class="input-group">
        <div><label>Autodarts Name</label><input type="text" id="autodarts_name"></div>
        <div style="flex:0 0 90px;"><label>AVG</label><input type="text" id="autodarts_avg"></div>
      </div>
      <input type="text" id="autodarts_url" class="url-input" placeholder="Autodarts Profil URL (optional)">
      
      <div class="input-group" style="margin-top:10px;">
        <div><label>DartCounter Name</label><input type="text" id="dartcounter_name"></div>
        <div style="flex:0 0 90px;"><label>AVG</label><input type="text" id="dartcounter_avg"></div>
      </div>
      <input type="text" id="dartcounter_url" class="url-input" placeholder="DartCounter Profil URL (optional)">

      <div class="input-group" style="margin-top:10px;">
        <div><label>Scolia Name</label><input type="text" id="scolia_name"></div>
        <div style="flex:0 0 90px;"><label>AVG</label><input type="text" id="scolia_avg"></div>
      </div>
      <input type="text" id="scolia_url" class="url-input" placeholder="Scolia Profil URL (optional)">

      <div class="divider"></div>
      <button type="submit" id="saveBtn">Profil Speichern</button>
      <button type="button" id="logoutBtn" class="logout-btn">Ausloggen</button>
      <div id="msgBox" style="margin-top:15px; display:none; padding:10px; border-radius:8px; text-align:center;"></div>
    </form>
  </div>

  <script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null; let quillEditor = null;

    function initQuill() {
        if (quillEditor) return;
        quillEditor = new Quill('#editor-container', { theme: 'snow', modules: { toolbar: [[{ 'header': [1, 2, false] }], ['bold', 'italic', 'underline'], [{ 'color': [] }], ['image', 'clean']] } });
    }

    window.openNewsModalForCreate = () => { initQuill(); document.getElementById('newsModalTitle').innerText = "💡 Neue Nachricht"; document.getElementById('editNewsId').value = ""; document.getElementById('newsTitleInput').value = ""; quillEditor.setContents([]); document.getElementById('newsModalOverlay').style.display = 'flex'; };
    window.closeNewsModal = () => document.getElementById('newsModalOverlay').style.display = 'none';

    window.saveNews = async () => {
        const title = document.getElementById('newsTitleInput').value.trim();
        const htmlContent = quillEditor.getSemanticHTML();
        const editId = document.getElementById('editNewsId').value;
        if(!title) return alert('Titel fehlt!');

        if (editId) { await supabaseClient.from('news').update({ title, content: htmlContent }).eq('id', editId); }
        else { await supabaseClient.from('news').insert([{ title, content: htmlContent }]); }
        closeNewsModal(); loadAdminNewsList();
    };

    async function loadAdminNewsList() {
        const { data } = await supabaseClient.from('news').select('id, title, created_at').order('created_at', { ascending: false });
        document.getElementById('adminNewsList').innerHTML = (data || []).map(n => `
            <div class="admin-news-item">
                <span><b>${htmlEscape(n.title)}</b></span>
                <div>
                    <button class="news-manage-btn edit-btn" onclick="openNewsForEdit('${n.id}')">✏️</button>
                    <button class="news-manage-btn delete-btn" onclick="deleteNews('${n.id}')">🗑️</button>
                </div>
            </div>`).join("");
    }

    window.openNewsForEdit = async (id) => {
        initQuill(); const { data } = await supabaseClient.from('news').select('*').eq('id', id).single();
        document.getElementById('editNewsId').value = data.id;
        document.getElementById('newsTitleInput').value = data.title;
        quillEditor.clipboard.dangerouslyPasteHTML(data.content);
        document.getElementById('newsModalOverlay').style.display = 'flex';
    };

    window.deleteNews = async (id) => { if(confirm('Löschen?')) { await supabaseClient.from('news').delete().eq('id', id); loadAdminNewsList(); } };

    async function initProfile() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = "index.html"; return; }
      currentUser = session.user;
      
      const meta = currentUser.user_metadata || {};
      document.getElementById("statusText").innerText = meta.full_name || meta.name || "Spieler";
      if (meta.avatar_url || meta.picture) document.getElementById("userAvatar").src = meta.avatar_url || meta.picture;
      
      document.getElementById("profilForm").style.display = "block";

      const { data } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
      if(data) {
          document.getElementById("real_name").value = data.real_name || "";
          document.getElementById("plz").value = data.plz || "";
          document.getElementById("ort").value = data.ort || "";
          document.getElementById("dart_setup").value = data.dart_setup || "";
          
          document.getElementById("autodarts_name").value = data.autodarts_name || "";
          document.getElementById("autodarts_avg").value = data.autodarts_avg || "";
          document.getElementById("autodarts_url").value = data.autodarts_url || "";
          
          document.getElementById("dartcounter_name").value = data.dartcounter_name || "";
          document.getElementById("dartcounter_avg").value = data.dartcounter_avg || "";
          document.getElementById("dartcounter_url").value = data.dartcounter_url || "";

          document.getElementById("scolia_name").value = data.scolia_name || "";
          document.getElementById("scolia_avg").value = data.scolia_avg || "";
          document.getElementById("scolia_url").value = data.scolia_url || "";
          
          document.getElementById("want_ad").checked = data.want_autodarts || false;
          document.getElementById("want_dc").checked = data.want_dartcounter || false;
          document.getElementById("want_sc").checked = data.want_scolia || false;
          
          if(data.is_admin) {
              document.getElementById("adminBadge").style.display = "inline-block";
              document.getElementById("adminDashboardBtn").style.display = "inline-block";
              document.getElementById("newsDashboardBtn").style.display = "inline-block";
              document.getElementById("adminNewsSection").style.display = "block";
              loadAdminNewsList();
          }
      }
    }

    document.getElementById("btnSaveRegistration").onclick = async () => {
        await supabaseClient.from('profiles').update({
            want_autodarts: document.getElementById("want_ad").checked,
            want_dartcounter: document.getElementById("want_dc").checked,
            want_scolia: document.getElementById("want_sc").checked,
            status_neue_saison: 'waiting'
        }).eq('id', currentUser.id);
        alert("Anmeldung gespeichert!");
    };

    document.getElementById("profilForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        const updates = {
            id: currentUser.id,
            real_name: document.getElementById("real_name").value.trim() || null, plz: document.getElementById("plz").value.trim() || null,
            ort: document.getElementById("ort").value.trim() || null, dart_setup: document.getElementById("dart_setup").value.trim() || null,
            autodarts_name: document.getElementById("autodarts_name").value.trim() || null, autodarts_avg: document.getElementById("autodarts_avg").value.trim().replace(',', '.') || null, autodarts_url: document.getElementById("autodarts_url").value.trim() || null,
            dartcounter_name: document.getElementById("dartcounter_name").value.trim() || null, dartcounter_avg: document.getElementById("dartcounter_avg").value.trim().replace(',', '.') || null, dartcounter_url: document.getElementById("dartcounter_url").value.trim() || null,
            scolia_name: document.getElementById("scolia_name").value.trim() || null, scolia_avg: document.getElementById("scolia_avg").value.trim().replace(',', '.') || null, scolia_url: document.getElementById("scolia_url").value.trim() || null,
            updated_at: new Date()
        };
        await supabaseClient.from('profiles').upsert(updates);
        alert("Profil erfolgreich gespeichert!");
    });

    document.getElementById("logoutBtn").onclick = async () => { await supabaseClient.auth.signOut(); window.location.href = "index.html"; };
    function htmlEscape(v) { return String(v).replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
    initProfile();
  </script>
</body>
</html>
