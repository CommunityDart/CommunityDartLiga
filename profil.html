<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mein Profil - CDL v2</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #f5f6f8;
      --bg-secondary: #ffffff;
      --bg-tertiary: #eef0f5;
      --text-primary: #2c3e50;
      --text-secondary: #666;
      --border: #e8ecf1;
      --hover: #f0f6ff;
      --platform-color: #0066ff;
      --green: #00d084;
      --red: #ff6b35;
    }

    html.dark {
      --bg-primary: #1a1f36;
      --bg-secondary: #24293f;
      --bg-tertiary: #2c3555;
      --text-primary: #e8ecf1;
      --text-secondary: #b0c4ff;
      --border: #3a4558;
      --hover: #1f2741;
    }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background 0.3s ease, color 0.3s ease;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
      border-bottom: 1px solid var(--border);
    }
    .header-top {
      padding: 24px 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-title { flex: 1; text-align: center; }
    .header-title h1 {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 4px;
      background: linear-gradient(135deg, #0066ff 0%, #ff6b35 50%, #00d084 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-title p {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .theme-toggle {
      width: 46px; height: 46px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s ease;
    }
    .theme-toggle:hover { border-color: var(--platform-color); background: var(--hover); transform: scale(1.05); }

    .navbar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 20px; flex-wrap: wrap;
      background: var(--bg-secondary);
    }
    .nav-btn {
      padding: 10px 16px; border: 1px solid var(--border); background: var(--bg-secondary);
      border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
      color: var(--text-primary); transition: all 0.3s ease; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .nav-btn:hover { background: var(--hover); border-color: var(--platform-color); color: var(--platform-color); }
    .nav-btn.admin { border-color: rgba(255,107,53,0.4); color: #ff6b35; }
    .nav-btn.admin:hover { border-color: #ff6b35; background: rgba(255,107,53,0.1); }

    .container { max-width: 650px; margin: 0 auto; padding: 30px 20px; }
    .full-width-layout { display: flex; flex-direction: column; gap: 20px; }

    .card {
      background: var(--bg-secondary);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .card-header {
      background: var(--bg-tertiary);
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 16px; font-weight: 700; color: var(--text-primary);
      display: flex; align-items: center; gap: 8px;
    }
    .card-body { padding: 20px; }

    .profile-header-inner { display: flex; align-items: center; gap: 15px; }
    .avatar { width: 64px; height: 64px; border-radius: 50%; border: 3px solid var(--platform-color); object-fit: cover; background: var(--bg-tertiary); flex-shrink: 0; }
    .admin-badge { background: #ff6b35; color: white; font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: bold; margin-left: 8px; display: none; }

    label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 700; letter-spacing: 0.3px; }
    input[type="text"] {
      width: 100%; padding: 11px 12px; margin-bottom: 15px;
      background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary);
      border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s;
    }
    input[type="text"]:focus { border-color: var(--platform-color); box-shadow: 0 0 0 3px rgba(0,102,255,0.12); }
    input[type="text"]:required:invalid { border-color: var(--red); }

    .url-input { margin-top: -10px; font-size: 12.5px !important; color: var(--text-secondary) !important; }

    button { border: none; padding: 13px 22px; cursor: pointer; font-weight: 700; border-radius: 8px; transition: 0.2s ease; font-size: 14px; }
    button:hover { opacity: 0.92; transform: translateY(-1px); }
    #saveBtn { background: var(--green); color: #fff; }
    .logout-btn { background: var(--red); color: white; margin-left: 10px; }

    .input-group { display: flex; gap: 15px; }
    .input-group > div { flex: 1; }
    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    .registration-box-body { display: flex; flex-direction: column; gap: 14px; }
    .checkbox-group {
      display: flex; flex-direction: column; gap: 10px;
      background: var(--bg-tertiary); padding: 14px; border-radius: 8px; border: 1px solid var(--border);
    }
    .checkbox-group label { display: flex; align-items: center; gap: 10px; font-size: 14px; cursor: pointer; color: var(--text-primary); font-weight: 600; margin-bottom: 0; }
    .checkbox-group input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    .hint-text { font-size: 12px; color: var(--text-secondary); margin-top: -8px; margin-bottom: 4px; font-style: italic; }

    .visibility-box {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-tertiary); padding: 14px; border-radius: 8px; border: 1px solid var(--border);
      margin-bottom: 15px;
    }
    .visibility-box label { margin-bottom: 0; font-size: 13.5px; color: var(--text-primary); cursor: pointer; display: flex; align-items: center; gap: 10px; font-weight: 600; }
    .visibility-box input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

    .required-mark { color: var(--red); }

    .assignment-status { background: rgba(0,208,132,0.08); border: 1px solid rgba(0,208,132,0.3); border-radius: 8px; padding: 12px 14px; }
    .assignment-status-title { font-size: 12px; font-weight: 800; color: var(--green); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .assignment-row { display: flex; justify-content: space-between; font-size: 13.5px; padding: 4px 0; color: var(--text-primary); }
    .assignment-pending {
      background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.3); border-radius: 8px;
      padding: 10px 14px; font-size: 13px; color: var(--text-primary); margin-top: 10px;
    }

    #msgBox { margin-top: 15px; display: none; padding: 10px; border-radius: 8px; text-align: center; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-title">
      <h1>CDL</h1>
      <p>Mein Profil</p>
    </div>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
  </div>
  <div class="navbar">
    <a class="nav-btn" href="index.html">🏠 Zur Startseite</a>
    <button id="adminDashboardBtn" class="nav-btn admin" style="display:none;" onclick="window.location.href='admin.html'">⚙️ Admin Dashboard</button>
  </div>
</div>

<div class="container">
  <div class="full-width-layout">

    <div class="card">
      <div class="card-body">
        <div class="profile-header-inner">
          <img id="userAvatar" class="avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'></svg>">
          <h2 style="margin:0; font-size:20px; font-weight:800;"><span id="statusText">Lade Profil...</span> <span id="adminBadge" class="admin-badge">ADMIN</span></h2>
        </div>
        <div id="levelBox" style="margin-top:16px; padding-top:16px; border-top:1px solid var(--border);"></div>
      </div>
    </div>

    <div class="card" id="seasonRegistrationBox">
      <div class="card-header">🎯 Anmeldung nächste Saison</div>
      <div class="card-body registration-box-body">
        <p id="registrationStatusText" style="font-size:13px; color:var(--text-secondary);">Wähle unten deine gewünschten Plattformen aus:</p>
        <div id="registrationFormArea" class="registration-box-body">
          <div class="checkbox-group">
            <label><input type="checkbox" id="want_ad"> ⚫ Autodarts Liga spielen</label>
            <label><input type="checkbox" id="want_dc"> 🟠 DartCounter Liga spielen</label>
            <label><input type="checkbox" id="want_sc"> 🟢 Scolia Liga spielen</label>
          </div>
          <button type="button" id="btnSaveRegistration" style="background: var(--platform-color); color: #fff; width: 100%;">Anmeldung Speichern</button>
        </div>
        <div id="assignmentArea"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">📋 Mein Profil</div>
      <div class="card-body">
        <form id="profilForm" style="display:none;">
          <label>Wunschname / Anzeigename (wird in allen Tabellen ausgegeben) <span class="required-mark">*</span></label>
          <input type="text" id="display_name" placeholder="Dein Wunschname, z.B. Phil Taylor" required>

          <div class="visibility-box">
            <label><input type="checkbox" id="show_in_members"> 🌐 Profil in der öffentlichen Mitgliederübersicht anzeigen</label>
          </div>

          <div class="visibility-box">
            <label><input type="checkbox" id="show_membership_card"> 🪪 Meine Mitgliederkarte im "Mitgliederkarte"-Reiter öffentlich anzeigen</label>
          </div>

          <div class="input-group">
            <div><label>Vorname <span class="required-mark">*</span></label><input type="text" id="real_name" placeholder="Dein Vorname" required></div>
            <div style="flex:0 0 100px;"><label>PLZ *</label><input type="text" id="plz" maxlength="5" inputmode="numeric" placeholder="12345"></div>
            <div><label>Wohnort</label><input type="text" id="ort" placeholder="Wohnort"></div>
          </div>
          <p class="hint-text">* Postleitzahl wird für die Mitgliederkarte benötigt.</p>

          <label>Mein Dartsetup (Welche Darts spielst du derzeit?)</label>
          <input type="text" id="dart_setup" placeholder="z.B. Target Gabriel Clemens 21g, Condor Flights">

          <div class="divider"></div>

          <div class="input-group">
            <div><label>Autodarts Name</label><input type="text" id="autodarts_name"></div>
            <div style="flex:0 0 90px;"><label>AVG</label><input type="text" id="autodarts_avg"></div>
          </div>
          <input type="text" id="autodarts_url" class="url-input" placeholder="Autodarts Profil URL (optional)">

          <div class="input-group" style="margin-top:10px;">
            <div><label>DartCounter Name</label><input type="text" id="dartcounter_name"></div>
            <div style="flex:0 0 90px;"><label>AVG</label><input type="text" id="dartcounter_avg"></div>
          </div>
          <input type="text" id="dartcounter_url" class="url-input" placeholder="DartCounter Profil URL (optional)">

          <div class="input-group" style="margin-top:10px;">
            <div><label>Scolia Name</label><input type="text" id="scolia_name"></div>
            <div style="flex:0 0 90px;"><label>AVG</label><input type="text" id="scolia_avg"></div>
          </div>
          <input type="text" id="scolia_url" class="url-input" placeholder="Scolia Profil URL (optional)">

          <div class="divider"></div>
          <button type="submit" id="saveBtn">Profil Speichern</button>
          <button type="button" id="logoutBtn" class="logout-btn">Ausloggen</button>
          <div id="msgBox"></div>
        </form>
      </div>
    </div>

  </div>
</div>

  <script>
    const SUPABASE_URL = "https://ppxwnqbovrnvzkcpyrcj.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBweHducWJvdnJudnprY3B5cmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTEyMTksImV4cCI6MjA5NzA2NzIxOX0.wRDVNxLBx2QHz6hFC59rn1xZgEkxyf1NM6fc8ki-3-Q";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let currentProfileData = null;

    // Theme-Toggle: nutzt denselben localStorage-Key wie index.html, damit die
    // Hell/Dunkel-Einstellung über beide Seiten hinweg konsistent bleibt.
    let darkMode = localStorage.getItem('darkMode') === 'true';
    function toggleTheme() { darkMode = !darkMode; localStorage.setItem('darkMode', darkMode); updateTheme(); }
    function updateTheme() {
      const html = document.documentElement; const toggle = document.getElementById('themeToggle');
      if (darkMode) { html.classList.add('dark'); toggle.textContent = '☀️'; }
      else { html.classList.remove('dark'); toggle.textContent = '🌙'; }
    }
    updateTheme();

    function htmlEscape(str) {
      if (str === undefined || str === null) return "";
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    // Liest den Discord-Anzeigenamen, den Discord-Nutzernamen (Handle) und die
    // Discord-User-ID aus den user_metadata, die Supabase beim Discord-OAuth-Login
    // mitliefert. Unterschiedliche Discord/Supabase-Versionen liefern die Felder
    // teils unter leicht anderen Namen - deshalb hier mehrere Fallbacks.
    function extractDiscordIdentity(user) {
      const meta = user.user_metadata || {};
      const identity = (user.identities && user.identities[0]) || {};
      const identityData = identity.identity_data || {};
      const custom = meta.custom_claims || identityData.custom_claims || {};

      // Discord liefert den "schönen" Anzeigenamen (z.B. "Kette") meistens unter
      // custom_claims.global_name, während full_name/name oft der technische
      // Discord-Benutzername (z.B. "sven_123") ist. Deshalb global_name zuerst.
      const discordName = custom.global_name || meta.full_name || meta.name || identityData.full_name || identityData.name || null;
      const username = meta.name || identityData.name || custom.username || meta.preferred_username || meta.user_name || identityData.preferred_username || null;
      const discordId = meta.provider_id || meta.sub || identity.id || identityData.provider_id || identityData.sub || null;
      const avatarUrl = meta.avatar_url || meta.picture || identityData.avatar_url || identityData.picture || null;

      // Debug-Ausgabe: F12 -> Konsole öffnen, damit man sieht was Discord wirklich
      // liefert, falls die Zuordnung bei einem Provider-Update mal nicht mehr passt.
      console.log('[Discord-Sync] user_metadata (roh):', meta);
      console.log('[Discord-Sync] identity_data (roh):', identityData);
      console.log('[Discord-Sync] Ermittelt:', { discordName, username, discordId, avatarUrl });

      return { discordName, username, discordId, avatarUrl };
    }

    // FIX: Vorher wurde der Discord-Name/Handle NIRGENDWO in die profiles-Tabelle
    // geschrieben - weder beim ersten Laden noch beim Speichern des Formulars.
    // Dadurch blieben discord_name/username/discord_id für JEDEN Spieler dauerhaft
    // leer, obwohl sich alle über Discord anmelden. Diese Funktion schreibt die
    // Discord-Identität bei jedem Profilaufruf im Hintergrund in die DB (Self-Heal
    // für bereits bestehende Profile) und wird zusätzlich beim Speichern erneut
    // mitgeschickt, damit die Felder nie wieder leer laufen.
    async function syncDiscordIdentity(user) {
      const { discordName, username, discordId, avatarUrl } = extractDiscordIdentity(user);
      try {
        const { data, error } = await supabaseClient.from('profiles').upsert({
          id: user.id,
          discord_name: discordName,
          username: username,
          discord_id: discordId,
          avatar_url: avatarUrl
        }, { onConflict: 'id' }).select();
        if (error) {
          console.error('[Discord-Sync] Fehler beim Speichern in profiles:', error);
        } else {
          console.log('[Discord-Sync] Erfolgreich in profiles geschrieben:', data);
        }
      } catch (e) {
        console.error('[Discord-Sync] Unerwarteter Fehler:', e);
      }
    }

    // Wandelt PLZ/Ort in Koordinaten um (für die Weltkarte im Mitgliederkarte-Tab).
    // Nutzt die freie Nominatim (OpenStreetMap) Geocoding-API, kein API-Key nötig.
    async function geocodeAddress(plz, ort) {
      if (!plz && !ort) return null;
      try {
        // 1. Versuch: strukturierte Suche (zuverlässiger für deutsche PLZ)
        const params = new URLSearchParams({ format: 'json', limit: '1', country: 'Germany' });
        if (plz) params.set('postalcode', plz);
        if (ort) params.set('city', ort);
        let res = await fetch(`https://nominatim.openstreetmap.org/search?${params.toString()}`);
        let data = await res.json();

        // 2. Fallback: einfache Freitextsuche, falls die strukturierte Suche nichts findet
        if (!data || data.length === 0) {
          const q = `${plz || ''} ${ort || ''}`.trim();
          res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
          data = await res.json();
        }

        console.log('Geocoding-Ergebnis für "' + plz + ' ' + ort + '":', data);

        if (data && data.length > 0) {
          return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
        }
      } catch (e) { console.error('Geocoding fehlgeschlagen:', e); }
      return null;
    }

    // Zeigt an, welchen Ligen der Spieler aktuell schon zugeteilt ist, und ob
    // eine Anmeldung für die neue Saison noch auf Zuteilung durch den Admin wartet.
    function renderAssignmentStatus(data) {
      const area = document.getElementById('assignmentArea');
      if (!area) return;

      const assignments = [];
      if (data.assigned_ad_league) assignments.push({ label: '⚫ Autodarts', league: data.assigned_ad_league });
      if (data.assigned_dc_league) assignments.push({ label: '🟠 DartCounter', league: data.assigned_dc_league });
      if (data.assigned_sc_league) assignments.push({ label: '🟢 Scolia', league: data.assigned_sc_league });

      let html = '';
      if (assignments.length > 0) {
        html += `<div class="assignment-status">
          <div class="assignment-status-title">✅ Aktuell zugeteilt</div>
          ${assignments.map(a => `<div class="assignment-row"><span>${a.label}</span><strong>${htmlEscape(a.league)}</strong></div>`).join('')}
        </div>`;
      }

      const wantsAny = data.want_autodarts || data.want_dartcounter || data.want_scolia;
      if (data.status_neue_saison === 'waiting' && wantsAny) {
        html += `<div class="assignment-pending">⏳ Du bist für die neue Saison angemeldet und wartest auf Zuteilung durch den Admin.</div>`;
      }

      area.innerHTML = html;
    }

    // --- Level-/XP-System (gleiche Logik wie index.html, hier nur für den
    // eigenen Spieler berechnet) - XP werden live aus Matches, Turnier-Badges
    // und News-Reaktionen berechnet, nicht als laufender Zähler gespeichert.
    function xpForLevel(level) { return 25 * level * (level - 1); }
    function computeLevelFromXp(xp) {
      let level = 1;
      while (xpForLevel(level + 1) <= xp) level++;
      return level;
    }
    function levelProgress(xp) {
      const level = computeLevelFromXp(xp);
      const currentLevelXp = xpForLevel(level);
      const nextLevelXp = xpForLevel(level + 1);
      const xpIntoLevel = xp - currentLevelXp;
      const xpNeededForNext = nextLevelXp - currentLevelXp;
      const percent = xpNeededForNext > 0 ? Math.min(100, Math.round((xpIntoLevel / xpNeededForNext) * 100)) : 100;
      return { level, xp, xpIntoLevel, xpNeededForNext, percent };
    }

    // Dart-thematische Rang-Stufen statt generischer Level-Zahlen.
    function getLevelTier(level) {
      if (level >= 50) return { color: '#7f77dd', name: 'Nine-Darter', hexSize: 52 };
      if (level >= 30) return { color: '#4fd8e0', name: '180-Werfer', hexSize: 48 };
      if (level >= 20) return { color: '#ffd700', name: 'Checkout-Spezialist', hexSize: 44 };
      if (level >= 10) return { color: '#c0c0c0', name: 'Scorer', hexSize: 40 };
      return { color: '#cd7f32', name: 'Dart-Neuling', hexSize: 40 };
    }

    function getLevelIconInner(tier, level) {
      const color = tier.color;
      let inner = `<circle cx="16" cy="16" r="10" fill="none" stroke="${color}" stroke-width="2"/><circle cx="16" cy="16" r="6" fill="none" stroke="${color}" stroke-width="2"/><circle cx="16" cy="16" r="2" fill="${color}"/>`;
      if (level >= 30 && level < 50) inner += `<text x="16" y="6" font-size="6" font-weight="700" fill="${color}" text-anchor="middle">180</text>`;
      if (level >= 50) inner += `<path d="M16 16 L24 4" stroke="${color}" stroke-width="2" stroke-linecap="round"/>`;
      return inner;
    }

    function renderLevelBox(xp) {
      const area = document.getElementById('levelBox');
      if (!area) return;
      const progress = levelProgress(xp);
      const tier = getLevelTier(progress.level);
      const size = tier.hexSize;
      const iconSize = Math.round(size * 0.5);
      area.innerHTML = `
        <div style="text-align:center; margin-bottom:10px;">
          <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
            <div title="${htmlEscape(tier.name)}" style="width:${size}px; height:${size}px; position:relative; display:inline-flex; align-items:center; justify-content:center;">
              <div style="position:absolute; inset:0; clip-path:polygon(50% 0%,95% 25%,95% 75%,50% 100%,5% 75%,5% 25%); background:${tier.color}26; box-shadow:0 0 ${Math.round(size / 4)}px ${tier.color}99;"></div>
              <svg width="${iconSize}" height="${iconSize}" viewBox="0 0 32 32" style="position:relative;">${getLevelIconInner(tier, progress.level)}</svg>
            </div>
            <span style="font-weight:800; font-size:14px; background:${tier.color}; color:#1a1f36; padding:4px 12px; border-radius:12px;">Lvl ${progress.level} · ${htmlEscape(tier.name)}</span>
          </div>
        </div>
        <div>
          <div style="display:flex; justify-content:space-between; font-size:10.5px; color:var(--text-secondary); margin-bottom:4px;">
            <span>${progress.xp} XP gesamt</span>
            <span>${progress.xpIntoLevel} / ${progress.xpNeededForNext} XP bis Level ${progress.level + 1}</span>
          </div>
          <div style="background:var(--bg-tertiary); border-radius:6px; height:8px; overflow:hidden;">
            <div style="background:var(--platform-color); height:100%; width:${progress.percent}%; border-radius:6px;"></div>
          </div>
        </div>
      `;
    }

    async function loadLevelInfo(userId) {
      try {
        const [{ data: xpSettings }, { data: myMatches }, { data: myTourMatches }, { data: myBadges }, { data: myReactions }] = await Promise.all([
          supabaseClient.from('system_settings').select('xp_match_played, xp_match_won, xp_tournament_participation, xp_tournament_winner, xp_tournament_second, xp_tournament_third, xp_news_reaction').eq('id', 1).single(),
          supabaseClient.from('matches').select('player1_id, player2_id, legs_player1, legs_player2, status').or(`player1_id.eq.${userId},player2_id.eq.${userId}`),
          supabaseClient.from('tournament_matches').select('player1_id, player2_id, legs_player1, legs_player2, status, is_bye, tournament_id').or(`player1_id.eq.${userId},player2_id.eq.${userId}`),
          supabaseClient.from('player_badges').select('badge_type').eq('player_id', userId),
          supabaseClient.from('news_reactions').select('id').eq('player_id', userId)
        ]);

        const cfg = {
          matchPlayed: xpSettings?.xp_match_played ?? 10,
          matchWon: xpSettings?.xp_match_won ?? 15,
          tournamentParticipation: xpSettings?.xp_tournament_participation ?? 20,
          tournamentWinner: xpSettings?.xp_tournament_winner ?? 100,
          tournamentSecond: xpSettings?.xp_tournament_second ?? 50,
          tournamentThird: xpSettings?.xp_tournament_third ?? 25,
          newsReaction: xpSettings?.xp_news_reaction ?? 2
        };

        let xp = 0;
        [...(myMatches || []), ...(myTourMatches || [])].forEach(m => {
          if (m.is_bye) return;
          if (!(m.status === 'done' || m.status === 'fertig')) return;
          xp += cfg.matchPlayed;
          const isP1 = m.player1_id === userId;
          const myLegs = isP1 ? m.legs_player1 : m.legs_player2;
          const oppLegs = isP1 ? m.legs_player2 : m.legs_player1;
          if (myLegs !== null && myLegs !== undefined && oppLegs !== null && oppLegs !== undefined && myLegs > oppLegs) xp += cfg.matchWon;
        });

        const tournamentIdsPlayed = new Set((myTourMatches || []).filter(m => !m.is_bye).map(m => m.tournament_id));
        xp += tournamentIdsPlayed.size * cfg.tournamentParticipation;

        (myBadges || []).forEach(b => {
          if (b.badge_type === 'turniersieger') xp += cfg.tournamentWinner;
          else if (b.badge_type === 'turnier_zweiter') xp += cfg.tournamentSecond;
          else if (b.badge_type === 'turnier_dritter') xp += cfg.tournamentThird;
        });

        xp += (myReactions || []).length * cfg.newsReaction;

        renderLevelBox(xp);
      } catch (e) {
        console.error('Fehler beim Berechnen des Levels:', e);
      }
    }

    async function initProfile() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) { window.location.href = "index.html"; return; }
      currentUser = session.user;
      
      const meta = currentUser.user_metadata || {};
      document.getElementById("statusText").innerText = meta.full_name || meta.name || "Spieler";
      if (meta.avatar_url || meta.picture) document.getElementById("userAvatar").src = meta.avatar_url || meta.picture;

      // Discord-Identität (Name/Handle/ID) still im Hintergrund in die DB schreiben,
      // damit auch schon bestehende Profile ohne discord_name automatisch geheilt werden.
      syncDiscordIdentity(currentUser);
      loadLevelInfo(currentUser.id);
      
      document.getElementById("profilForm").style.display = "block";

      const { data } = await supabaseClient.from('profiles').select('*').eq('id', currentUser.id).single();
      if(data) {
          currentProfileData = data;
          if (data.avatar_url) document.getElementById("userAvatar").src = data.avatar_url;
          // NEUE FELDER EINTRAGEN
          document.getElementById("display_name").value = data.display_name || data.username || "";
          document.getElementById("show_in_members").checked = data.show_in_members !== false; // standardmäßig true
          document.getElementById("show_membership_card").checked = data.show_membership_card === true; // standardmäßig false (Opt-In)

          // Bestehende Felder befüllen
          document.getElementById("real_name").value = data.real_name || "";
          document.getElementById("plz").value = data.plz || "";
          document.getElementById("ort").value = data.ort || "";
          document.getElementById("dart_setup").value = data.dart_setup || "";
          
          document.getElementById("autodarts_name").value = data.autodarts_name || "";
          document.getElementById("autodarts_avg").value = data.autodarts_avg || "";
          document.getElementById("autodarts_url").value = data.autodarts_url || "";
          
          document.getElementById("dartcounter_name").value = data.dartcounter_name || "";
          document.getElementById("dartcounter_avg").value = data.dartcounter_avg || "";
          document.getElementById("dartcounter_url").value = data.dartcounter_url || "";

          document.getElementById("scolia_name").value = data.scolia_name || "";
          document.getElementById("scolia_avg").value = data.scolia_avg || "";
          document.getElementById("scolia_url").value = data.scolia_url || "";
          
          document.getElementById("want_ad").checked = data.want_autodarts || false;
          document.getElementById("want_dc").checked = data.want_dartcounter || false;
          document.getElementById("want_sc").checked = data.want_scolia || false;
          
          if(data.is_admin) {
              document.getElementById("adminBadge").style.display = "inline-block";
              document.getElementById("adminDashboardBtn").style.display = "inline-block";
          }

          renderAssignmentStatus(data);
      }
    }

    document.getElementById("btnSaveRegistration").onclick = async () => {
        await supabaseClient.from('profiles').update({
            want_autodarts: document.getElementById("want_ad").checked,
            want_dartcounter: document.getElementById("want_dc").checked,
            want_scolia: document.getElementById("want_sc").checked,
            status_neue_saison: 'waiting'
        }).eq('id', currentUser.id);
        alert("Anmeldung für die neue Saison gespeichert!");
        initProfile();
    };

    document.getElementById("profilForm").addEventListener("submit", async function(e) {
        e.preventDefault();

        // Pflichtfelder zusätzlich zur HTML5-Validierung noch einmal explizit prüfen,
        // damit ein leeres Feld nie in die DB gelangt (z.B. bei Browsern, die
        // "required" ignorieren, oder bei nur aus Leerzeichen bestehenden Werten).
        const displayNameVal = document.getElementById("display_name").value.trim();
        const realNameVal = document.getElementById("real_name").value.trim();
        if (!displayNameVal || !realNameVal) {
            alert("Bitte fülle sowohl 'Wunschname / Anzeigename' als auch 'Vorname (Echter Name)' aus - beide Felder sind Pflicht.");
            if (!displayNameVal) document.getElementById("display_name").focus();
            else document.getElementById("real_name").focus();
            return;
        }

        const saveBtn = document.getElementById("saveBtn");
        const plzVal = document.getElementById("plz").value.trim();
        const ortVal = document.getElementById("ort").value.trim();

        // Nur neu geocoden wenn PLZ oder Ort sich geändert haben - spart unnötige Anfragen
        let lat = currentProfileData ? currentProfileData.latitude : null;
        let lon = currentProfileData ? currentProfileData.longitude : null;
        const plzOrtChanged = !currentProfileData || currentProfileData.plz !== plzVal || currentProfileData.ort !== ortVal;

        if (plzOrtChanged && (plzVal || ortVal)) {
            saveBtn.disabled = true;
            saveBtn.innerText = "📍 Standort wird ermittelt...";
            const geo = await geocodeAddress(plzVal, ortVal);
            if (geo) { lat = geo.lat; lon = geo.lon; } else { lat = null; lon = null; }
            saveBtn.disabled = false;
            saveBtn.innerText = "Profil Speichern";
        } else if (!plzVal && !ortVal) {
            lat = null; lon = null;
        }

        // Discord-Identität erneut einlesen und mit abspeichern, damit discord_name/
        // username/discord_id auch bei einem expliziten Speichern nie verloren gehen.
        const { discordName, username, discordId, avatarUrl } = extractDiscordIdentity(currentUser);
        
        const updates = {
            id: currentUser.id,
            display_name: displayNameVal || null,
            discord_name: discordName,
            username: username,
            discord_id: discordId,
            avatar_url: avatarUrl,
            show_in_members: document.getElementById("show_in_members").checked,
            show_membership_card: document.getElementById("show_membership_card").checked,
            real_name: realNameVal || null, 
            plz: plzVal || null,
            ort: ortVal || null, 
            latitude: lat,
            longitude: lon,
            dart_setup: document.getElementById("dart_setup").value.trim() || null,
            autodarts_name: document.getElementById("autodarts_name").value.trim() || null, 
            autodarts_avg: document.getElementById("autodarts_avg").value.trim().replace(',', '.') || null, 
            autodarts_url: document.getElementById("autodarts_url").value.trim() || null,
            dartcounter_name: document.getElementById("dartcounter_name").value.trim() || null, 
            dartcounter_avg: document.getElementById("dartcounter_avg").value.trim().replace(',', '.') || null, 
            dartcounter_url: document.getElementById("dartcounter_url").value.trim() || null,
            scolia_name: document.getElementById("scolia_name").value.trim() || null, 
            scolia_avg: document.getElementById("scolia_avg").value.trim().replace(',', '.') || null, 
            scolia_url: document.getElementById("scolia_url").value.trim() || null,
            updated_at: new Date()
        };

        const { error } = await supabaseClient.from('profiles').upsert(updates);
        if (error) {
            alert("Fehler beim Speichern: " + error.message);
        } else if (plzOrtChanged && (plzVal || ortVal) && lat === null) {
            alert("Profil gespeichert! ⚠️ Dein Standort konnte aber nicht automatisch gefunden werden - dein Pin erscheint deshalb noch nicht auf der Karte. Prüfe PLZ/Ort auf Tippfehler und speichere nochmal.");
            initProfile();
        } else {
            alert("Profil erfolgreich gespeichert!");
            initProfile();
        }
    });

    document.getElementById("logoutBtn").onclick = async () => { await supabaseClient.auth.signOut(); window.location.href = "index.html"; };
    initProfile();
  </script>
</body>
</html>
